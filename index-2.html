<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS Level Study Site</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onload="window.sdkReady=true; if(window.initReady) init();" onerror="document.getElementById('loadingScreen').innerHTML='<p style=&quot;color:#ff6b35;font-family:monospace;font-size:0.8rem&quot;>Failed to load SDK. Check your connection and refresh.</p>'"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Clash+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080a;--surface:#0d0f13;--card:#111318;--border:#1a1d24;
  --text:#e2e4ec;--muted:#52566a;
  --chem:#00e5a0;--phys:#5b8dee;--bio:#ff6b9d;--math:#ffd166;
  --accent2:#ff6b35;--yellow:#ffd166;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}

/* ── AUTH SCREEN ── */
#authScreen{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.auth-box{
  background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:2.5rem 2rem;width:100%;max-width:380px;
  display:flex;flex-direction:column;gap:1.25rem;
}
.auth-logo{font-family:'Clash Display',sans-serif;font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:0.25rem;}
.auth-logo span{color:var(--chem);}
.auth-sub{font-size:0.68rem;color:var(--muted);text-align:center;letter-spacing:0.06em;}
.auth-tabs{display:flex;gap:0.5rem;}
.auth-tab{flex:1;padding:0.5rem;font-family:'DM Mono',monospace;font-size:0.72rem;border:1px solid var(--border);border-radius:7px;background:none;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.auth-tab.active{border-color:var(--chem);color:var(--chem);background:rgba(0,229,160,0.07);}
.auth-input{
  width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:0.65rem 0.9rem;font-family:'DM Mono',monospace;font-size:0.8rem;
  color:var(--text);outline:none;transition:border-color 0.2s;
}
.auth-input::placeholder{color:var(--muted);}
.auth-input:focus{border-color:var(--chem);}
.auth-btn{
  width:100%;padding:0.7rem;border:none;border-radius:8px;
  background:var(--chem);color:#07080a;font-family:'DM Mono',monospace;
  font-size:0.8rem;font-weight:500;cursor:pointer;transition:opacity 0.2s;
}
.auth-btn:hover{opacity:0.85;}
.auth-btn:disabled{opacity:0.5;cursor:not-allowed;}
.auth-err{font-size:0.72rem;color:#ff6b6b;text-align:center;min-height:1rem;}
.auth-ok{font-size:0.72rem;color:var(--chem);text-align:center;min-height:1rem;}

/* ── MAIN APP (hidden until logged in) ── */
#app{display:none;}

/* ── TOP NAV ── */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(7,8,10,0.93);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;
  height:56px;padding:0 1.5rem;
}
.nav-logo{font-family:'Clash Display',sans-serif;font-size:0.95rem;font-weight:700;color:var(--chem);margin-right:auto;}
.nav-user{font-size:0.62rem;color:var(--muted);margin-right:1rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-logout{font-size:0.65rem;color:var(--muted);background:none;border:1px solid var(--border);border-radius:5px;padding:0.25rem 0.6rem;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.nav-logout:hover{color:var(--accent2);border-color:var(--accent2);}
.nav-subject-tabs{display:flex;gap:0;margin:0 1rem;}
.nav-tab{
  padding:0 1rem;height:56px;display:flex;align-items:center;
  font-size:0.7rem;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;transition:all 0.15s;
  background:none;border-top:none;border-left:none;border-right:none;
  font-family:inherit;white-space:nowrap;
}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--subject-accent);border-bottom-color:var(--subject-accent);}
.nav-tab[data-subject="chem"]{--subject-accent:var(--chem);}
.nav-tab[data-subject="phys"]{--subject-accent:var(--phys);}
.nav-tab[data-subject="bio"]{--subject-accent:var(--bio);}
.nav-tab[data-subject="math"]{--subject-accent:var(--math);}
.nav-tab.active[data-subject="chem"]{color:var(--chem);border-bottom-color:var(--chem);background:rgba(0,229,160,0.04);}
.nav-tab.active[data-subject="phys"]{color:var(--phys);border-bottom-color:var(--phys);background:rgba(91,141,238,0.04);}
.nav-tab.active[data-subject="bio"]{color:var(--bio);border-bottom-color:var(--bio);background:rgba(255,107,157,0.04);}
.nav-tab.active[data-subject="math"]{color:var(--math);border-bottom-color:var(--math);background:rgba(255,209,102,0.04);}
.mob-toggle{display:none;background:none;border:1px solid var(--border);border-radius:6px;padding:0.3rem 0.55rem;color:var(--muted);cursor:pointer;font-size:0.75rem;font-family:inherit;transition:all 0.15s;flex-shrink:0;margin-left:0.5rem;}
.mob-toggle:hover{border-color:var(--text);color:var(--text);}

/* ── LAYOUT ── */
.subject-view{display:none;}
.subject-view.active{display:grid;grid-template-columns:250px 1fr;min-height:calc(100vh - 58px);position:relative;z-index:1;}
aside{border-right:1px solid var(--border);padding:1.25rem 0;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.sidebar-group-label{padding:0.5rem 1.25rem 0.25rem;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;border-top:1px solid var(--border);margin-top:0.5rem;}
.sidebar-group-label:first-child{border-top:none;margin-top:0;}
.ch-item{display:flex;align-items:center;gap:0.6rem;padding:0.45rem 1.25rem;cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;font-size:0.73rem;color:var(--muted);}
.ch-num{font-size:0.58rem;min-width:30px;flex-shrink:0;}
.done-dot{width:5px;height:5px;border-radius:50%;margin-left:auto;display:none;flex-shrink:0;}
.ch-item.done .done-dot{display:block;}
.search-wrap{padding:0 1.25rem 0.75rem;}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.45rem 0.75rem;font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--text);outline:none;transition:border-color 0.2s;}
.search-input::placeholder{color:var(--muted);}
.content{padding:2.5rem 3rem;max-width:860px;overflow-y:auto;height:calc(100vh - 58px);}
.chapter-view{display:none;}
.chapter-view.active{display:block;animation:fadeUp 0.3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* subject accent theming */
[data-subject="chem"] aside .ch-item:hover{background:rgba(0,229,160,0.04);color:var(--text);}
[data-subject="chem"] aside .ch-item.active{border-left-color:var(--chem);color:var(--chem);background:rgba(0,229,160,0.06);}
[data-subject="chem"] aside .ch-item.active .ch-num{color:var(--chem);}
[data-subject="chem"] .done-dot{background:var(--chem);}
[data-subject="chem"] .sidebar-group-label{color:var(--chem);}
[data-subject="phys"] aside .ch-item:hover{background:rgba(91,141,238,0.04);color:var(--text);}
[data-subject="phys"] aside .ch-item.active{border-left-color:var(--phys);color:var(--phys);background:rgba(91,141,238,0.06);}
[data-subject="phys"] aside .ch-item.active .ch-num{color:var(--phys);}
[data-subject="phys"] .done-dot{background:var(--phys);}
[data-subject="phys"] .sidebar-group-label{color:var(--phys);}
[data-subject="bio"] aside .ch-item:hover{background:rgba(255,107,157,0.04);color:var(--text);}
[data-subject="bio"] aside .ch-item.active{border-left-color:var(--bio);color:var(--bio);background:rgba(255,107,157,0.06);}
[data-subject="bio"] aside .ch-item.active .ch-num{color:var(--bio);}
[data-subject="bio"] .done-dot{background:var(--bio);}
[data-subject="bio"] .sidebar-group-label{color:var(--bio);}
[data-subject="math"] aside .ch-item:hover{background:rgba(255,209,102,0.04);color:var(--text);}
[data-subject="math"] aside .ch-item.active{border-left-color:var(--math);color:var(--math);background:rgba(255,209,102,0.06);}
[data-subject="math"] aside .ch-item.active .ch-num{color:var(--math);}
[data-subject="math"] .done-dot{background:var(--math);}
[data-subject="math"] .sidebar-group-label{color:var(--math);}

/* ── CHAPTER CONTENT ── */
.ch-header{display:flex;align-items:flex-start;gap:1.5rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.ch-num-big{font-family:'Clash Display',sans-serif;font-size:4rem;color:var(--border);line-height:1;min-width:90px;font-weight:700;}
.ch-title-wrap h1{font-family:'Clash Display',sans-serif;font-size:1.9rem;font-weight:700;line-height:1.1;margin-bottom:0.35rem;}
.ch-subtitle{font-size:0.65rem;color:var(--muted);letter-spacing:0.08em;margin-bottom:0.5rem;}
.tag{display:inline-block;font-size:0.58rem;padding:0.18rem 0.5rem;border-radius:3px;margin-right:0.3rem;letter-spacing:0.06em;}
.section{margin-bottom:1.25rem;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.sec-head{padding:0.85rem 1.2rem;background:var(--surface);display:flex;align-items:center;gap:0.7rem;cursor:pointer;border-bottom:1px solid var(--border);user-select:none;transition:background 0.15s;}
.sec-icon{font-size:0.95rem;}
.sec-title{font-size:0.85rem;font-weight:500;color:var(--text);}
.sec-arrow{margin-left:auto;color:var(--muted);transition:transform 0.2s;font-size:0.65rem;}
.section.open .sec-arrow{transform:rotate(90deg);}
.sec-body{padding:1.2rem;display:none;}
.sec-body.open{display:block;}
p{line-height:1.75;color:#bfc2cc;font-size:0.83rem;margin-bottom:0.7rem;}
h3{font-size:0.9rem;font-weight:600;margin:1rem 0 0.45rem;font-family:'Clash Display',sans-serif;}
h4{font-size:0.8rem;font-weight:500;margin:0.75rem 0 0.35rem;color:var(--text);}
ul,ol{padding-left:1.3rem;}
li{font-size:0.82rem;line-height:1.75;color:#bfc2cc;margin-bottom:0.15rem;}
strong{color:var(--text);font-weight:500;}
.callout{padding:0.85rem 1rem;border-radius:7px;margin:0.7rem 0;font-size:0.81rem;line-height:1.65;border-left:3px solid;}
.callout-key{background:rgba(255,255,255,0.03);}
.callout-warn{background:rgba(255,107,53,0.06);border-color:#ff6b35!important;}
.callout-tip{background:rgba(0,229,160,0.06);border-color:#00e5a0!important;}
.callout-title{font-weight:500;font-size:0.68rem;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:0.35rem;}
.callout-warn .callout-title{color:#ff6b35;}
.callout-tip .callout-title{color:#00e5a0;}
.formula{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.7rem 1rem;margin:0.5rem 0;font-size:0.82rem;letter-spacing:0.02em;}
table{width:100%;border-collapse:collapse;font-size:0.79rem;margin:0.7rem 0;}
th{background:var(--surface);font-size:0.68rem;letter-spacing:0.07em;padding:0.55rem 0.85rem;text-align:left;border:1px solid var(--border);}
td{padding:0.5rem 0.85rem;border:1px solid var(--border);color:#bfc2cc;}
.quiz-wrap{margin-top:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.5rem;}
.quiz-header{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:1.25rem;}
.quiz-q{margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.quiz-q:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.quiz-question{font-size:0.85rem;font-weight:500;margin-bottom:0.75rem;line-height:1.5;color:var(--text);}
.quiz-opts{display:flex;flex-direction:column;gap:0.4rem;}
.qopt{display:flex;align-items:flex-start;gap:0.7rem;padding:0.55rem 0.9rem;border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:0.79rem;transition:all 0.15s;background:var(--card);line-height:1.5;}
.qopt.correct{border-color:#00e5a0;background:rgba(0,229,160,0.07);color:#00e5a0;}
.qopt.wrong{border-color:#ff6b35;background:rgba(255,107,53,0.07);color:#ff6b35;}
.qopt.revealed{cursor:default;}
.opt-ltr{font-size:0.65rem;min-width:18px;color:var(--muted);padding-top:1px;}
.qopt.correct .opt-ltr{color:#00e5a0;}
.qopt.wrong .opt-ltr{color:#ff6b35;}
.qfb{margin-top:0.6rem;font-size:0.77rem;padding:0.5rem 0.8rem;border-radius:5px;display:none;line-height:1.5;}
.qfb.show{display:block;}
.qfb.ok{background:rgba(0,229,160,0.07);color:#80ffcc;}
.qfb.no{background:rgba(255,107,53,0.07);color:#ffaa88;}
.quiz-score{margin-top:1.25rem;text-align:center;font-size:0.75rem;color:var(--muted);display:none;padding-top:1.25rem;border-top:1px solid var(--border);}
.quiz-score.show{display:block;}
.score-big{font-family:'Clash Display',sans-serif;font-size:2.5rem;font-weight:700;display:block;margin-bottom:0.2rem;}
.mark-done{display:inline-flex;align-items:center;gap:0.5rem;margin-top:1.5rem;padding:0.55rem 1.1rem;border:1px solid var(--border);border-radius:7px;background:none;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;font-size:0.68rem;transition:all 0.2s;}
.mark-done:hover{border-color:currentColor;}
.sync-indicator{font-size:0.6rem;color:var(--muted);margin-left:0.5rem;}

/* ── DRAWER ── */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;backdrop-filter:blur(4px);}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;top:0;left:-285px;width:275px;height:100vh;background:var(--surface);border-right:1px solid var(--border);z-index:201;transition:left 0.25s ease;display:flex;flex-direction:column;padding-top:1rem;overflow-y:auto;}
.drawer.open{left:0;}
.drawer-header{padding:0 1.25rem 0.75rem;font-size:0.65rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;border-bottom:1px solid var(--border);margin-bottom:0.5rem;}
.drawer .search-wrap{padding:0.75rem 1.25rem 0.5rem;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── PROGRESS BAR ── */
.progress-bar-wrap{position:fixed;top:56px;left:0;right:0;height:2px;background:var(--border);z-index:99;}
.progress-bar{height:100%;width:0%;transition:width 0.3s;}

/* ── LOADING SPINNER ── */
#loadingScreen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--chem);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingScreen p{font-size:0.7rem;color:var(--muted);}

@media(max-width:768px){
  .subject-view.active{grid-template-columns:1fr;}
  aside{display:none;}
  .content{padding:1.5rem;height:auto;}
  .mob-toggle{display:flex;align-items:center;gap:0.4rem;}
  .nav-subject-tabs{display:none;}
  nav{gap:0.5rem;}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <p>Loading...</p>
</div>

<!-- AUTH SCREEN -->
<div id="authScreen" style="display:none;">
  <div class="auth-box">
    <div class="auth-logo">AS Level <span>Study Site</span></div>
    <div class="auth-sub">CAMBRIDGE AS LEVEL · 4 SUBJECTS · 55 CHAPTERS</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')" id="tabLogin">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')" id="tabSignup">Sign Up</button>
    </div>
    <input class="auth-input" id="authEmail" type="email" placeholder="Email address" autocomplete="email">
    <input class="auth-input" id="authPassword" type="password" placeholder="Password" autocomplete="current-password">
    <div id="authMsg" class="auth-err"></div>
    <button class="auth-btn" id="authSubmit" onclick="handleAuth()">Sign In</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <nav>
    <div class="nav-logo">AS Level Study Site</div>
    <div class="nav-subject-tabs" id="navTabs">
      <button class="nav-tab active" data-subject="chem" onclick="switchSubject('chem')">⚗️ Chemistry</button>
      <button class="nav-tab" data-subject="phys" onclick="switchSubject('phys')">⚡ Physics</button>
      <button class="nav-tab" data-subject="bio" onclick="switchSubject('bio')">🧬 Biology</button>
      <button class="nav-tab" data-subject="math" onclick="switchSubject('math')">🧮 Maths</button>
    </div>
    <div class="nav-user" id="navUser"></div>
    <button class="nav-logout" onclick="handleLogout()">Sign out</button>
    <button class="mob-toggle" onclick="openDrawer()">☰ Chapters</button>
  </nav>
  <div class="progress-bar-wrap"><div class="progress-bar" id="scrollBar"></div></div>

  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header" id="drawerHeader">Chapters</div>
    <div class="search-wrap"><input class="search-input" placeholder="Search..." oninput="filterSidebar(this.value)"></div>
    <div id="drawerList"></div>
  </div>

  <!-- SUBJECT VIEWS -->
  <div class="subject-view active" id="view-chem" data-subject="chem">
    <aside><div class="search-wrap"><input class="search-input" placeholder="Search chapters..." oninput="filterSidebar(this.value)"></div><div id="sidebar-chem"></div></aside>
    <div class="content" id="content-chem"><div id="chapters-chem"></div></div>
  </div>
  <div class="subject-view" id="view-phys" data-subject="phys">
    <aside><div class="search-wrap"><input class="search-input" placeholder="Search chapters..." oninput="filterSidebar(this.value)"></div><div id="sidebar-phys"></div></aside>
    <div class="content" id="content-phys"><div id="chapters-phys"></div></div>
  </div>
  <div class="subject-view" id="view-bio" data-subject="bio">
    <aside><div class="search-wrap"><input class="search-input" placeholder="Search chapters..." oninput="filterSidebar(this.value)"></div><div id="sidebar-bio"></div></aside>
    <div class="content" id="content-bio"><div id="chapters-bio"></div></div>
  </div>
  <div class="subject-view" id="view-math" data-subject="math">
    <aside><div class="search-wrap"><input class="search-input" placeholder="Search chapters..." oninput="filterSidebar(this.value)"></div><div id="sidebar-math"></div></aside>
    <div class="content" id="content-math"><div id="chapters-math"></div></div>
  </div>
</div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────────────────────
const { createClient } = supabase;
const sb = createClient('https://rorkeeehdlvulzysrbzo.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvcmtlZWVoZGx2dWx6eXNyYnpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjE4MTEsImV4cCI6MjA4ODczNzgxMX0.PVWwpE_0z5nXxM8hTPNK22WVyMaCkuvalRRFJC7npT4');

// ── SUBJECT DATA ──────────────────────────────────────────────────────────────
const SUBJECTS = {
  chem: { key:'chem', label:'Chemistry', code:'9701', emoji:'⚗️', accent:'var(--chem)', chapters: [
{
  id:1, title:"Atomic Structure",
  sections:[
    { icon:"⚛️", title:"Subatomic Particles",
      body:`<p>All matter is made of <strong>atoms</strong>. An atom has a tiny, dense <strong>nucleus</strong> containing protons and neutrons, surrounded by electrons in shells (energy levels).</p>
<table><tr><th>Particle</th><th>Relative Mass</th><th>Relative Charge</th><th>Location</th></tr>
<tr><td>Proton</td><td>1</td><td>+1</td><td>Nucleus</td></tr>

<tr><td>Electron</td><td>1/1836 ≈ 0</td><td>−1</td><td>Shells/orbitals</td></tr></table>
<div class="callout callout-key"><div class="callout-title">Key Definitions</div>

<strong>Nucleon number (A)</strong> = protons + neutrons.<br>

<div class="formula">Neutrons = A − Z</div>` },
    { icon:"📊", title:"Relative Masses & Isotopes",
      body:`<p>The <strong>relative atomic mass (Ar)</strong> is the weighted mean mass of an atom of an element relative to 1/12 the mass of carbon-12.</p>
<div class="formula">Ar = Σ (isotope mass × % abundance) / 100</div>
<div class="callout callout-tip"><div class="callout-title">Worked Example</div>
Chlorine: ³⁵Cl (75.8%) and ³⁷Cl (24.2%)<br>
Ar = (35 × 75.8 + 37 × 24.2) / 100 = <strong>35.5</strong></div>
<p>The <strong>relative molecular mass (Mr)</strong> or <strong>relative formula mass</strong> is the sum of all relative atomic masses in the formula.</p>` },
    { icon:"🔬", title:"Mass Spectrometry",
      body:`<p>A mass spectrometer separates ions by their <strong>mass-to-charge ratio (m/z)</strong>.</p>
<h4>Five stages:</h4>
<ol><li><strong>Vaporisation</strong> — sample heated to gas</li>
<li><strong>Ionisation</strong> — electron bombardment removes electrons → M⁺ ions (or fragmentation)</li>
<li><strong>Acceleration</strong> — electric field accelerates ions to same kinetic energy</li>
<li><strong>Deflection</strong> — magnetic field deflects lighter ions more</li>
<li><strong>Detection</strong> — ions detected; signal proportional to abundance</li></ol>
<div class="callout callout-key"><div class="callout-title">Reading a Mass Spectrum</div>
The <strong>molecular ion peak (M⁺)</strong> is the highest m/z peak = Mr of molecule.<br>
Peak heights give relative isotopic abundances → calculate Ar.</div>
<div class="callout callout-warn"><div class="callout-title">Fragmentation</div>High-energy electrons can break bonds, producing fragment ions at lower m/z. These help identify molecular structure.</div>` }
  ],
  quiz:[
    { q:"An atom has proton number 17 and nucleon number 35. How many neutrons does it have?", opts:["16","17","18","35"], ans:2, exp:"Neutrons = A − Z = 35 − 17 = 18." },
    { q:"Which statement about isotopes is correct?", opts:["Same mass number, different proton number","Same proton number, different neutron number","Same neutron number, different proton number","Same number of electrons and neutrons"], ans:1, exp:"Isotopes: same Z (same element), different number of neutrons → different A." },
    { q:"In a mass spectrometer, what causes ions to be deflected by different amounts?", opts:["Different speeds","Different charges only","Different mass-to-charge ratios","Different temperatures"], ans:2, exp:"The magnetic field deflects ions according to their m/z ratio — lighter ions (or higher charge) deflect more." },
    { q:"Bromine has two isotopes: ⁷⁹Br (50.5%) and ⁸¹Br (49.5%). What is Ar of bromine?", opts:["79.0","80.0","79.5","80.5"], ans:1, exp:"Ar = (79×50.5 + 81×49.5)/100 = (3989.5+4009.5)/100 = 7999/100 ≈ 80.0" },
    { q:"What is the relative charge of an electron?", opts:["+1","0","−1","−2"], ans:2, exp:"Electrons carry a relative charge of −1." }
  ]
},
{
  id:2, title:"Electrons in Atoms",
  sections:[
    { icon:"🌀", title:"Shells, Sub-shells & Orbitals",
      body:`<p>Electrons exist in <strong>shells</strong> (principal energy levels, n=1,2,3...), divided into <strong>sub-shells</strong> (s, p, d, f) containing <strong>orbitals</strong>. Each orbital holds maximum <strong>2 electrons</strong> with opposite spins (Pauli exclusion principle).</p>
<table><tr><th>Sub-shell</th><th>No. orbitals</th><th>Max electrons</th><th>Shape</th></tr>
<tr><td>s</td><td>1</td><td>2</td><td>Spherical</td></tr>
<tr><td>p</td><td>3</td><td>6</td><td>Dumbbell</td></tr>
<tr><td>d</td><td>5</td><td>10</td><td>Complex</td></tr>
<tr><td>f</td><td>7</td><td>14</td><td>Complex</td></tr></table>
<div class="callout callout-key"><div class="callout-title">Filling Order (Aufbau)</div>
1s → 2s → 2p → 3s → 3p → 4s → 3d → 4p → 5s → 4d → 5p<br>
Note: 4s fills <em>before</em> 3d (lower energy) but empties <em>first</em> when forming ions.</div>` },
    { icon:"📝", title:"Electron Configurations",
      body:`<h4>Three rules:</h4>
<ul><li><strong>Aufbau principle</strong>: fill lowest energy sub-shells first</li>
<li><strong>Pauli exclusion</strong>: max 2 electrons per orbital, must have opposite spins (↑↓)</li>
<li><strong>Hund's rule</strong>: electrons occupy orbitals singly before pairing (minimise repulsion)</li></ul>
<div class="callout callout-tip"><div class="callout-title">Examples</div>
Na (Z=11): 1s² 2s² 2p⁶ 3s¹ or [Ne] 3s¹<br>
Cl (Z=17): 1s² 2s² 2p⁶ 3s² 3p⁵ or [Ne] 3s² 3p⁵<br>
Fe (Z=26): [Ar] 3d⁶ 4s²<br>
Cu (Z=29): [Ar] 3d¹⁰ 4s¹ <em>(exception — full 3d more stable)</em><br>
Cr (Z=24): [Ar] 3d⁵ 4s¹ <em>(exception — half-full 3d more stable)</em></div>
<div class="callout callout-warn"><div class="callout-title">Ions</div>
Remove electrons from highest n shell first. For transition metals, remove 4s before 3d.<br>
Fe²⁺: [Ar] 3d⁶ (removed both 4s)<br>
Fe³⁺: [Ar] 3d⁵ (removed both 4s + one 3d)</div>` },
    { icon:"⚡", title:"Ionisation Energies",
      body:`<p>The <strong>first ionisation energy</strong> is the energy required to remove one mole of electrons from one mole of gaseous atoms:</p>
<div class="formula">X(g) → X⁺(g) + e⁻   ΔH = 1st IE</div>
<h4>Factors affecting IE:</h4>
<ul><li><strong>Nuclear charge (Z)</strong>: more protons → stronger attraction → higher IE</li>
<li><strong>Atomic/ionic radius</strong>: larger distance → weaker attraction → lower IE</li>
<li><strong>Electron shielding</strong>: inner shells shield outer electrons → lower IE</li></ul>
<h4>Trends:</h4>
<ul><li><strong>Across a period</strong>: IE generally increases (more protons, same shielding)</li>
<li><strong>Down a group</strong>: IE decreases (larger radius, more shielding)</li>
<li><strong>Anomalies</strong>: Al < Mg (2p easier than 3s to remove), S < P (paired 3p electron easier to remove)</li></ul>
<div class="callout callout-key"><div class="callout-title">Successive Ionisation Energies</div>
A large jump in successive IEs indicates removal of an electron from an inner shell. Used to deduce group number. E.g. large jump between 3rd and 4th IE → element is in Group 3.</div>` }
  ],
  quiz:[
    { q:"How many electrons can the 3d sub-shell hold?", opts:["2","6","10","14"], ans:2, exp:"3d has 5 orbitals × 2 electrons = 10 electrons maximum." },
    { q:"What is the electron configuration of Fe³⁺ (Z=26)?", opts:["[Ar] 3d⁶ 4s²","[Ar] 3d⁵","[Ar] 3d⁶","[Ar] 3d⁵ 4s²"], ans:1, exp:"Fe = [Ar] 3d⁶ 4s². Fe³⁺ loses 4s² then one 3d → [Ar] 3d⁵." },
    { q:"Why is the first IE of Al slightly lower than that of Mg?", opts:["Al has more protons","Al's outer electron is in a 2p sub-shell which is higher in energy and easier to remove than 3s","Al is larger than Mg","Al has more electrons to shield"], ans:1, exp:"Al's outer electron is in 3p (higher energy, slightly more shielded by 3s electrons) compared to Mg's 3s → lower IE for Al." },
    { q:"An element has successive IEs (kJ/mol): 900, 1760, 14800, 21000. Which group is it in?", opts:["Group 1","Group 2","Group 3","Group 4"], ans:1, exp:"Large jump between 2nd and 3rd IE → 2 outer electrons → Group 2." },
    { q:"Which factor does NOT affect first ionisation energy?", opts:["Nuclear charge","Number of neutrons","Atomic radius","Electron shielding"], ans:1, exp:"Neutrons add mass but do not affect nuclear charge or electron shielding, so they don't affect IE." }
  ]
},
{
  id:3, title:"Atoms, Molecules & Stoichiometry",
  sections:[
    { icon:"⚖️", title:"The Mole",
      body:`<p>The <strong>mole</strong> is the SI base unit of amount of substance. One mole = 6.022 × 10²³ particles (<strong>Avogadro's constant, Nₐ</strong>).</p>
<div class="formula">n = m / Mr       n = moles, m = mass (g), Mr = molar mass (g/mol)</div>
<div class="formula">n = N / Nₐ      N = number of particles</div>
<div class="formula">n = cV           c = concentration (mol dm⁻³), V = volume (dm³)</div>
<div class="formula">n = V / 24.0    gas at RTP (298 K, 100 kPa);   n = V / 22.4 at STP (273 K)</div>
<div class="callout callout-key"><div class="callout-title">Molar Volume of Gas</div>
At RTP (25°C, 100 kPa): <strong>24.0 dm³ mol⁻¹</strong><br>
At STP (0°C, 100 kPa): <strong>22.4 dm³ mol⁻¹</strong></div>` },
    { icon:"🔢", title:"Empirical & Molecular Formulae",
      body:`<p><strong>Empirical formula</strong>: simplest whole-number ratio of atoms. <strong>Molecular formula</strong>: actual number of atoms.</p>
<div class="formula">molecular formula = n × empirical formula   where n = Mr / empirical formula mass</div>
<h4>Finding empirical formula from % composition:</h4>
<ol><li>Divide each % by its Ar to get moles</li>
<li>Divide all mole values by the smallest</li>
<li>Round to whole numbers (if ~0.5, multiply all by 2; if ~0.33, multiply by 3)</li></ol>
<div class="callout callout-tip"><div class="callout-title">Example</div>
Compound: 40.0% C, 6.7% H, 53.3% O<br>
Moles: C = 40/12 = 3.33; H = 6.7/1 = 6.7; O = 53.3/16 = 3.33<br>
Ratio: 1 : 2 : 1 → <strong>CH₂O</strong><br>
If Mr = 180: n = 180/30 = 6 → molecular formula = <strong>C₆H₁₂O₆</strong></div>` },
    { icon:"⚗️", title:"Reacting Masses & Stoichiometry",
      body:`<p>A balanced equation gives the molar ratio of reactants and products. Use this to calculate reacting masses.</p>
<div class="formula">% yield = (actual yield / theoretical yield) × 100</div>
<div class="formula">% atom economy = (Mr desired product / ΣMr all products) × 100</div>
<div class="callout callout-warn"><div class="callout-title">Limiting Reagent</div>The reactant that is completely consumed first limits the amount of product. Calculate moles of each reactant and compare with stoichiometric ratio.</div>
<p><strong>High atom economy</strong> = greener chemistry. Addition reactions have 100% atom economy. Substitution reactions have lower atom economy.</p>` },
    { icon:"💧", title:"Solutions & Titrations",
      body:`<p><strong>Concentration</strong> (mol dm⁻³) = n / V(dm³). For titrations, use accurate glassware: burette (±0.05 cm³), pipette (±0.06 cm³).</p>
<h4>Acid-base titration procedure:</h4>
<ol><li>Rinse all glassware with appropriate solutions</li>
<li>Pipette fixed volume of one solution into conical flask</li>
<li>Fill burette with other solution; note initial reading</li>
<li>Add indicator (e.g. methyl orange for strong acid/weak base; phenolphthalein for weak acid/strong base)</li>
<li>Add titrant until colour change (endpoint); record final reading</li>
<li>Repeat for concordant results (within 0.10 cm³)</li></ol>
<div class="callout callout-key"><div class="callout-title">Calculation</div>
1. n(known) = c × V<br>
2. n(unknown) = n(known) × molar ratio<br>
3. c(unknown) = n(unknown) / V(unknown)</div>` }
  ],
  quiz:[
    { q:"What mass of CaCO₃ (Mr=100) contains 3.01×10²³ formula units?", opts:["25 g","50 g","100 g","150 g"], ans:1, exp:"3.01×10²³ = 0.5 mol. m = 0.5 × 100 = 50 g." },
    { q:"A compound is 85.7% C and 14.3% H by mass. What is its empirical formula?", opts:["CH","CH₂","CH₃","C₂H₃"], ans:1, exp:"C: 85.7/12=7.14; H: 14.3/1=14.3. Ratio H:C = 14.3/7.14 = 2. Empirical formula = CH₂." },
    { q:"In a titration, 25.0 cm³ of 0.100 mol dm⁻³ NaOH required 20.0 cm³ HCl. What is the concentration of HCl?", opts:["0.080 mol dm⁻³","0.100 mol dm⁻³","0.125 mol dm⁻³","0.200 mol dm⁻³"], ans:2, exp:"n(NaOH)=0.025×0.1=0.0025 mol. NaOH:HCl = 1:1. n(HCl)=0.0025. c(HCl)=0.0025/0.020=0.125 mol dm⁻³." },
    { q:"A reaction produces 8.0 g of product. The theoretical yield is 12.5 g. What is the % yield?", opts:["60%","64%","75%","80%"], ans:1, exp:"% yield = (8.0/12.5) × 100 = 64%." },
    { q:"What volume of gas (at RTP) is produced by complete combustion of 0.50 mol of CH₄? CH₄ + 2O₂ → CO₂ + 2H₂O", opts:["6 dm³","12 dm³","24 dm³","48 dm³"], ans:1, exp:"0.50 mol CH₄ → 0.50 mol CO₂. V = 0.50 × 24.0 = 12 dm³." }
  ]
},
{
  id:4, title:"Chemical Bonding",
  sections:[
    { icon:"⬢", title:"Ionic Bonding",
      body:`<p><strong>Ionic bonds</strong> form by <strong>transfer of electrons</strong> from a metal to a non-metal. The resulting oppositely charged ions attract electrostatically.</p>
<p>Ionic compounds form <strong>giant ionic lattices</strong> with high melting and boiling points. They conduct electricity when <strong>molten or dissolved</strong> (ions free to move) but not when solid.</p>
<div class="callout callout-key"><div class="callout-title">Lattice Energy</div>
Lattice energy = energy released when gaseous ions form 1 mole of ionic solid.<br>
More exothermic (more negative) = stronger lattice = higher melting point.<br>
Increases with: ↑ ionic charge, ↓ ionic radius.</div>` },
    { icon:"🔗", title:"Covalent Bonding",
      body:`<p>Covalent bonds form by <strong>sharing electron pairs</strong> between non-metal atoms. Both nuclei attract the shared electrons.</p>
<table><tr><th>Bond type</th><th>Shared pairs</th><th>Bond order</th><th>Examples</th></tr>
<tr><td>Single</td><td>1</td><td>1</td><td>H–H, C–C, N–H</td></tr>
<tr><td>Double</td><td>2</td><td>2</td><td>C=C, C=O, O=O</td></tr>
<tr><td>Triple</td><td>3</td><td>3</td><td>N≡N, C≡C, C≡N</td></tr></table>
<div class="callout callout-tip"><div class="callout-title">Dative (Coordinate) Bond</div>
Both electrons in the bond are donated by one atom. Examples: NH₄⁺ (N donates to H⁺), CO (C donates to O), Al₂Cl₆, [Cu(NH₃)₄]²⁺.</div>
<p><strong>Bond length</strong> decreases and <strong>bond strength</strong> increases going from single → double → triple bond.</p>` },
    { icon:"📐", title:"VSEPR Theory & Shapes",
      body:`<p><strong>VSEPR</strong>: electron pairs (both bonding and lone pairs) repel each other and arrange to maximise separation.</p>
<p><strong>Lone pair repulsion > bonding pair repulsion</strong> → lone pairs compress bond angles.</p>
<table><tr><th>BP</th><th>LP</th><th>Shape</th><th>Angle</th><th>Example</th></tr>
<tr><td>2</td><td>0</td><td>Linear</td><td>180°</td><td>BeCl₂, CO₂</td></tr>
<tr><td>3</td><td>0</td><td>Trigonal planar</td><td>120°</td><td>BF₃, AlCl₃</td></tr>
<tr><td>4</td><td>0</td><td>Tetrahedral</td><td>109.5°</td><td>CH₄, SiCl₄</td></tr>
<tr><td>3</td><td>1</td><td>Pyramidal</td><td>107°</td><td>NH₃, PCl₃</td></tr>
<tr><td>2</td><td>2</td><td>Bent/V-shape</td><td>104.5°</td><td>H₂O, H₂S</td></tr>
<tr><td>5</td><td>0</td><td>Trig. bipyramidal</td><td>90°/120°</td><td>PCl₅</td></tr>
<tr><td>6</td><td>0</td><td>Octahedral</td><td>90°</td><td>SF₆</td></tr></table>` },
    { icon:"🧲", title:"Electronegativity & Polarity",
      body:`<p><strong>Electronegativity</strong>: tendency of an atom to attract the shared electron pair in a covalent bond. Measured on the Pauling scale. <strong>F is most electronegative (4.0)</strong>.</p>
<p>Increases: across a period (↑Z) and up a group (↓radius, ↓shielding).</p>
<p>If two bonded atoms have different electronegativities, the bond is <strong>polar covalent</strong> (δ+ on less electronegative atom). A molecule is polar if it has polar bonds AND an asymmetric shape.</p>` },
    { icon:"💧", title:"Intermolecular Forces",
      body:`<h4>Types (weakest → strongest):</h4>
<ul><li><strong>London (dispersion) forces</strong>: instantaneous dipoles in all molecules. Increase with Mr (more electrons → larger, more polarisable electron cloud). Only forces in non-polar molecules.</li>
<li><strong>Permanent dipole-dipole</strong>: between polar molecules. Weaker than H-bonds.</li>
<li><strong>Hydrogen bonds</strong>: between H (bonded to N, O, or F) and a lone pair on N, O, or F of another molecule. Strongest IMF (typically 5-10× stronger than LDF).</li></ul>
<div class="callout callout-key"><div class="callout-title">Hydrogen Bonding Consequences</div>
• Water: unusually high bp (100°C vs −60°C expected), high surface tension, ice less dense than water (open lattice)<br>
• DNA: base pairs held together by H-bonds between complementary bases<br>
• Proteins: secondary structure (α-helix, β-sheet) maintained by H-bonds</div>` }
  ],
  quiz:[
    { q:"What is the bond angle in a water molecule?", opts:["90°","104.5°","109.5°","120°"], ans:1, exp:"H₂O: 2 bonding pairs + 2 lone pairs. Lone pairs compress angle from 109.5° → 104.5°." },
    { q:"Which molecule has a trigonal planar shape?", opts:["NH₃","H₂O","BF₃","PCl₃"], ans:2, exp:"BF₃: 3 bonding pairs, 0 lone pairs → trigonal planar, 120°." },
    { q:"Why do noble gases have very low boiling points?", opts:["They have strong covalent bonds","They only have weak London dispersion forces","They have no electrons","They have permanent dipoles"], ans:1, exp:"Noble gases are monatomic with no permanent dipole. Only London forces exist between atoms — very weak → very low bp." },
    { q:"Which compound forms hydrogen bonds?", opts:["CH₄","CCl₄","HF","H₂S"], ans:2, exp:"HF: H bonded to F (very electronegative). F has lone pairs. H-bond forms between H(δ+) of one molecule and lone pair on F of another." },
    { q:"In PCl₅, what is the bond angle between equatorial P–Cl bonds?", opts:["90°","109.5°","120°","180°"], ans:2, exp:"PCl₅ is trigonal bipyramidal. Equatorial bonds are in the same plane → 120° apart." }
  ]
},
{
  id:5, title:"States of Matter",
  sections:[
    { icon:"🧊", title:"The Three States",
      body:`<table><tr><th>Property</th><th>Solid</th><th>Liquid</th><th>Gas</th></tr>
<tr><td>Shape</td><td>Fixed</td><td>Takes container shape</td><td>Fills container</td></tr>
<tr><td>Volume</td><td>Fixed</td><td>Fixed</td><td>Fills container</td></tr>
<tr><td>Compressibility</td><td>Incompressible</td><td>Incompressible</td><td>Highly compressible</td></tr>
<tr><td>Particle arrangement</td><td>Ordered lattice</td><td>Random, close</td><td>Random, far apart</td></tr>
<tr><td>Particle movement</td><td>Vibrate in place</td><td>Slide past each other</td><td>Move freely, fast</td></tr>
<tr><td>Density</td><td>High</td><td>High</td><td>Very low</td></tr></table>` },
    { icon:"💨", title:"The Ideal Gas Law",
      body:`<p>An <strong>ideal gas</strong>: particles have no volume, no intermolecular forces, elastic collisions.</p>
<div class="formula">pV = nRT</div>
<p>p = pressure (Pa), V = volume (m³), n = amount (mol), R = 8.314 J mol⁻¹ K⁻¹, T = temperature (K)</p>
<div class="callout callout-tip"><div class="callout-title">Unit Conversions</div>
T(K) = T(°C) + 273<br>
1 dm³ = 0.001 m³ = 10⁻³ m³<br>
1 atm = 101 325 Pa ≈ 101 kPa<br>
1 kPa = 1000 Pa</div>
<div class="callout callout-warn"><div class="callout-title">Real vs Ideal</div>
Real gases deviate at <strong>high pressure</strong> (particle volume becomes significant) and <strong>low temperature</strong> (IMFs become significant). Noble gases are closest to ideal.</div>` },
    { icon:"🔷", title:"Structure & Properties",
      body:`<h4>Giant ionic lattice (e.g. NaCl):</h4>
<p>High mp/bp, brittle, conducts when molten/dissolved, insoluble in non-polar solvents.</p>
<h4>Giant covalent (macromolecular):</h4>
<ul><li><strong>Diamond</strong>: each C forms 4 σ bonds → tetrahedral lattice, hardest natural substance, no free electrons → non-conductor, very high mp</li>
<li><strong>Graphite</strong>: each C forms 3 σ bonds in layers + 1 delocalised electron per C → conducts electricity, soft/slippery (layers slide), high mp</li>
<li><strong>Silicon(IV) oxide</strong>: each Si bonded to 4 O → very high mp, non-conductor</li></ul>
<h4>Simple molecular (e.g. I₂, CO₂, H₂O):</h4>
<p>Low mp/bp (only IMFs broken, not covalent bonds), generally non-conductors, mp depends on strength of IMFs.</p>
<h4>Giant metallic lattice:</h4>
<p>Positive ions in a sea of delocalised electrons. Conducts electricity and heat. Malleable and ductile. Mp varies.</p>` }
  ],
  quiz:[
    { q:"Calculate the pressure (Pa) of 0.20 mol of gas in a 5.0 dm³ container at 300 K.", opts:["9.97×10⁴ Pa","1.99×10⁵ Pa","9.97×10³ Pa","4.99×10⁴ Pa"], ans:0, exp:"p = nRT/V = (0.20 × 8.314 × 300) / (5.0×10⁻³) = 498.84/0.005 ≈ 9.97×10⁴ Pa." },
    { q:"Why does graphite conduct electricity but diamond does not?", opts:["Graphite has metallic bonds","Graphite has one delocalised electron per carbon atom between layers","Diamond has lone pairs","Graphite has ionic bonds"], ans:1, exp:"Each C in graphite makes 3 bonds (sp² hybridised), leaving one electron per C in a delocalised π system — these carry charge." },
    { q:"Which type of solid has the highest melting point?", opts:["Simple molecular","Giant ionic","Giant covalent","Giant metallic"], ans:2, exp:"Giant covalent structures (e.g. diamond, SiO₂) require breaking many strong covalent bonds → very high mp." },
    { q:"Under which conditions does a real gas deviate most from ideal behaviour?", opts:["Low pressure, high temperature","High pressure, low temperature","Low pressure, low temperature","High pressure, high temperature"], ans:1, exp:"At high pressure, particle volumes are significant. At low temperature, IMFs are significant. Both cause deviations from pV=nRT." }
  ]
},
{
  id:6, title:"Enthalpy Changes",
  sections:[
    { icon:"🔥", title:"Enthalpy & Calorimetry",
      body:`<p><strong>Enthalpy (H)</strong>: heat content of a system at constant pressure. We measure <strong>enthalpy change (ΔH)</strong> = heat transferred.</p>
<ul><li><strong>Exothermic</strong>: ΔH < 0 (system releases heat; surroundings temperature rises)</li>
<li><strong>Endothermic</strong>: ΔH > 0 (system absorbs heat; surroundings temperature falls)</li></ul>
<div class="formula">q = mcΔT   (q in J; m in g; c = 4.18 J g⁻¹ K⁻¹ for water; ΔT in K or °C)</div>
<div class="formula">ΔH = −q / n   (divide by moles of limiting reactant; sign: exothermic rxn → ΔH negative)</div>
<div class="callout callout-warn"><div class="callout-title">Assumptions in Simple Calorimetry</div>
• Solution density = 1 g cm⁻³<br>
• Specific heat capacity of solution = 4.18 J g⁻¹ K⁻¹ (same as water)<br>
• No heat loss to calorimeter or surroundings<br>
These introduce systematic errors → values are approximate.</div>` },
    { icon:"📏", title:"Standard Enthalpy Changes",
      body:`<p>Standard conditions: <strong>298 K (25°C)</strong> and <strong>100 kPa</strong>, substances in standard states. Symbol: ΔH°</p>
<table><tr><th>Symbol</th><th>Name</th><th>Definition</th></tr>
<tr><td>ΔH°f</td><td>Standard enthalpy of formation</td><td>Enthalpy change when 1 mol compound formed from elements in standard states</td></tr>
<tr><td>ΔH°c</td><td>Standard enthalpy of combustion</td><td>Enthalpy change when 1 mol substance completely burned in O₂</td></tr>
<tr><td>ΔH°neut</td><td>Standard enthalpy of neutralisation</td><td>Enthalpy change when 1 mol H₂O formed from acid + alkali</td></tr>
<tr><td>ΔH°at</td><td>Standard enthalpy of atomisation</td><td>Enthalpy change when 1 mol gaseous atoms formed from element in standard state</td></tr></table>
<div class="callout callout-key"><div class="callout-title">Key Rules</div>
• ΔH°f of any element in standard state = <strong>0</strong><br>
• Strong acid + strong base: ΔH°neut ≈ −57 kJ mol⁻¹</div>` },
    { icon:"🔁", title:"Hess's Law & Calculations",
      body:`<p><strong>Hess's Law</strong>: the total enthalpy change for a reaction is independent of the route taken (only depends on initial and final states).</p>
<div class="formula">ΔH°rxn = Σ ΔH°f(products) − Σ ΔH°f(reactants)</div>
<div class="formula">ΔH°rxn = Σ ΔH°c(reactants) − Σ ΔH°c(products)  [note reversed sign for combustion]</div>
<div class="callout callout-tip"><div class="callout-title">Hess's Law Cycle Method</div>
Draw a triangle: target reaction on top, common reference level (elements or combustion products) at bottom. Arrows must be consistent — reverse an equation to reverse ΔH sign.</div>` },
    { icon:"🔗", title:"Bond Enthalpies",
      body:`<p><strong>Mean bond enthalpy</strong>: energy needed to break 1 mol of a particular bond in a gaseous molecule, averaged over many compounds. Always endothermic (positive).</p>
<div class="formula">ΔH = Σ E(bonds broken) − Σ E(bonds formed)</div>
<p>Bonds broken (reactants): endothermic (+)<br>Bonds formed (products): exothermic (−)</p>
<div class="callout callout-warn"><div class="callout-title">Limitations</div>
• Mean bond enthalpies are averages → calculations give approximate ΔH values<br>
• Only valid for <strong>gaseous</strong> reactants and products (no state changes)<br>
• Not as accurate as Hess's Law using ΔH°f values</div>` }
  ],
  quiz:[
    { q:"100 cm³ of 1.0 mol dm⁻³ HCl is mixed with 100 cm³ of 1.0 mol dm⁻³ NaOH. Temperature rises 6.8°C. What is ΔH? (assume density = 1.0 g/cm³, c = 4.18 J/g/K)", opts:["−28.4 kJ/mol","−56.8 kJ/mol","−14.2 kJ/mol","−113.6 kJ/mol"], ans:1, exp:"q = 200 × 4.18 × 6.8 = 5685 J. n(H₂O) = 0.10 mol. ΔH = −5685/0.10 = −56850 J = −56.8 kJ/mol." },
    { q:"Using ΔH°f: CH₄(g) + 2O₂(g) → CO₂(g) + 2H₂O(l). ΔH°f values: CH₄=−74.8, CO₂=−393.5, H₂O=−285.8 kJ/mol. What is ΔH°c of CH₄?", opts:["−890.3 kJ/mol","−603.3 kJ/mol","+890.3 kJ/mol","−74.8 kJ/mol"], ans:0, exp:"ΔH = [−393.5 + 2(−285.8)] − [−74.8 + 0] = −965.1 − (−74.8) = −890.3 kJ/mol." },
    { q:"In a bond enthalpy calculation, ΔH = Σ bonds broken − Σ bonds formed = 2450 − 2890. What is ΔH?", opts:["+440 kJ/mol","−440 kJ/mol","+5340 kJ/mol","−5340 kJ/mol"], ans:1, exp:"ΔH = 2450 − 2890 = −440 kJ/mol (more energy released forming bonds than absorbed breaking → exothermic)." },
    { q:"What is the standard enthalpy of formation of O₂(g)?", opts:["−498 kJ/mol","+249 kJ/mol","0 kJ/mol","+498 kJ/mol"], ans:2, exp:"By definition, ΔH°f of any element in its standard state = 0 kJ/mol." }
  ]
},
{
  id:7, title:"Redox Reactions",
  sections:[
    { icon:"⚡", title:"Oxidation States & OIL RIG",
      body:`<p><strong>OIL RIG</strong>: Oxidation Is Loss of electrons; Reduction Is Gain of electrons.</p>
<h4>Rules for assigning oxidation states (in order of priority):</h4>
<ol><li>Uncombined element = <strong>0</strong></li>
<li>Simple monatomic ion = its charge (e.g. Na⁺ = +1, Cl⁻ = −1)</li>
<li>F always = <strong>−1</strong></li>
<li>O = <strong>−2</strong> (except: peroxides = −1; OF₂ = +2; O₂F₂ = −1)</li>
<li>H = <strong>+1</strong> with non-metals (−1 in metal hydrides e.g. NaH)</li>
<li>Sum of oxidation states = overall charge on species</li></ol>
<div class="callout callout-tip"><div class="callout-title">Examples</div>
Cr in K₂Cr₂O₇: 2(+1) + 2x + 7(−2) = 0 → 2x = 12 → x = <strong>+6</strong><br>
N in NO₃⁻: x + 3(−2) = −1 → x = <strong>+5</strong><br>
S in H₂SO₄: +2 + x + (−8) = 0 → x = <strong>+6</strong></div>` },
    { icon:"⚖️", title:"Half-equations & Balancing Redox",
      body:`<h4>Steps to write half-equations (acidic solution):</h4>
<ol><li>Write unbalanced equation for species being oxidised or reduced</li>
<li>Balance non-H, non-O atoms</li>
<li>Balance O using H₂O</li>
<li>Balance H using H⁺</li>
<li>Balance charge using electrons (e⁻)</li></ol>
<div class="callout callout-tip"><div class="callout-title">Important Half-Equations</div>
MnO₄⁻ + 8H⁺ + 5e⁻ → Mn²⁺ + 4H₂O (Mn: +7 → +2, reduction, purple → colourless)<br>
Cr₂O₇²⁻ + 14H⁺ + 6e⁻ → 2Cr³⁺ + 7H₂O (Cr: +6 → +3, reduction, orange → green)<br>
I₂ + 2e⁻ → 2I⁻ (reduction)<br>
2I⁻ → I₂ + 2e⁻ (oxidation)</div>
<p>To combine: multiply half-equations to equalise electrons, then add (electrons cancel).</p>` },
    { icon:"🔋", title:"Oxidising & Reducing Agents",
      body:`<p>An <strong>oxidising agent</strong> causes another substance to be oxidised — it is itself <strong>reduced</strong> (gains electrons).<br>
A <strong>reducing agent</strong> causes another substance to be reduced — it is itself <strong>oxidised</strong> (loses electrons).</p>
<table><tr><th>Common oxidising agents</th><th>Common reducing agents</th></tr>
<tr><td>KMnO₄, K₂Cr₂O₇, Cl₂, O₂, H₂O₂, conc. H₂SO₄, HNO₃</td><td>Metals (Zn, Fe, Mg), H₂, C, CO, SO₂, Fe²⁺, I⁻, S₂O₃²⁻</td></tr></table>
<div class="callout callout-key"><div class="callout-title">Disproportionation</div>
A single element is simultaneously oxidised AND reduced in the same reaction.<br>
Example: Cl₂ + 2NaOH → NaCl + NaOCl + H₂O<br>
Cl₂ (0) → Cl⁻ (−1, reduced) and ClO⁻ (+1, oxidised)</div>` }
  ],
  quiz:[
    { q:"What is the oxidation state of Mn in MnO₄⁻?", opts:["+4","+5","+6","+7"], ans:3, exp:"x + 4(−2) = −1 → x − 8 = −1 → x = +7." },
    { q:"In: Fe + CuSO₄ → FeSO₄ + Cu, which species is the reducing agent?", opts:["Fe²⁺","Cu²⁺","Fe","SO₄²⁻"], ans:2, exp:"Fe is oxidised (0 → +2, loses electrons). The reducing agent is the species that gets oxidised = Fe." },
    { q:"Balance: MnO₄⁻ + Fe²⁺ + H⁺ → Mn²⁺ + Fe³⁺ + H₂O. How many Fe²⁺ ions are needed?", opts:["1","3","5","7"], ans:2, exp:"MnO₄⁻ gains 5e⁻; each Fe²⁺ loses 1e⁻. Need 5 Fe²⁺ to balance 5e⁻. Full equation: MnO₄⁻ + 5Fe²⁺ + 8H⁺ → Mn²⁺ + 5Fe³⁺ + 4H₂O." },
    { q:"Cl₂ + 2NaOH → NaCl + NaOCl + H₂O. What type of reaction is this?", opts:["Simple redox","Disproportionation","Neutralisation","Precipitation"], ans:1, exp:"Cl₂ goes from 0 → −1 (NaCl, reduced) AND 0 → +1 (NaOCl, oxidised). One species both oxidised and reduced = disproportionation." }
  ]
},
{
  id:8, title:"Equilibria",
  sections:[
    { icon:"⇌", title:"Dynamic Equilibrium",
      body:`<p>In a <strong>closed system</strong>, when forward rate = reverse rate and concentrations remain constant (but not zero), the system is at <strong>dynamic equilibrium</strong>.</p>
<div class="callout callout-key"><div class="callout-title">Key Features</div>
• Both forward and reverse reactions continue simultaneously<br>
• Concentrations of reactants and products are constant (not necessarily equal)<br>
• Macroscopic properties (colour, pressure, concentration) are constant<br>
• Only possible in a closed system</div>` },
    { icon:"⚖️", title:"Le Chatelier's Principle",
      body:`<p><strong>Le Chatelier's Principle</strong>: if a system at equilibrium is subjected to a change, the equilibrium shifts to <strong>oppose</strong> that change.</p>
<table><tr><th>Change applied</th><th>Equilibrium shift</th></tr>
<tr><td>↑ [reactant] concentration</td><td>→ right (uses up added reactant)</td></tr>
<tr><td>↑ [product] concentration</td><td>← left</td></tr>
<tr><td>Remove product</td><td>→ right</td></tr>
<tr><td>↑ pressure (gas equilibrium)</td><td>Towards fewer moles of gas</td></tr>
<tr><td>↑ temperature (exothermic rxn)</td><td>← left (endothermic direction)</td></tr>
<tr><td>↑ temperature (endothermic rxn)</td><td>→ right</td></tr>
<tr><td>Add catalyst</td><td>No shift — reaches equilibrium faster</td></tr></table>
<div class="callout callout-warn"><div class="callout-title">Catalyst vs Temperature</div>
A catalyst increases the rate of BOTH forward and reverse reactions equally. It does not change the position of equilibrium or Kc. It just reaches equilibrium faster.</div>` },
    { icon:"🔢", title:"Equilibrium Constant Kc",
      body:`<p>For: aA + bB ⇌ cC + dD</p>
<div class="formula">Kc = [C]ᶜ[D]ᵈ / [A]ᵃ[B]ᵇ   (concentrations in mol dm⁻³)</div>
<h4>Interpreting Kc:</h4>
<ul><li>Kc >> 1: products strongly favoured (equilibrium lies far to the right)</li>
<li>Kc = 1: roughly equal concentrations of reactants and products</li>
<li>Kc << 1: reactants strongly favoured (equilibrium lies far to the left)</li></ul>
<div class="callout callout-key"><div class="callout-title">What Changes Kc?</div>
<strong>Only temperature</strong> changes the value of Kc.<br>
• Exothermic rxn: ↑ T → Kc decreases<br>
• Endothermic rxn: ↑ T → Kc increases<br>
Concentration, pressure, and catalysts do NOT change Kc.</div>
<div class="callout callout-tip"><div class="callout-title">Pure Solids & Liquids</div>
Pure solids and liquids are NOT included in the Kc expression. Their concentrations are constant.</div>` },
    { icon:"🏭", title:"Haber Process Application",
      body:`<p><strong>N₂(g) + 3H₂(g) ⇌ 2NH₃(g)   ΔH = −92 kJ mol⁻¹</strong></p>
<p>Industrial conditions: <strong>450°C, 200 atm, iron catalyst</strong></p>
<table><tr><th>Factor</th><th>Effect on yield</th><th>Effect on rate</th><th>Industrial choice</th></tr>
<tr><td>↑ Pressure</td><td>↑ yield (4→2 mol gas)</td><td>↑ rate</td><td>200 atm (compromise: expensive/dangerous at higher)</td></tr>
<tr><td>↓ Temperature</td><td>↑ yield (exothermic)</td><td>↓ rate</td><td>450°C (compromise rate vs yield)</td></tr>
<tr><td>Iron catalyst</td><td>No effect on yield</td><td>↑ rate</td><td>Used to speed up attainment of equilibrium</td></tr></table>
<p>~15% conversion per pass. Unreacted gases are recycled → overall yield ~98%.</p>` }
  ],
  quiz:[
    { q:"For N₂ + 3H₂ ⇌ 2NH₃, what is the expression for Kc?", opts:["[NH₃]² / [N₂][H₂]³","[N₂][H₂]³ / [NH₃]²","[NH₃] / [N₂][H₂]","[NH₃]² / [N₂][H₂]"], ans:0, exp:"Kc = [products]^power / [reactants]^power = [NH₃]² / ([N₂][H₂]³)." },
    { q:"A reaction N₂O₄(g) ⇌ 2NO₂(g) is exothermic. Increasing temperature will:", opts:["Increase Kc and shift right","Decrease Kc and shift left","Increase Kc and shift left","Not change Kc"], ans:1, exp:"Wait — N₂O₄ ⇌ 2NO₂ is actually endothermic. But if exothermic: increasing T shifts to endothermic direction (left), decreasing Kc." },
    { q:"In the Haber process, why is a compromise temperature of 450°C used instead of a lower temperature?", opts:["Lower temperatures make the catalyst inactive","Higher temperature gives more NH₃","450°C gives a reasonable rate while maintaining acceptable yield","The reaction only works above 400°C"], ans:0, exp:"Lower temperatures would give higher yield (exothermic reaction) but the rate would be too slow. 450°C balances rate and yield; the catalyst is also active at this temperature." },
    { q:"What effect does a catalyst have on the equilibrium constant Kc?", opts:["Increases Kc","Decreases Kc","No effect on Kc","Doubles Kc"], ans:2, exp:"A catalyst lowers activation energy equally for forward and reverse reactions. It speeds up reaching equilibrium but does not change the equilibrium position or Kc." },
    { q:"For 2SO₂(g) + O₂(g) ⇌ 2SO₃(g), increasing pressure will:", opts:["Shift equilibrium left","Shift equilibrium right","Have no effect","Decrease Kc"], ans:1, exp:"3 mol gas on left → 2 mol gas on right. Increasing pressure shifts equilibrium to the side with fewer gas moles → right → more SO₃." }
  ]
},
{
  id:9, title:"Rates of Reaction",
  sections:[
    { icon:"⏱️", title:"Collision Theory & Rate Factors",
      body:`<p>A reaction occurs when molecules collide with <strong>energy ≥ activation energy (Ea)</strong> AND the <strong>correct orientation</strong>.</p>
<p><strong>Rate of reaction</strong> = change in concentration per unit time (mol dm⁻³ s⁻¹)</p>
<h4>Factors that increase rate:</h4>
<ul><li><strong>↑ Temperature</strong>: more frequent collisions AND higher proportion of particles with E ≥ Ea</li>
<li><strong>↑ Concentration (solutions) / ↑ pressure (gases)</strong>: more particles per unit volume → more frequent collisions</li>
<li><strong>↑ Surface area</strong>: more collisions per unit time (solid reactants)</li>
<li><strong>Catalyst</strong>: provides alternative pathway with lower Ea → greater proportion of molecules have sufficient energy</li>
<li><strong>Light</strong>: provides energy for some reactions (e.g. photochemical)</li></ul>` },
    { icon:"📈", title:"Maxwell-Boltzmann Distribution",
      body:`<p>Shows the distribution of kinetic energies among molecules at a given temperature.</p>
<h4>Key features of the curve:</h4>
<ul><li>Starts at origin (no molecules have zero energy)</li>
<li>Rises to a peak (most probable energy)</li>
<li>Long tail to the right (some molecules have very high energy)</li>
<li>Area under curve = total number of molecules (constant)</li>
<li>Particles with E ≥ Ea can react (area under curve to right of Ea)</li></ul>
<div class="callout callout-key"><div class="callout-title">Effect of Increasing Temperature</div>
• Curve shifts right and flattens (same area = same number of molecules)<br>
• Peak moves to higher energy<br>
• Many more molecules now have E ≥ Ea (area beyond Ea greatly increases)<br>
• A 10°C rise roughly <strong>doubles</strong> the rate for many reactions</div>
<div class="callout callout-tip"><div class="callout-title">Effect of Catalyst</div>
• Same temperature distribution (unchanged curve)<br>
• Ea line moves to the LEFT (lower Ea)<br>
• Greater proportion of molecules have E ≥ new Ea → faster rate</div>` },
    { icon:"🔢", title:"Rate Equations & Orders",
      body:`<p>For reaction: A + B → products</p>
<div class="formula">rate = k[A]ᵐ[B]ⁿ</div>
<p>m = order with respect to A, n = order with respect to B (found <strong>experimentally</strong>, NOT from equation).<br>
Overall order = m + n. k = rate constant (units depend on overall order).</p>
<table><tr><th>Overall order</th><th>Units of k</th><th>Rate vs [A] graph</th></tr>
<tr><td>0</td><td>mol dm⁻³ s⁻¹</td><td>Horizontal line</td></tr>
<tr><td>1</td><td>s⁻¹</td><td>Straight line through origin</td></tr>
<tr><td>2</td><td>mol⁻¹ dm³ s⁻¹</td><td>Curve (upward parabola)</td></tr></table>
<div class="callout callout-key"><div class="callout-title">Determining Orders from Initial Rates</div>
Compare experiments where one concentration changes:<br>
If [A] doubles and rate doubles → 1st order in A<br>
If [A] doubles and rate quadruples → 2nd order in A<br>
If [A] doubles and rate unchanged → 0th order in A</div>` },
    { icon:"⏰", title:"Half-life & Rate Constant",
      body:`<p><strong>Half-life (t½)</strong>: time for concentration of a reactant to halve.</p>
<div class="callout callout-key"><div class="callout-title">First-Order Reactions</div>
• Half-life is <strong>constant</strong> (independent of initial concentration)<br>
• t½ = ln2 / k = 0.693 / k<br>
• [A] vs time: exponential decay curve<br>
• ln[A] vs time: straight line with slope = −k</div>
<div class="callout callout-tip"><div class="callout-title">Temperature & k</div>
Increasing temperature increases k (the rate constant). The Arrhenius equation relates k to T: k = Ae^(−Ea/RT). Higher T → larger k → faster rate for same concentrations.</div>` }
  ],
  quiz:[
    { q:"For a reaction, doubling [A] doubles the rate and doubling [B] quadruples the rate. What is the overall order?", opts:["1","2","3","4"], ans:2, exp:"Order in A = 1, order in B = 2. Overall order = 1 + 2 = 3." },
    { q:"A first-order reaction has t½ = 20 min. What fraction of reactant remains after 60 min?", opts:["1/4","1/6","1/8","1/3"], ans:2, exp:"60 min = 3 half-lives. After each t½: 1 → 1/2 → 1/4 → 1/8." },
    { q:"What happens to the Maxwell-Boltzmann distribution when temperature increases?", opts:["Peak gets taller and moves left","Peak flattens and shifts right; area stays same","Peak gets taller; area increases","Curve becomes narrower"], ans:1, exp:"Higher T: molecules have more energy on average → peak shifts right and flattens. Total molecules (area) stays constant." },
    { q:"The units of the rate constant k for a second-order reaction are:", opts:["mol dm⁻³ s⁻¹","s⁻¹","mol⁻¹ dm³ s⁻¹","mol⁻² dm⁶ s⁻¹"], ans:2, exp:"For 2nd order: rate = k[A]². k = rate/[A]² = (mol dm⁻³ s⁻¹)/(mol dm⁻³)² = mol⁻¹ dm³ s⁻¹." },
    { q:"How does a catalyst increase reaction rate?", opts:["By increasing collision frequency","By increasing temperature","By providing an alternative pathway with lower activation energy","By increasing concentrations"], ans:2, exp:"A catalyst provides an alternative mechanism with lower Ea. More molecules have E ≥ Ea → faster rate. Collision frequency and temperature unchanged." }
  ]
},
{
  id:10, title:"Periodicity",
  sections:[
    { icon:"📊", title:"Trends Across Period 3",
      body:`<p>Period 3: Na → Mg → Al → Si → P → S → Cl → Ar</p>
<table><tr><th>Property</th><th>Trend across Period 3</th><th>Reason</th></tr>
<tr><td>Atomic radius</td><td>Decreases Na → Cl</td><td>↑ nuclear charge, same shell, same shielding → greater pull</td></tr>
<tr><td>1st ionisation energy</td><td>Generally increases</td><td>↑ Z, ↓ radius (exceptions: Al < Mg; S < P)</td></tr>
<tr><td>Electronegativity</td><td>Increases</td><td>↑ Z, ↓ radius</td></tr>
<tr><td>Melting point</td><td>Increases Na→Al, peak at Si, then drops</td><td>Metallic (Na→Al): stronger with more valence e⁻; Si: giant covalent; P,S,Cl: simple molecular (LDF increase)</td></tr></table>
<div class="callout callout-warn"><div class="callout-title">IE Anomalies</div>
Al IE < Mg IE: Al's 3p electron is higher energy and slightly shielded by 3s → easier to remove than Mg's 3s.<br>
S IE < P IE: S has a paired 3p electron (repulsion makes it easier to remove) vs P with 3 singly occupied 3p.</div>` },
    { icon:"💧", title:"Oxides of Period 3",
      body:`<p>Oxide character changes from <strong>basic → amphoteric → acidic</strong> across the period.</p>
<table><tr><th>Oxide</th><th>Type</th><th>Reaction with H₂O</th><th>pH of solution</th></tr>
<tr><td>Na₂O</td><td>Basic</td><td>Na₂O + H₂O → 2NaOH</td><td>~13</td></tr>
<tr><td>MgO</td><td>Basic</td><td>MgO + H₂O → Mg(OH)₂ (slightly soluble)</td><td>~9</td></tr>
<tr><td>Al₂O₃</td><td>Amphoteric</td><td>Does not dissolve easily in water</td><td>—</td></tr>
<tr><td>SiO₂</td><td>Weakly acidic</td><td>Does not react with water</td><td>—</td></tr>
<tr><td>P₄O₁₀</td><td>Acidic</td><td>P₄O₁₀ + 6H₂O → 4H₃PO₄</td><td>~2</td></tr>
<tr><td>SO₂</td><td>Acidic</td><td>SO₂ + H₂O → H₂SO₃</td><td>~2</td></tr>
<tr><td>SO₃</td><td>Acidic</td><td>SO₃ + H₂O → H₂SO₄</td><td>~1</td></tr>
<tr><td>Cl₂O₇</td><td>Strongly acidic</td><td>→ HClO₄</td><td>~0</td></tr></table>
<div class="callout callout-tip"><div class="callout-title">Al₂O₃ is Amphoteric</div>
Reacts with acid: Al₂O₃ + 6HCl → 2AlCl₃ + 3H₂O<br>
Reacts with alkali: Al₂O₃ + 2NaOH + 3H₂O → 2NaAl(OH)₄</div>` },
    { icon:"🌊", title:"Chlorides of Period 3",
      body:`<p>Reaction with water:</p>
<table><tr><th>Chloride</th><th>Bonding</th><th>Reaction with water</th><th>Product</th></tr>
<tr><td>NaCl</td><td>Ionic</td><td>Dissolves: Na⁺ + Cl⁻</td><td>Neutral solution</td></tr>
<tr><td>MgCl₂</td><td>Ionic</td><td>Dissolves; slight hydrolysis of Mg²⁺</td><td>Slightly acidic</td></tr>
<tr><td>AlCl₃</td><td>Covalent character</td><td>Vigorous hydrolysis; Al³⁺ + 3H₂O → Al(OH)₃ + 3H⁺</td><td>Acidic, fumes of HCl</td></tr>
<tr><td>SiCl₄</td><td>Covalent</td><td>SiCl₄ + 2H₂O → SiO₂ + 4HCl</td><td>Acidic (HCl fumes)</td></tr>
<tr><td>PCl₃</td><td>Covalent</td><td>PCl₃ + 3H₂O → H₃PO₃ + 3HCl</td><td>Acidic (HCl fumes)</td></tr>
<tr><td>PCl₅</td><td>Covalent</td><td>PCl₅ + 4H₂O → H₃PO₄ + 5HCl</td><td>Acidic (HCl fumes)</td></tr></table>` }
  ],
  quiz:[
    { q:"Why does first ionisation energy generally increase across Period 3?", opts:["Atomic radius increases","Nuclear charge increases with same shielding level and decreasing radius","More neutrons are added","Shielding increases significantly"], ans:1, exp:"Across a period: Z increases (more protons pull electrons in), same shell (same shielding), decreasing radius → stronger attraction → higher IE." },
    { q:"Why is the 1st IE of sulfur slightly less than that of phosphorus?", opts:["S has more protons","S has a paired 3p electron which experiences extra repulsion making it easier to remove","S is a larger atom","S has more shielding"], ans:1, exp:"P: 3p³ (three singly occupied 3p). S: 3p⁴ (one paired 3p). The paired electron in S repels its partner → easier to remove → lower IE." },
    { q:"Which Period 3 oxide is amphoteric?", opts:["Na₂O","MgO","Al₂O₃","SiO₂"], ans:2, exp:"Al₂O₃ reacts with both acids and alkalis — it is amphoteric." },
    { q:"What is produced when SiCl₄ reacts with water?", opts:["SiO₂ + 4HCl","SiCl₂ + 2HCl","SiH₄ + 4HCl","Si + 4HCl"], ans:0, exp:"SiCl₄ + 2H₂O → SiO₂ + 4HCl. The covalent chloride hydrolyses completely, giving steamy fumes of HCl." }
  ]
},
{
  id:11, title:"Group 2",
  sections:[
    { icon:"⬇️", title:"Trends Down Group 2",
      body:`<p>Group 2 elements: Be, Mg, Ca, Sr, Ba</p>
<table><tr><th>Property</th><th>Trend down Group 2</th><th>Reason</th></tr>
<tr><td>Atomic radius</td><td>Increases</td><td>More electron shells</td></tr>
<tr><td>1st IE</td><td>Decreases</td><td>↑ radius, ↑ shielding</td></tr>
<tr><td>Reactivity of metals</td><td>Increases</td><td>Outer electrons further away, easier to lose</td></tr>
<tr><td>Melting point</td><td>Generally decreases (not regular)</td><td>Metallic bonding changes</td></tr></table>` },
    { icon:"🔥", title:"Reactions of Group 2 Metals",
      body:`<h4>With oxygen:</h4>
<div class="formula">2Mg + O₂ → 2MgO (burns brilliantly white)</div>
<div class="formula">2Ba + O₂ → 2BaO</div>
<h4>With water:</h4>
<div class="formula">Mg + 2H₂O(l) → Mg(OH)₂ + H₂ (slow with cold water)</div>
<div class="formula">Mg + H₂O(g) → MgO + H₂ (reacts with steam)</div>
<div class="formula">Ca + 2H₂O → Ca(OH)₂ + H₂ (vigorous)</div>
<div class="formula">Ba + 2H₂O → Ba(OH)₂ + H₂ (very vigorous)</div>
<h4>With dilute acids:</h4>
<div class="formula">Mg + H₂SO₄ → MgSO₄ + H₂</div>
<p>Note: Ca/Sr/Ba + H₂SO₄ → reaction slows due to insoluble sulfate layer coating the metal.</p>` },
    { icon:"🧫", title:"Hydroxides, Sulfates & Carbonates",
      body:`<h4>Hydroxide solubility (increases down group):</h4>
<table><tr><th>Hydroxide</th><th>Solubility</th></tr>
<tr><td>Be(OH)₂</td><td>Almost insoluble</td></tr>
<tr><td>Mg(OH)₂</td><td>Slightly soluble (suspension = "milk of magnesia")</td></tr>
<tr><td>Ca(OH)₂</td><td>Slightly soluble (limewater)</td></tr>
<tr><td>Sr(OH)₂</td><td>Soluble</td></tr>
<tr><td>Ba(OH)₂</td><td>Soluble</td></tr></table>
<h4>Sulfate solubility (decreases down group):</h4>
<p>MgSO₄ (soluble) → CaSO₄ (slightly soluble) → SrSO₄ (insoluble) → BaSO₄ (insoluble)</p>
<div class="callout callout-key"><div class="callout-title">Test for Sulfate Ions</div>
Add acidified BaCl₂ (or Ba(NO₃)₂ + dilute HNO₃/HCl) → white precipitate of BaSO₄ confirms SO₄²⁻</div>
<h4>Thermal stability of carbonates and nitrates:</h4>
<p>Increases down the group (larger cation polarises the anion less → harder to decompose).<br>
MgCO₃ → MgO + CO₂ (relatively low temperature)<br>
BaCO₃ → BaO + CO₂ (requires much higher temperature)</p>` }
  ],
  quiz:[
    { q:"Which Group 2 metal reacts most vigorously with cold water?", opts:["Mg","Ca","Ba","Be"], ans:2, exp:"Reactivity increases down Group 2. Ba reacts most vigorously with cold water." },
    { q:"Which Group 2 sulfate is the most soluble?", opts:["BaSO₄","SrSO₄","CaSO₄","MgSO₄"], ans:3, exp:"Solubility of sulfates decreases down Group 2. MgSO₄ (top of group) is the most soluble." },
    { q:"What is observed when barium chloride solution is added to dilute sulfuric acid?", opts:["No reaction","Green precipitate","White precipitate of BaSO₄","Blue precipitate"], ans:2, exp:"Ba²⁺(aq) + SO₄²⁻(aq) → BaSO₄(s) — white precipitate, insoluble even in acid." },
    { q:"Why does the thermal stability of Group 2 carbonates increase down the group?", opts:["Larger anions are easier to decompose","Larger cations have less polarising power so distort CO₃²⁻ less","More covalent character down the group","Higher mp prevents decomposition"], ans:1, exp:"Smaller cations (higher charge density) polarise CO₃²⁻ more, weakening C–O bonds → easier thermal decomposition. Larger cations down the group polarise less → more stable." }
  ]
},
{
  id:12, title:"Group 17 (Halogens)",
  sections:[
    { icon:"🔽", title:"Trends Down Group 17",
      body:`<table><tr><th>Property</th><th>F</th><th>Cl</th><th>Br</th><th>I</th></tr>
<tr><td>State (room temp)</td><td>Gas</td><td>Gas</td><td>Liquid</td><td>Solid</td></tr>
<tr><td>Colour</td><td>Pale yellow</td><td>Yellow-green</td><td>Red-brown</td><td>Purple-grey</td></tr>
<tr><td>Boiling point</td><td>−188°C</td><td>−34°C</td><td>59°C</td><td>184°C</td></tr>
<tr><td>Electronegativity</td><td>Highest (4.0)</td><td>3.0</td><td>2.8</td><td>2.5</td></tr>
<tr><td>Oxidising power</td><td>Strongest</td><td>Strong</td><td>Medium</td><td>Weak</td></tr></table>
<p>Boiling point increases due to ↑ LDF (more electrons, larger atoms).</p>
<p>Oxidising power decreases: F > Cl > Br > I (harder to gain electrons as atomic radius increases and electron is added further from nucleus).</p>` },
    { icon:"🔀", title:"Displacement Reactions",
      body:`<p>A more reactive halogen displaces a less reactive halide from solution. The halogen is reduced (gains electrons from halide).</p>
<div class="formula">Cl₂(aq) + 2KBr(aq) → 2KCl(aq) + Br₂(aq)  [Cl₂ oxidises Br⁻]</div>
<div class="formula">Br₂(aq) + 2KI(aq) → 2KBr(aq) + I₂(aq)   [Br₂ oxidises I⁻]</div>
<p>Cl₂ cannot be displaced by Br₂ or I₂.</p>
<div class="callout callout-key"><div class="callout-title">Identifying Halogens in Organic Layer</div>
Add cyclohexane (or other organic solvent) and shake. Colour in organic layer:<br>
Cl₂ → very pale yellow (almost colourless)<br>
Br₂ → orange-brown<br>
I₂ → purple/violet</div>` },
    { icon:"🌊", title:"Reactions with Water & NaOH",
      body:`<p>Chlorine in water — disproportionation:</p>
<div class="formula">Cl₂ + H₂O ⇌ HCl + HClO  (Cl: 0 → −1 and +1)</div>
<p>HClO (chloric(I) acid / hypochlorous acid) is a weak acid and bleaching agent. Used to disinfect drinking water and swimming pools.</p>
<p>Cl₂ in cold dilute NaOH (bleach manufacture):</p>
<div class="formula">Cl₂ + 2NaOH → NaCl + NaOCl + H₂O</div>
<p>Cl₂ in hot concentrated NaOH:</p>
<div class="formula">3Cl₂ + 6NaOH → 5NaCl + NaClO₃ + 3H₂O</div>
<div class="callout callout-tip"><div class="callout-title">Test for Halide Ions</div>
1. Acidify with dilute HNO₃ (removes CO₃²⁻, SO₃²⁻ etc.)<br>
2. Add AgNO₃(aq):<br>
Cl⁻ → AgCl white precipitate (dissolves in dilute NH₃)<br>
Br⁻ → AgBr cream precipitate (dissolves in conc. NH₃ only)<br>
I⁻ → AgI yellow precipitate (insoluble in NH₃)</div>` }
  ],
  quiz:[
    { q:"Will iodine solution react with potassium chloride solution?", opts:["Yes, Cl is displaced","No, I₂ is less reactive than Cl₂","Yes, KCl oxidises I₂","Yes, with a catalyst"], ans:1, exp:"I₂ cannot oxidise Cl⁻ because Cl₂ is a stronger oxidising agent than I₂. Reactivity: F > Cl > Br > I." },
    { q:"What colour is bromine in a cyclohexane layer?", opts:["Pale yellow","Purple","Orange-brown","Colourless"], ans:2, exp:"Br₂ dissolved in organic solvent (cyclohexane) gives an orange-brown colour." },
    { q:"Silver bromide precipitate dissolves in:", opts:["Dilute NH₃","Concentrated NH₃ only","Water","Dilute HNO₃"], ans:1, exp:"AgCl dissolves in dilute NH₃; AgBr dissolves only in concentrated NH₃; AgI is insoluble in NH₃." },
    { q:"Cl₂ + 2NaOH → NaCl + NaOCl + H₂O. What type of reaction is this?", opts:["Neutralisation","Displacement","Disproportionation","Precipitation"], ans:2, exp:"Cl₂ (0) → Cl⁻ (−1, reduced) and ClO⁻ (+1, oxidised) — same element oxidised and reduced = disproportionation." }
  ]
},
{
  id:13, title:"Nitrogen",
  sections:[
    { icon:"🌱", title:"The Haber Process",
      body:`<p>Industrial production of ammonia:</p>
<div class="formula">N₂(g) + 3H₂(g) ⇌ 2NH₃(g)   ΔH = −92 kJ mol⁻¹</div>
<p><strong>Conditions:</strong> 400–450°C, 200 atm, iron catalyst (with K₂O and Al₂O₃ as promoters)</p>
<p>N₂ from fractional distillation of liquid air. H₂ from steam reforming of natural gas.</p>
<p>~15% conversion per pass; unreacted gases recycled → overall ~98% efficiency.</p>
<div class="callout callout-key"><div class="callout-title">Industrial Compromise</div>
Low T → high yield but too slow; high T → fast but low yield. 450°C = compromise.<br>
High pressure → high yield and rate; 200 atm = compromise (higher pressure too expensive/dangerous).<br>
Catalyst increases rate without affecting equilibrium position.</div>` },
    { icon:"⚗️", title:"Ostwald Process — Nitric Acid",
      body:`<p>Manufacturing HNO₃ from ammonia (three stages):</p>
<ol><li><strong>Catalytic oxidation of NH₃:</strong><br>4NH₃ + 5O₂ → 4NO + 6H₂O (Pt/Rh gauze catalyst, ~900°C)</li>
<li><strong>Oxidation of NO:</strong><br>2NO + O₂ → 2NO₂</li>
<li><strong>Absorption in water:</strong><br>4NO₂ + O₂ + 2H₂O → 4HNO₃</li></ol>
<p>HNO₃ is used to make ammonium nitrate fertiliser: HNO₃ + NH₃ → NH₄NO₃</p>` },
    { icon:"💧", title:"Chemistry of Ammonia",
      body:`<p>NH₃ is a weak base (lone pair on N acts as proton acceptor):</p>
<div class="formula">NH₃ + H₂O ⇌ NH₄⁺ + OH⁻   (pKb = 4.75)</div>
<div class="formula">NH₃(g) + HCl(g) → NH₄Cl(s)   white smoke</div>
<div class="formula">NH₃ + H₂SO₄ → (NH₄)₂SO₄   (ammonium sulfate fertiliser)</div>
<p>NH₃ as ligand: donates lone pair → complex ions<br>
[Cu(NH₃)₄]²⁺: deep blue, formed by adding excess NH₃ to Cu²⁺(aq)<br>
[Ag(NH₃)₂]⁺: colourless, formed in Tollens' reagent</p>
<div class="callout callout-tip"><div class="callout-title">Test for NH₃</div>
Turns moist red litmus paper blue (alkaline gas). Also: dense white smoke with HCl(g).</div>` }
  ],
  quiz:[
    { q:"Why does the Haber process use a temperature of ~450°C rather than room temperature?", opts:["Room temperature gives no yield","Lower temperature gives higher yield but the rate is too slow","Catalyst only works above 450°C","N₂ and H₂ only react above 400°C"], ans:1, exp:"Lower temperature would give higher yield (exothermic, Le Chatelier) but rate is too slow. 450°C is a compromise between yield and rate." },
    { q:"In the Ostwald process, what catalyst is used in the first step?", opts:["Iron","Vanadium(V) oxide","Platinum-rhodium gauze","Nickel"], ans:2, exp:"Catalytic oxidation of NH₃ uses a platinum-rhodium gauze catalyst at ~900°C." },
    { q:"What is observed when ammonia gas meets hydrogen chloride gas?", opts:["Colourless gas produced","Dense white smoke of NH₄Cl","Yellow precipitate","No visible reaction"], ans:1, exp:"NH₃(g) + HCl(g) → NH₄Cl(s) — white solid particles formed in air appear as dense white smoke." },
    { q:"What is the role of the iron catalyst in the Haber process?", opts:["Increases the equilibrium yield of NH₃","Increases rate of reaching equilibrium without changing yield","Provides nitrogen atoms","Removes NH₃ from the system"], ans:1, exp:"Catalyst lowers activation energy equally for forward and reverse reactions → equilibrium reached faster. No effect on Kc or equilibrium yield." }
  ]
},
{
  id:14, title:"Introduction to Organic Chemistry",
  sections:[
    { icon:"🔤", title:"Nomenclature & Functional Groups",
      body:`<p>IUPAC names based on: longest C chain → prefix (functional group) + stem (chain length) + suffix.</p>
<table><tr><th>n carbons</th><th>Stem</th></tr>
<tr><td>1</td><td>meth-</td></tr><tr><td>2</td><td>eth-</td></tr><tr><td>3</td><td>prop-</td></tr>
<tr><td>4</td><td>but-</td></tr><tr><td>5</td><td>pent-</td></tr><tr><td>6</td><td>hex-</td></tr></table>
<table><tr><th>Functional group</th><th>Suffix</th><th>Example</th></tr>
<tr><td>C–C (alkane)</td><td>-ane</td><td>ethane, C₂H₆</td></tr>
<tr><td>C=C (alkene)</td><td>-ene</td><td>propene, C₃H₆</td></tr>
<tr><td>–OH (alcohol)</td><td>-ol</td><td>butan-2-ol</td></tr>
<tr><td>–CHO (aldehyde)</td><td>-al</td><td>ethanal</td></tr>
<tr><td>C=O (ketone)</td><td>-one</td><td>propanone</td></tr>
<tr><td>–COOH (carboxylic acid)</td><td>-oic acid</td><td>ethanoic acid</td></tr>
<tr><td>–COO– (ester)</td><td>-oate</td><td>ethyl ethanoate</td></tr>
<tr><td>–NH₂ (amine)</td><td>-amine / -ylamine</td><td>ethylamine</td></tr>
<tr><td>C–X (halogenoalkane)</td><td>halo- prefix</td><td>1-bromobutane</td></tr>
<tr><td>–CN (nitrile)</td><td>-nitrile / -carbonitrile</td><td>ethanenitrile</td></tr></table>` },
    { icon:"🔄", title:"Isomerism",
      body:`<h4>Structural isomers: same molecular formula, different structural formula</h4>
<ul><li><strong>Chain isomers</strong>: different carbon skeleton arrangement</li>
<li><strong>Position isomers</strong>: functional group in different position on same chain</li>
<li><strong>Functional group isomers</strong>: different functional groups (e.g. C₂H₆O: ethanol vs methoxymethane)</li></ul>
<h4>Stereoisomers: same structural formula, different spatial arrangement</h4>
<ul><li><strong>E/Z (geometric) isomerism</strong>: restricted rotation around C=C; requires 2 different groups on each C of the double bond. Z = same side (German: zusammen); E = opposite (entgegen).</li>
<li><strong>Optical isomerism</strong>: chiral centre = carbon with 4 different groups attached. Non-superimposable mirror images = enantiomers. Rotate plane-polarised light in opposite directions. A racemic mixture (equal enantiomers) is optically inactive.</li></ul>` },
    { icon:"⚡", title:"Reaction Mechanisms",
      body:`<h4>Bond fission:</h4>
<ul><li><strong>Homolytic fission</strong>: each atom gets 1 electron → free radicals (·). Requires energy (UV or heat). Non-polar/low-polarity bonds.</li>
<li><strong>Heterolytic fission</strong>: both electrons go to one atom → ions (cation + anion). Polar bonds.</li></ul>
<h4>Types of reagents:</h4>
<ul><li><strong>Electrophile</strong>: electron pair acceptor, attracted to regions of high electron density. Examples: H⁺, Br₂, HBr, NO₂⁺, carbocations.</li>
<li><strong>Nucleophile</strong>: electron pair donor, has lone pair. Examples: OH⁻, CN⁻, NH₃, H₂O, halide ions.</li>
<li><strong>Free radical</strong>: species with unpaired electron. Reactive, not charged.</li></ul>
<h4>Mechanism types:</h4>
<table><tr><th>Type</th><th>Abbreviation</th><th>Example</th></tr>
<tr><td>Electrophilic addition</td><td>EA</td><td>Alkenes + HBr</td></tr>
<tr><td>Nucleophilic substitution</td><td>SN</td><td>Halogenoalkanes + OH⁻</td></tr>
<tr><td>Free radical substitution</td><td>FRS</td><td>Alkanes + Cl₂/UV</td></tr>
<tr><td>Electrophilic substitution</td><td>ES</td><td>Benzene + Br₂</td></tr>
<tr><td>Nucleophilic addition</td><td>NA</td><td>Aldehydes + HCN</td></tr></table>` }
  ],
  quiz:[
    { q:"What is the IUPAC name of CH₃CH(OH)CH₂CH₃?", opts:["Butan-1-ol","Butan-2-ol","2-methylpropan-1-ol","Butan-3-ol"], ans:1, exp:"4-carbon chain with OH on carbon 2 = butan-2-ol." },
    { q:"Which condition is required for E/Z isomerism?", opts:["A chiral centre","Free rotation around a C–C single bond","Two different groups on each carbon of a C=C bond","A ring structure"], ans:2, exp:"E/Z isomerism requires: (1) restricted rotation (C=C), AND (2) two different groups on each carbon of the double bond." },
    { q:"What type of bond fission produces free radicals?", opts:["Heterolytic fission","Homolytic fission","Ionic fission","Nucleophilic fission"], ans:1, exp:"Homolytic fission: each atom gets one electron → two free radicals. Initiated by UV light or high temperature." },
    { q:"A carbon atom bonded to 4 different groups is called:", opts:["A chiral centre","An asymmetric carbon","A stereocentre","All of the above are correct"], ans:3, exp:"All three terms — chiral centre, asymmetric carbon, stereocentre — correctly describe a carbon with 4 different substituents." },
    { q:"Which of the following is a nucleophile?", opts:["BF₃","H⁺","CN⁻","Br₂"], ans:2, exp:"CN⁻ has a lone pair on C and a negative charge — it donates electrons = nucleophile. The others are electrophiles." }
  ]
},
{
  id:15, title:"Hydrocarbons",
  sections:[
    { icon:"⛽", title:"Alkanes & Free Radical Substitution",
      body:`<p>Alkanes (CₙH₂ₙ₊₂): saturated, non-polar, unreactive towards ionic reagents. React via <strong>free radical substitution</strong> with halogens in UV light.</p>
<h4>Mechanism for CH₄ + Cl₂:</h4>
<ul><li><strong>Initiation</strong>: Cl₂ →(UV) 2Cl· (homolytic fission)</li>
<li><strong>Propagation</strong> (2 steps that repeat):
  <div class="formula">Cl· + CH₄ → HCl + CH₃·</div>
  <div class="formula">CH₃· + Cl₂ → CH₃Cl + Cl·</div></li>
<li><strong>Termination</strong>: two radicals combine, e.g.:
  <div class="formula">2Cl· → Cl₂   or   CH₃· + Cl· → CH₃Cl   or   2CH₃· → C₂H₆</div></li></ul>
<div class="callout callout-warn"><div class="callout-title">Drawback</div>
Poor selectivity — gives a mixture of mono, di, tri... substituted products. Not useful for preparing a single pure product.</div>` },
    { icon:"🔗", title:"Alkenes & Electrophilic Addition",
      body:`<p>Alkenes (CₙH₂ₙ): contain C=C (one σ bond + one π bond). The π bond is above/below plane → high electron density → attacked by electrophiles.</p>
