<h4>Reactions of alkenes — electrophilic addition:</h4>
<table><tr><th>Reagent</th><th>Conditions</th><th>Product</th></tr>
<tr><td>H₂</td><td>Ni, 150°C (hydrogenation)</td><td>Alkane</td></tr>
<tr><td>Br₂ (bromine water)</td><td>Room temp</td><td>Dibromoalkane (decolourises orange → colourless)</td></tr>
<tr><td>HBr</td><td>Room temp</td><td>Bromoalkane</td></tr>
<tr><td>H₂SO₄ (conc.) then H₂O</td><td>Room temp → warm with water</td><td>Alcohol</td></tr>
<tr><td>H₂O (steam)</td><td>H₃PO₄ catalyst, 300°C, 70 atm</td><td>Alcohol (industrial)</td></tr></table>
<div class="callout callout-key"><div class="callout-title">Markovnikov's Rule</div>
When HX adds to an unsymmetrical alkene, the H adds to the C with more H substituents (the more substituted carbocation intermediate is more stable).<br>
E.g. propene + HBr → 2-bromopropane (major) + 1-bromopropane (minor)</div>
<div class="callout callout-tip"><div class="callout-title">Test for Alkenes</div>
Add bromine water → decolourises from orange to colourless. Alkanes don't react.</div>` },
    { icon:"🔁", title:"Addition Polymerisation",
      body:`<p>Alkene monomers undergo addition polymerisation — the double bond opens and monomers join in a chain.</p>
<div class="formula">n CH₂=CH₂ → –(CH₂–CH₂)ₙ–   poly(ethene)</div>
<div class="formula">n CH₂=CHCH₃ → –(CH₂–CHCH₃)ₙ–   poly(propene)</div>
<p>The repeat unit has the same empirical formula as the monomer. In the polymer, the double bond is replaced by two single bonds extending the chain.</p>
<div class="callout callout-warn"><div class="callout-title">Drawing Polymers</div>
Show the repeat unit in square brackets [ ] with n subscript. The single bonds must cross the brackets (showing the chain continues).</div>` }
  ],
  quiz:[
    { q:"Which reagent and conditions are used to test for a C=C double bond?", opts:["HCl gas","KMnO₄(aq), acidic","Bromine water, room temperature","NaOH(aq), warm"], ans:2, exp:"Bromine water (orange) is decolourised by alkenes at room temperature via electrophilic addition across the C=C bond." },
    { q:"In free radical substitution, what is the role of UV light?", opts:["Increases temperature","Provides energy for homolytic fission of Cl–Cl bond","Acts as a catalyst","Ionises the chlorine"], ans:1, exp:"UV light provides photons with enough energy to cause homolytic fission of Cl₂ → 2Cl· initiating the chain reaction." },
    { q:"What is the major product when HBr adds to propene (CH₃CH=CH₂)?", opts:["1-bromopropane","2-bromopropane","1,2-dibromopropane","3-bromopropane"], ans:1, exp:"By Markovnikov's rule, Br⁻ adds to the more substituted carbon (C2) → 2-bromopropane. The secondary carbocation intermediate (C2) is more stable than primary (C1)." },
    { q:"Which statement about addition polymers is correct?", opts:["They contain a C=C in the repeat unit","The repeat unit has different formula to the monomer","No other product is formed","They are biodegradable"], ans:2, exp:"In addition polymerisation: monomer double bond opens → polymer chain. No other products. Repeat unit has same atoms as monomer." }
  ]
},
{
  id:16, title:"Halogenoalkanes",
  sections:[
    { icon:"🔄", title:"Nucleophilic Substitution",
      body:`<p>C–X bond is polar (X is electronegative → Cδ+ Xδ⁻). The δ+ carbon is attacked by nucleophiles.</p>
<table><tr><th>Nucleophile</th><th>Reagent/Conditions</th><th>Product</th><th>Type</th></tr>
<tr><td>OH⁻</td><td>Aqueous NaOH or KOH, heat/reflux</td><td>Alcohol</td><td>SN</td></tr>
<tr><td>CN⁻</td><td>Ethanolic KCN, warm</td><td>Nitrile (chain +1C)</td><td>SN</td></tr>
<tr><td>NH₃</td><td>Excess ethanolic NH₃, heat, sealed tube</td><td>Amine (primary)</td><td>SN</td></tr>
<tr><td>I⁻ (from KI)</td><td>Ethanolic KI</td><td>Iodoalkane</td><td>SN</td></tr></table>
<div class="callout callout-key"><div class="callout-title">C–X Bond Reactivity</div>
Bond strength: C–F > C–Cl > C–Br > C–I<br>
Reactivity in SN: R–F << R–Cl < R–Br < R–I<br>
C–I weakest → breaks most easily → fastest SN reaction.<br>
(Not electronegativity that matters — it's bond enthalpy)</div>` },
    { icon:"💧", title:"Elimination Reactions",
      body:`<p>Under different conditions, halogenoalkanes can undergo <strong>elimination</strong> instead of substitution:</p>
<div class="formula">RCH₂CH₂Br + KOH(ethanolic) → RCH=CH₂ + KBr + H₂O</div>
<div class="callout callout-key"><div class="callout-title">SN vs Elimination — Key Conditions</div>
<strong>Nucleophilic substitution</strong>: NaOH/KOH dissolved in <strong>water</strong> (aqueous), heat<br>
<strong>Elimination</strong>: KOH dissolved in <strong>ethanol</strong> (ethanolic), heat<br>
In both cases OH⁻ is the reagent — the solvent determines the pathway.</div>
<p>Tertiary halogenoalkanes prefer elimination; primary prefer substitution; secondary give a mixture.</p>` },
    { icon:"🌍", title:"Environmental Impact — CFCs & Ozone",
      body:`<p><strong>CFCs</strong> (chlorofluorocarbons, e.g. CCl₃F): formerly used as aerosol propellants and refrigerants. Very unreactive in troposphere but reach stratosphere.</p>
<p>UV radiation causes homolytic fission of C–Cl bond:</p>
<div class="formula">CCl₂F₂ → ·CClF₂ + Cl·</div>
<p>Cl· radicals catalyse ozone destruction:</p>
<div class="formula">Cl· + O₃ → ClO· + O₂</div>
<div class="formula">ClO· + O₃ → Cl· + 2O₂</div>
<p>Cl· is regenerated (catalytic) → one Cl radical can destroy ~100,000 ozone molecules!</p>
<div class="callout callout-tip"><div class="callout-title">HFCs — The Replacement</div>
Hydrofluorocarbons (HFCs) replaced CFCs. Contain no Cl → no Cl radicals → don't destroy ozone. However, HFCs are potent greenhouse gases.</div>` }
  ],
  quiz:[
    { q:"Why is 1-iodopropane more reactive in nucleophilic substitution than 1-fluoropropane?", opts:["C–I is more polar","C–I bond is weaker (lower bond enthalpy) so easier to break","Iodine is a better leaving group and C–I bond is shorter","Fluorine is too small"], ans:1, exp:"Bond enthalpy C–F > C–I. The weaker C–I bond requires less energy to break → faster SN reaction. Bond polarity and electronegativity are NOT the key factors here." },
    { q:"Which reagent and solvent produce an alkene from a halogenoalkane?", opts:["NaOH in water","NaOH in ethanol (ethanolic)","HCl in water","AgNO₃ in ethanol"], ans:1, exp:"Elimination requires KOH/NaOH dissolved in ethanol (ethanolic). Aqueous NaOH gives substitution (alcohol)." },
    { q:"Which product forms when bromoethane reacts with ethanolic KCN?", opts:["Ethanol","Ethylamine","Propanenitrile","Bromoethane again"], ans:2, exp:"CN⁻ (nucleophile) replaces Br⁻. Product is propanenitrile (CH₃CH₂CN) — one carbon longer than the starting material." },
    { q:"How does a chlorine radical destroy ozone?", opts:["It absorbs UV radiation","It acts as a catalyst: Cl· + O₃ → ClO· + O₂, then ClO· + O₃ → Cl· + 2O₂","It reacts with O₂ to make O₃","It increases temperature of stratosphere"], ans:1, exp:"Cl· is regenerated in a catalytic cycle. Each Cl radical can destroy thousands of O₃ molecules before being removed." }
  ]
},
{
  id:17, title:"Alcohols, Esters & Carboxylic Acids",
  sections:[
    { icon:"🍷", title:"Alcohols — Classification & Reactions",
      body:`<p>Classification by position of –OH:</p>
<ul><li><strong>Primary (1°)</strong>: –CH₂OH (OH on C bonded to max 1 other C)</li>
<li><strong>Secondary (2°)</strong>: –CHOH– (OH on C bonded to 2 other C's)</li>
<li><strong>Tertiary (3°)</strong>: >C(OH)– (OH on C bonded to 3 other C's)</li></ul>
<table><tr><th>Reaction</th><th>Reagents/Conditions</th><th>Product (1°/2°/3°)</th></tr>
<tr><td>Oxidation</td><td>K₂Cr₂O₇/H₂SO₄, distil</td><td>1° → aldehyde</td></tr>
<tr><td>Oxidation</td><td>K₂Cr₂O₇/H₂SO₄, reflux</td><td>1° → carboxylic acid</td></tr>
<tr><td>Oxidation</td><td>K₂Cr₂O₇/H₂SO₄, reflux</td><td>2° → ketone</td></tr>
<tr><td>Oxidation</td><td>Any oxidising agent</td><td>3° → no reaction</td></tr>
<tr><td>Dehydration</td><td>Al₂O₃ or conc. H₃PO₄, heat</td><td>Alkene + H₂O</td></tr>
<tr><td>Esterification</td><td>Carboxylic acid + conc. H₂SO₄, heat</td><td>Ester + H₂O</td></tr>
<tr><td>Substitution</td><td>HBr, or NaBr/H₂SO₄</td><td>Bromoalkane + H₂O</td></tr></table>
<div class="callout callout-key"><div class="callout-title">Cr colour change</div>
K₂Cr₂O₇ in H₂SO₄: orange Cr₂O₇²⁻ → green Cr³⁺ (if reaction occurs). Tertiary alcohols: no colour change.</div>` },
    { icon:"🍋", title:"Carboxylic Acids",
      body:`<p>Carboxylic acids (–COOH) are weak acids. They partially dissociate in water:</p>
<div class="formula">RCOOH ⇌ RCOO⁻ + H⁺</div>
<h4>Reactions:</h4>
<ul><li>With metals: 2CH₃COOH + Mg → (CH₃COO)₂Mg + H₂</li>
<li>With bases: CH₃COOH + NaOH → CH₃COONa + H₂O</li>
<li>With carbonates: 2CH₃COOH + Na₂CO₃ → 2CH₃COONa + H₂O + CO₂ (effervescence)</li>
<li>With alcohols → esters (esterification)</li></ul>
<div class="callout callout-warn"><div class="callout-title">Weak Acid</div>
Carboxylic acids are WEAK acids — they partially dissociate. Do not confuse with strong acids (HCl, H₂SO₄, HNO₃) which fully dissociate.</div>` },
    { icon:"🌸", title:"Esters",
      body:`<p>Esters (–COO–) have fruity smells. Naming: [alkyl from alcohol]-yl [acid root]-anoate</p>
<div class="formula">RCOOH + R'OH ⇌ RCOOR' + H₂O   (conc. H₂SO₄ catalyst, heat, reversible)</div>
<p>Examples: ethyl ethanoate (from ethanol + ethanoic acid), methyl propanoate (methanol + propanoic acid)</p>
<h4>Hydrolysis of esters:</h4>
<ul><li><strong>Acid hydrolysis</strong>: ester + H₂O/H⁺ → acid + alcohol (reversible)</li>
<li><strong>Base hydrolysis (saponification)</strong>: ester + NaOH → carboxylate salt + alcohol (irreversible, goes to completion)</li></ul>
<div class="callout callout-tip"><div class="callout-title">Uses of Esters</div>
• Food flavourings and fragrances<br>
• Solvents (e.g. ethyl ethanoate in nail varnish remover)<br>
• Plasticisers<br>
• Vegetable oils (triglycerides = triesters of glycerol)<br>
• Biodiesel (transesterification of vegetable oils)</div>` }
  ],
  quiz:[
    { q:"What product forms when propan-1-ol is oxidised with acidified K₂Cr₂O₇ and the product is immediately distilled off?", opts:["Propan-1-ol","Propanal","Propanone","Propanoic acid"], ans:1, exp:"Primary alcohol + K₂Cr₂O₇/H₂SO₄, distil (remove product quickly) → aldehyde (propanal). Reflux gives carboxylic acid." },
    { q:"What is the name of the ester formed from propan-1-ol and ethanoic acid?", opts:["Ethyl propanoate","Propyl ethanoate","Propyl methanoate","Methyl propanoate"], ans:1, exp:"Ester naming: [alkyl from alcohol]-yl [acid root]-anoate. Propan-1-ol → propyl; ethanoic acid → ethanoate. Product: propyl ethanoate." },
    { q:"Why can tertiary alcohols not be oxidised by K₂Cr₂O₇/H₂SO₄?", opts:["They have no H on the C bearing OH — no H available for oxidation mechanism","They are too large","They react with the acid instead","They form insoluble precipitates"], ans:0, exp:"Oxidation of alcohols requires removal of the H on the carbon bearing OH. Tertiary alcohols have no such H → no oxidation." },
    { q:"Ethyl ethanoate is hydrolysed with NaOH. What are the products?", opts:["Ethanol + ethanoic acid","Ethanol + sodium ethanoate","Ethanol + sodium propanoate","Propanol + sodium ethanoate"], ans:1, exp:"Base hydrolysis (saponification): ethyl ethanoate + NaOH → ethanol + sodium ethanoate (CH₃COONa). The carboxylate salt is formed, not the free acid." }
  ]
},
{
  id:18, title:"Carbonyl Compounds",
  sections:[
    { icon:"🔍", title:"Aldehydes vs Ketones",
      body:`<p>Both contain the <strong>carbonyl group (C=O)</strong>.</p>
<ul><li><strong>Aldehyde</strong>: C=O at end of chain (–CHO). At least one H on carbonyl C.</li>
<li><strong>Ketone</strong>: C=O in middle of chain (C flanked by two carbon groups).</li></ul>
<h4>Distinguishing tests:</h4>
<table><tr><th>Test</th><th>Aldehyde</th><th>Ketone</th></tr>
<tr><td>Tollens' reagent (ammoniacal AgNO₃)</td><td>Silver mirror formed (Ag deposited)</td><td>No reaction</td></tr>
<tr><td>Fehling's solution (Cu²⁺ complex)</td><td>Brick-red Cu₂O precipitate</td><td>No reaction</td></tr>
<tr><td>Acidified K₂Cr₂O₇</td><td>Orange → green (oxidised to carboxylic acid)</td><td>No reaction (orange unchanged)</td></tr>
<tr><td>2,4-DNP (Brady's reagent)</td><td>Orange/yellow precipitate</td><td>Orange/yellow precipitate</td></tr></table>
<p>2,4-DNP confirms a C=O group is present (both aldehydes and ketones). The melting point of the purified precipitate identifies the specific compound.</p>` },
    { icon:"⚡", title:"Nucleophilic Addition",
      body:`<p>The C=O carbon is δ+ (O is electronegative) → susceptible to nucleophilic attack.</p>
<h4>Reduction with NaBH₄ (sodium tetrahydridoborate):</h4>
<ul><li>Aldehyde + [H] → primary alcohol</li>
<li>Ketone + [H] → secondary alcohol</li></ul>
<h4>Reaction with HCN (nucleophilic addition):</h4>
<div class="formula">RCHO + HCN → RCH(OH)CN   (hydroxynitrile)</div>
<p>Catalyst: KCN (provides CN⁻ nucleophile at controlled rate); H⁺ from HCN protonates the alkoxide.</p>
<h4>Mechanism steps:</h4>
<ol><li>CN⁻ attacks δ+ carbon of C=O → forms C–CN bond, O becomes O⁻</li>
<li>O⁻ is protonated by H⁺ (from HCN) → –OH</li></ol>
<div class="callout callout-key"><div class="callout-title">Optical Isomerism in Products</div>
If C=O is in an aldehyde (or unsymmetrical ketone), the hydroxynitrile product has a chiral centre → forms a <strong>racemic mixture</strong> (equal amounts of R and S enantiomers).</div>
<div class="callout callout-warn"><div class="callout-title">HCN Toxicity</div>
HCN is extremely toxic (inhibits cytochrome c oxidase). Generated in situ from KCN + H₂SO₄ in a fume hood. Never generate HCN in open lab.</div>` },
    { icon:"🔶", title:"2,4-DNP Test & Iodoform Test",
      body:`<p><strong>2,4-Dinitrophenylhydrazine (2,4-DNP / Brady's reagent)</strong>:</p>
<p>Reacts with all aldehydes and ketones → orange/yellow crystalline precipitate (2,4-DNP derivative). Used to:</p>
<ol><li>Confirm presence of C=O group</li>
<li>Identify the specific compound (purify precipitate, measure melting point, compare with data tables)</li></ol>
<p><strong>Iodoform test (I₂ / NaOH)</strong>:</p>
<p>Positive result: yellow precipitate of CHI₃ (triiodomethane/iodoform) with distinctive antiseptic smell.</p>
<p>Positive for compounds containing CH₃C=O group:</p>
<ul><li>Ethanal (CH₃CHO)</li>
<li>Methyl ketones (CH₃COR)</li>
<li>Ethanol (CH₃CH₂OH) — oxidised to ethanal first</li>
<li>Secondary alcohols of form CH₃CH(OH)R — oxidised to methyl ketone</li></ul>
<div class="callout callout-tip"><div class="callout-title">Iodoform identification summary</div>
Propanone (CH₃COCH₃): positive ✓<br>
Pentan-3-one (CH₃CH₂COCH₂CH₃): negative ✗ (no CH₃C=O group)<br>
Ethanol: positive ✓<br>
Methanol: negative ✗</div>` }
  ],
  quiz:[
    { q:"Which reagent distinguishes an aldehyde from a ketone by forming a silver mirror?", opts:["2,4-DNP","Fehling's solution","Tollens' reagent","Acidified K₂Cr₂O₇"], ans:2, exp:"Tollens' reagent (ammoniacal AgNO₃): aldehyde reduces Ag⁺ → Ag metal (silver mirror). Ketones don't react." },
    { q:"What type of mechanism does HCN use when reacting with ethanal?", opts:["Electrophilic addition","Nucleophilic substitution","Nucleophilic addition","Free radical addition"], ans:2, exp:"CN⁻ is a nucleophile with a lone pair. The C=O carbon is electrophilic (δ+). CN⁻ attacks C=O → nucleophilic addition." },
    { q:"Propanone reacts with NaBH₄. What is the product?", opts:["Propan-1-ol","Propan-2-ol","Propanal","Propanoic acid"], ans:1, exp:"NaBH₄ reduces ketones to secondary alcohols. Propanone (CH₃COCH₃) → propan-2-ol (CH₃CH(OH)CH₃)." },
    { q:"Which compound gives a positive iodoform test?", opts:["Pentan-2-one","Pentan-3-one","Propan-1-ol","Butanal"], ans:0, exp:"Iodoform test positive for CH₃C=O group. Pentan-2-one = CH₃COCH₂CH₂CH₃ — has CH₃CO group ✓. Pentan-3-one has no CH₃C=O. Propan-1-ol is oxidised to propanal (no CH₃CO). Butanal = CH₃CH₂CH₂CHO — no CH₃CO." },
    { q:"Why does the reaction of an aldehyde with HCN produce a racemic mixture?", opts:["HCN is a weak acid","CN⁻ attacks from both faces of the planar C=O group equally, forming equal amounts of both enantiomers","The product has no chiral centre","The reaction is reversible"], ans:1, exp:"The trigonal planar C=O group can be attacked by CN⁻ from either face (top or bottom) with equal probability → equal R and S enantiomers = racemic mixture." }
  ]
}
] },
  phys: { key:'phys', label:'Physics',   code:'9702', emoji:'⚡', accent:'var(--phys)', chapters: [
{
  id:1, title:"Kinematics",
  sections:[
    { icon:"📏", title:"Quantities & Units",
      body:`<p>Physics is built on <strong>SI base units</strong>. All other units are derived from these.</p>
<table><tr><th>Quantity</th><th>SI Unit</th><th>Symbol</th></tr>
<tr><td>Mass</td><td>kilogram</td><td>kg</td></tr>
<tr><td>Length</td><td>metre</td><td>m</td></tr>
<tr><td>Time</td><td>second</td><td>s</td></tr>
<tr><td>Current</td><td>ampere</td><td>A</td></tr>
<tr><td>Temperature</td><td>kelvin</td><td>K</td></tr>
<tr><td>Amount</td><td>mole</td><td>mol</td></tr></table>
<div class="callout callout-key"><div class="callout-title">Scalars vs Vectors</div>
<strong>Scalar</strong>: magnitude only. Examples: distance, speed, mass, energy, temperature, time.<br>
<strong>Vector</strong>: magnitude AND direction. Examples: displacement, velocity, acceleration, force, momentum.</div>
<h4>Prefixes:</h4>
<table><tr><th>Prefix</th><th>Symbol</th><th>Multiplier</th></tr>
<tr><td>tera</td><td>T</td><td>10¹²</td></tr>
<tr><td>giga</td><td>G</td><td>10⁹</td></tr>
<tr><td>mega</td><td>M</td><td>10⁶</td></tr>
<tr><td>kilo</td><td>k</td><td>10³</td></tr>
<tr><td>centi</td><td>c</td><td>10⁻²</td></tr>
<tr><td>milli</td><td>m</td><td>10⁻³</td></tr>
<tr><td>micro</td><td>μ</td><td>10⁻⁶</td></tr>
<tr><td>nano</td><td>n</td><td>10⁻⁹</td></tr>
<tr><td>pico</td><td>p</td><td>10⁻¹²</td></tr></table>` },
    { icon:"🏃", title:"Distance, Displacement, Speed & Velocity",
      body:`<p><strong>Distance</strong>: total path length (scalar).<br>
<strong>Displacement</strong>: straight-line distance from start to finish, with direction (vector).</p>
<p><strong>Speed</strong>: rate of change of distance (scalar).<br>
<strong>Velocity</strong>: rate of change of displacement (vector).</p>
<div class="formula">average speed = total distance / time</div>
<div class="formula">average velocity = displacement / time   (v = Δs / Δt)</div>
<div class="callout callout-tip"><div class="callout-title">Displacement-time graphs</div>
Gradient = velocity. Horizontal line = stationary. Negative gradient = moving in opposite direction. Curved line = changing velocity (acceleration).</div>` },
    { icon:"📐", title:"Adding Vectors",
      body:`<p>Vectors must be added considering direction. Methods:</p>
<ul><li><strong>Triangle/parallelogram rule</strong>: draw vectors tip-to-tail; resultant is the closing side.</li>
<li><strong>Resolution into components</strong>: split each vector into horizontal and vertical components, add components, then recombine.</li></ul>
<div class="formula">Fₓ = F cosθ    Fᵧ = F sinθ</div>
<div class="formula">Resultant = √(Fₓ² + Fᵧ²)    θ = arctan(Fᵧ/Fₓ)</div>
<div class="callout callout-warn"><div class="callout-title">Common Mistake</div>
Always check the angle is measured from the correct reference direction. Draw a clear diagram first.</div>` }
  ],
  quiz:[
    { q:"Which of the following is a vector quantity?", opts:["Speed","Distance","Temperature","Acceleration"], ans:3, exp:"Acceleration has both magnitude and direction — it is a vector. Speed, distance, and temperature are scalars." },
    { q:"A car travels 30 m north then 40 m east. What is its displacement?", opts:["70 m","50 m NE","50 m at 53° E of N","40 m"], ans:2, exp:"Displacement = √(30²+40²) = 50 m. Angle = arctan(40/30) = 53° east of north." },
    { q:"On a displacement-time graph, what does the gradient represent?", opts:["Acceleration","Distance","Velocity","Speed"], ans:2, exp:"Gradient of displacement-time graph = Δs/Δt = velocity." },
    { q:"A force of 6 N acts horizontally and 8 N vertically upward. What is the resultant?", opts:["14 N","2 N","10 N","48 N"], ans:2, exp:"Resultant = √(6²+8²) = √(36+64) = √100 = 10 N." },
    { q:"What is the SI unit of velocity?", opts:["m s⁻²","km h⁻¹","m s⁻¹","m"], ans:2, exp:"Velocity = displacement/time. SI units: metres per second (m s⁻¹)." }
  ]
},
{
  id:2, title:"Accelerated Motion",
  sections:[
    { icon:"🚀", title:"Acceleration & SUVAT Equations",
      body:`<p><strong>Acceleration</strong>: rate of change of velocity. Vector quantity. SI unit: m s⁻².</p>
<div class="formula">a = Δv / Δt = (v − u) / t</div>
<h4>SUVAT equations (uniform acceleration only):</h4>
<div class="formula">v = u + at</div>
<div class="formula">s = ut + ½at²</div>
<div class="formula">s = ½(u + v)t</div>
<div class="formula">v² = u² + 2as</div>
<div class="formula">s = vt − ½at²</div>
<p>s = displacement, u = initial velocity, v = final velocity, a = acceleration, t = time</p>
<div class="callout callout-key"><div class="callout-title">Choosing the right equation</div>
Identify which 3 variables are known and which 1 is unknown. Pick the equation containing those 4 variables.</div>` },
    { icon:"📊", title:"Velocity-Time Graphs",
      body:`<p>Key features of v-t graphs:</p>
<ul><li><strong>Gradient</strong> = acceleration (negative gradient = deceleration)</li>
<li><strong>Area under curve</strong> = displacement</li>
<li>Horizontal line = constant velocity (zero acceleration)</li>
<li>Straight line through origin = uniform acceleration from rest</li></ul>
<div class="callout callout-tip"><div class="callout-title">Area under v-t graph</div>
For irregular curves, estimate area using counting squares or splitting into geometric shapes (triangles, trapezoids).</div>` },
    { icon:"🌍", title:"Free Fall & Projectile Motion",
      body:`<p>In free fall (ignoring air resistance), all objects accelerate at <strong>g = 9.81 m s⁻²</strong> downward regardless of mass.</p>
<p><strong>Projectile motion</strong>: horizontal and vertical components are <strong>independent</strong>.</p>
<ul><li>Horizontal: constant velocity (no acceleration, ignoring air resistance)</li>
<li>Vertical: constant acceleration g downward</li></ul>
<div class="formula">Horizontal: x = uₓt    (uₓ = u cosθ)</div>
<div class="formula">Vertical: y = uᵧt − ½gt²    uᵧ = u sinθ</div>
<div class="callout callout-warn"><div class="callout-title">Sign Convention</div>
Choose a consistent positive direction (usually up = positive). Stick to it throughout the problem. g = −9.81 m s⁻² if up is positive.</div>` }
  ],
  quiz:[
    { q:"A car accelerates from 10 m/s to 30 m/s in 5 s. What is its acceleration?", opts:["2 m s⁻²","4 m s⁻²","6 m s⁻²","8 m s⁻²"], ans:1, exp:"a = (v−u)/t = (30−10)/5 = 20/5 = 4 m s⁻²." },
    { q:"A ball is dropped from rest. How far does it fall in 3 s? (g = 9.81 m s⁻²)", opts:["14.7 m","29.4 m","44.1 m","88.3 m"], ans:2, exp:"s = ut + ½at² = 0 + ½×9.81×9 = 44.1 m." },
    { q:"On a velocity-time graph, what does the area under the line represent?", opts:["Acceleration","Speed","Displacement","Distance only if moving in one direction"], ans:2, exp:"Area under a v-t graph = displacement (can be negative if moving backwards)." },
    { q:"A projectile is launched horizontally. Which statement is correct?", opts:["Horizontal velocity increases due to g","Vertical velocity is constant","Horizontal and vertical motions are independent","The projectile follows a straight path"], ans:2, exp:"Horizontal: constant velocity (no horizontal force). Vertical: accelerates at g. The two components are completely independent." },
    { q:"Which SUVAT equation links v, u, a, and s (no t)?", opts:["v = u + at","s = ut + ½at²","v² = u² + 2as","s = ½(u+v)t"], ans:2, exp:"v² = u² + 2as contains v, u, a, s but not t." }
  ]
},
{
  id:3, title:"Dynamics",
  sections:[
    { icon:"⚖️", title:"Newton's Laws of Motion",
      body:`<p><strong>Newton's 1st Law</strong>: An object remains at rest or moves with constant velocity unless acted on by a resultant force.</p>
<p><strong>Newton's 2nd Law</strong>: The resultant force on an object equals the rate of change of momentum. For constant mass:</p>
<div class="formula">F = ma    (F in N, m in kg, a in m s⁻²)</div>
<p><strong>Newton's 3rd Law</strong>: For every action there is an equal and opposite reaction. The two forces act on <em>different</em> objects, are equal in magnitude, opposite in direction, and of the same type.</p>
<div class="callout callout-warn"><div class="callout-title">N3L Pairs</div>
The action-reaction pair must be: same type of force, equal magnitude, opposite direction, acting on DIFFERENT objects. A book on a table: book pulls Earth up gravitationally; Earth pulls book down gravitationally.</div>` },
    { icon:"💥", title:"Linear Momentum",
      body:`<p><strong>Momentum (p)</strong>: p = mv (vector, kg m s⁻¹)</p>
<p><strong>Impulse</strong>: change in momentum = FΔt (area under F-t graph)</p>
<div class="formula">Impulse = FΔt = Δp = mv − mu</div>
<div class="callout callout-key"><div class="callout-title">Conservation of Momentum</div>
In a closed system (no external forces), total momentum is conserved:<br>
m₁u₁ + m₂u₂ = m₁v₁ + m₂v₂</div>
<h4>Types of collision:</h4>
<ul><li><strong>Elastic</strong>: momentum AND kinetic energy conserved</li>
<li><strong>Inelastic</strong>: momentum conserved, KE not conserved (some converted to heat/sound)</li>
<li><strong>Perfectly inelastic</strong>: objects stick together, maximum KE lost</li></ul>` },
    { icon:"🌊", title:"Drag & Terminal Velocity",
      body:`<p><strong>Drag force</strong> (fluid resistance) opposes motion. Increases with speed.</p>
<p>When an object falls through a fluid:</p>
<ol><li>Initially: weight > drag → accelerates downward</li>
<li>As speed increases: drag increases</li>
<li>Eventually: drag = weight → resultant force = 0 → <strong>terminal velocity</strong></li></ol>
<div class="callout callout-tip"><div class="callout-title">Terminal velocity on v-t graph</div>
Curve starts steep (high acceleration), gradually flattens, asymptotically approaches terminal velocity (horizontal line).</div>` }
  ],
  quiz:[
    { q:"A 2 kg object accelerates at 5 m s⁻². What is the resultant force?", opts:["0.4 N","2.5 N","7 N","10 N"], ans:3, exp:"F = ma = 2 × 5 = 10 N." },
    { q:"A 3 kg ball moving at 4 m/s collides with a stationary 5 kg ball and they stick together. What is their common velocity?", opts:["0.75 m/s","1.5 m/s","2.4 m/s","4 m/s"], ans:1, exp:"Conservation of momentum: 3×4 + 5×0 = (3+5)v → 12 = 8v → v = 1.5 m/s." },
    { q:"What is the impulse on a 0.5 kg ball that changes velocity from 3 m/s to 8 m/s?", opts:["1 N s","2.5 N s","4 N s","5.5 N s"], ans:1, exp:"Impulse = Δp = m(v−u) = 0.5×(8−3) = 0.5×5 = 2.5 N s." },
    { q:"An object reaches terminal velocity when:", opts:["Its acceleration equals g","The drag force equals the gravitational force","Its velocity becomes zero","The net force doubles"], ans:1, exp:"Terminal velocity: drag = weight (gravitational force). Resultant force = 0 → zero acceleration → constant velocity." },
    { q:"In an elastic collision, what is conserved?", opts:["Only momentum","Only kinetic energy","Both momentum and kinetic energy","Neither momentum nor kinetic energy"], ans:2, exp:"Elastic collision: both momentum AND kinetic energy are conserved." }
  ]
},
{
  id:4, title:"Forces",
  sections:[
    { icon:"⚖️", title:"Types of Forces & Equilibrium",
      body:`<p>Common forces in AS Physics:</p>
<ul><li><strong>Weight (W)</strong>: W = mg, downward, acts at centre of gravity</li>
<li><strong>Normal contact force (N)</strong>: perpendicular to surface</li>
<li><strong>Friction (f)</strong>: opposes relative motion, parallel to surface</li>
<li><strong>Tension (T)</strong>: in strings/ropes/cables</li>
<li><strong>Upthrust</strong>: upward force from fluid = weight of fluid displaced</li></ul>
<div class="callout callout-key"><div class="callout-title">Equilibrium</div>
An object is in equilibrium when:<br>
1. Resultant force = 0 (sum of all force components = 0 in each direction)<br>
2. Resultant torque = 0 (sum of clockwise moments = sum of anticlockwise moments)</div>` },
    { icon:"🔄", title:"Moments & Torques",
      body:`<p><strong>Moment of a force</strong>: the turning effect about a pivot.</p>
<div class="formula">Moment = F × d    (F = force in N; d = perpendicular distance from pivot to line of action of F, in m)</div>
<p>Unit: N m (not joules — same dimensions but different concept)</p>
<div class="callout callout-key"><div class="callout-title">Principle of Moments</div>
For a body in equilibrium:<br>
Sum of clockwise moments = Sum of anticlockwise moments</div>
<div class="callout callout-tip"><div class="callout-title">Centre of Gravity</div>
The point where the weight of an object appears to act. For a uniform object, it's at the geometric centre.</div>` },
    { icon:"📐", title:"Pressure",
      body:`<p><strong>Pressure</strong>: force per unit area perpendicular to the surface.</p>
<div class="formula">p = F / A    (Pa = N m⁻²)</div>
<div class="formula">Pressure in a fluid: p = ρgh    (ρ = density kg m⁻³, g = 9.81 m s⁻², h = depth m)</div>
<p>Pressure in a fluid acts equally in all directions at a given depth.</p>
<div class="callout callout-tip"><div class="callout-title">Atmospheric Pressure</div>
Standard atmospheric pressure ≈ 101 325 Pa ≈ 1.01 × 10⁵ Pa. Absolute pressure = gauge pressure + atmospheric pressure.</div>` }
  ],
  quiz:[
    { q:"A uniform beam of length 4 m and weight 200 N is supported at its centre. A 100 N force is applied 1.5 m from the pivot. What moment does it create?", opts:["66.7 N m","100 N m","150 N m","200 N m"], ans:2, exp:"Moment = F × d = 100 × 1.5 = 150 N m." },
    { q:"What is the pressure at a depth of 5 m in water? (ρ = 1000 kg m⁻³, g = 9.81 m s⁻²)", opts:["49 050 Pa","9810 Pa","1962 Pa","490.5 Pa"], ans:0, exp:"p = ρgh = 1000 × 9.81 × 5 = 49 050 Pa." },
    { q:"For a body in static equilibrium, which conditions must be satisfied?", opts:["Resultant force = 0 only","Resultant torque = 0 only","Resultant force = 0 AND resultant torque = 0","Velocity = 0"], ans:2, exp:"Static equilibrium requires BOTH zero resultant force (no linear acceleration) AND zero resultant torque (no angular acceleration)." },
    { q:"Upthrust on a submerged object equals:", opts:["The weight of the object","The pressure at that depth × volume","The weight of fluid displaced","The density of fluid × g"], ans:2, exp:"Archimedes' principle: upthrust = weight of fluid displaced = ρ_fluid × g × V_submerged." }
  ]
},
{
  id:5, title:"Work, Energy & Power",
  sections:[
    { icon:"💪", title:"Work Done & Energy",
      body:`<p><strong>Work done</strong>: energy transferred when a force moves its point of application.</p>
<div class="formula">W = Fs cosθ    (F = force N, s = displacement m, θ = angle between F and s)</div>
<p>Work is a scalar. Unit: joule (J = N m)</p>
<h4>Forms of energy:</h4>
<ul><li><strong>Kinetic energy</strong>: Ek = ½mv²</li>
<li><strong>Gravitational PE</strong>: Ep = mgh</li>
<li><strong>Elastic PE</strong>: stored in stretched/compressed spring</li></ul>
<div class="callout callout-key"><div class="callout-title">Work-Energy Theorem</div>
Net work done on an object = change in kinetic energy<br>
W_net = ΔEk = ½mv² − ½mu²</div>` },
    { icon:"⚡", title:"Conservation of Energy & Efficiency",
      body:`<p><strong>Principle of conservation of energy</strong>: energy cannot be created or destroyed; it can only be converted from one form to another. The total energy of a closed system is constant.</p>
<div class="formula">efficiency = useful output energy / total input energy × 100%</div>
<div class="formula">efficiency = useful output power / total input power × 100%</div>
<div class="callout callout-warn"><div class="callout-title">Real systems</div>
Energy is always "lost" to heat (due to friction, air resistance, electrical resistance) — no real system is 100% efficient. This does not violate conservation of energy; the energy is simply less useful.</div>` },
    { icon:"🔋", title:"Power",
      body:`<p><strong>Power</strong>: rate of doing work / rate of energy transfer.</p>
<div class="formula">P = W / t = ΔE / t    (W = watts = J s⁻¹)</div>
<div class="formula">P = Fv    (for object moving at constant velocity v under force F)</div>
<div class="callout callout-tip"><div class="callout-title">P = Fv derivation</div>
P = W/t = Fs/t = F × (s/t) = Fv. Only valid when F and v are in the same direction.</div>` }
  ],
  quiz:[
    { q:"A 5 kg object is lifted 3 m vertically. How much gravitational PE is gained? (g = 9.81 m s⁻²)", opts:["14.7 J","29.4 J","147.2 J","294.3 J"], ans:2, exp:"Ep = mgh = 5 × 9.81 × 3 = 147.15 ≈ 147 J." },
    { q:"A force of 50 N acts at 60° to displacement of 10 m. What work is done?", opts:["250 J","433 J","500 J","866 J"], ans:0, exp:"W = Fs cosθ = 50 × 10 × cos60° = 500 × 0.5 = 250 J." },
    { q:"A machine does 600 J of useful work from 1000 J input. What is its efficiency?", opts:["40%","50%","60%","66.7%"], ans:2, exp:"Efficiency = 600/1000 × 100% = 60%." },
    { q:"A car engine exerts a force of 4000 N at a constant speed of 25 m/s. What is the power output?", opts:["160 W","4025 W","100 000 W","160 000 W"], ans:2, exp:"P = Fv = 4000 × 25 = 100 000 W = 100 kW." },
    { q:"A 2 kg ball falls from rest through 5 m (no air resistance). What is its final KE? (g=9.81)", opts:["9.81 J","49.05 J","98.1 J","196.2 J"], ans:2, exp:"By conservation of energy: KE = loss in GPE = mgh = 2×9.81×5 = 98.1 J." }
  ]
},
{
  id:6, title:"Momentum",
  sections:[
    { icon:"💨", title:"Momentum & Impulse (extended)",
      body:`<p>This chapter extends the momentum concepts from Dynamics.</p>
<div class="formula">p = mv    (kg m s⁻¹)</div>
<div class="formula">F = Δp / Δt    (Newton's 2nd Law in terms of momentum)</div>
<div class="formula">Impulse = FΔt = Δp    (area under F-t graph)</div>
<div class="callout callout-key"><div class="callout-title">Conservation of Momentum</div>
In a closed system (no external resultant force), the total momentum before = total momentum after.<br>
This applies in all collisions and explosions.</div>` },
    { icon:"💥", title:"Collisions & Explosions",
      body:`<h4>Elastic collision (e.g. billiard balls, gas molecules):</h4>
<p>Both momentum and kinetic energy conserved.</p>
<h4>Inelastic collision (most real collisions):</h4>
<p>Momentum conserved; KE not conserved (some lost to heat, sound, deformation).</p>
<h4>Perfectly inelastic (objects stick together):</h4>
<p>Momentum conserved; maximum KE lost.</p>
<h4>Explosions:</h4>
<p>Initial momentum = 0 (stationary). Final momenta equal and opposite → total still 0.</p>
<div class="formula">0 = m₁v₁ + m₂v₂    →    m₁v₁ = −m₂v₂</div>
<div class="callout callout-tip"><div class="callout-title">Testing for elastic collision</div>
Calculate total KE before and after. If equal → elastic. If KE after < KE before → inelastic.</div>` },
    { icon:"📊", title:"Force-Time Graphs",
      body:`<p>The area under a force-time (F-t) graph equals the impulse = change in momentum.</p>
<ul><li>For a constant force: rectangle → Impulse = F × t</li>
<li>For a variable force: area under curve (estimate by counting squares)</li></ul>
<div class="callout callout-key"><div class="callout-title">Safety applications of impulse</div>
Increasing the time of a collision (crumple zones, air bags, cushioned floors) reduces the average force (same impulse = same Δp, but over longer time → smaller F). This reduces injury.</div>` }
  ],
  quiz:[
    { q:"A 1500 kg car moving at 20 m/s brakes to rest. What is the magnitude of the impulse?", opts:["75 N s","750 N s","30 000 N s","300 000 N s"], ans:2, exp:"Impulse = Δp = m(v−u) = 1500×(0−20) = −30 000 N s. Magnitude = 30 000 N s." },
    { q:"A 2 kg ball moving at 6 m/s collides elastically with an identical stationary ball. What happens?", opts:["Both move at 3 m/s","First ball stops; second moves at 6 m/s","Both move at 6 m/s","First ball bounces back at 6 m/s"], ans:1, exp:"In an elastic collision between identical masses, the moving object stops and the stationary one moves off at the original speed." },
    { q:"A 10 g bullet is fired at 400 m/s from a 2 kg rifle. What is the recoil velocity of the rifle?", opts:["0.5 m/s","2 m/s","20 m/s","200 m/s"], ans:1, exp:"Conservation of momentum: 0 = 0.01×400 + 2×v_rifle → v = −4/2 = −2 m/s. Magnitude = 2 m/s." },
    { q:"Why do air bags in cars reduce injury during a collision?", opts:["They increase the stopping force","They increase the time over which momentum changes, reducing average force","They absorb all the kinetic energy","They prevent momentum changing"], ans:1, exp:"Impulse = F×t = Δp (fixed). Increasing t → decreasing F → less force on body → less injury." }
  ]
},
{
  id:7, title:"Matter & Materials",
  sections:[
    { icon:"🔬", title:"Density & Pressure",
      body:`<div class="formula">density ρ = m / V    (kg m⁻³)</div>
<div class="formula">pressure p = F / A    (Pa = N m⁻²)</div>
<div class="formula">pressure in fluid: p = ρgh</div>
<p>Density of water ≈ 1000 kg m⁻³. Density of air ≈ 1.2 kg m⁻³.</p>` },
    { icon:"🌀", title:"Deformation of Solids",
      body:`<p>When a force is applied to a material it deforms. Key terms:</p>
<ul><li><strong>Tensile stress (σ)</strong>: force per unit cross-sectional area</li>
<li><strong>Tensile strain (ε)</strong>: extension per unit original length (dimensionless)</li>
<li><strong>Young modulus (E)</strong>: ratio of stress to strain — measure of stiffness</li></ul>
<div class="formula">σ = F / A    (Pa)</div>
<div class="formula">ε = x / L    (no units; x = extension, L = original length)</div>
<div class="formula">E = σ / ε = FL / Ax    (Pa)</div>
<div class="callout callout-key"><div class="callout-title">Hooke's Law</div>
F = kx (force proportional to extension, up to the limit of proportionality).<br>
k = spring constant (N m⁻¹). Stiffer spring = larger k.</div>` },
    { icon:"📊", title:"Stress-Strain Graphs",
      body:`<p>Key points on a stress-strain graph (for a metal wire):</p>
<ul><li><strong>Limit of proportionality</strong>: stress no longer proportional to strain (Hooke's law breaks down)</li>
<li><strong>Elastic limit</strong>: beyond this, permanent deformation occurs</li>
<li><strong>Yield point</strong>: large plastic deformation at roughly constant stress</li>
<li><strong>Ultimate tensile stress (UTS)</strong>: maximum stress material can withstand</li>
<li><strong>Fracture point</strong>: material breaks</li></ul>
<div class="callout callout-key"><div class="callout-title">Elastic vs Plastic</div>
<strong>Elastic deformation</strong>: material returns to original shape when force removed.<br>
<strong>Plastic deformation</strong>: permanent change in shape — material does not return to original length.</div>
<div class="formula">Elastic strain energy = ½Fx = ½kx²    (area under F-x graph up to elastic limit)</div>` }
  ],
  quiz:[
    { q:"A wire of length 2 m and cross-section 1×10⁻⁶ m² stretches by 1 mm under 100 N. What is the Young modulus?", opts:["2×10⁸ Pa","2×10¹¹ Pa","1×10¹⁰ Pa","5×10⁷ Pa"], ans:1, exp:"σ = F/A = 100/(1×10⁻⁶) = 10⁸ Pa. ε = x/L = 0.001/2 = 5×10⁻⁴. E = σ/ε = 10⁸/5×10⁻⁴ = 2×10¹¹ Pa." },
    { q:"A spring (k = 200 N/m) is extended by 0.05 m. What elastic PE is stored?", opts:["0.25 J","0.5 J","5 J","10 J"], ans:0, exp:"Elastic PE = ½kx² = ½×200×(0.05)² = 100×0.0025 = 0.25 J." },
    { q:"Beyond the elastic limit, what happens to a material?", opts:["It returns to its original shape","Stress and strain are still proportional","Permanent deformation occurs","The Young modulus increases"], ans:2, exp:"Beyond the elastic limit, the deformation is plastic — the material does not return to its original shape when the force is removed." },
    { q:"What does the gradient of a stress-strain graph represent?", opts:["Spring constant","Young modulus","Elastic limit","Ultimate tensile stress"], ans:1, exp:"Gradient of stress-strain graph = stress/strain = Young modulus (in the linear region)." }
  ]
},
{
  id:8, title:"Electric Current",
  sections:[
    { icon:"⚡", title:"Charge, Current & Potential Difference",
      body:`<p><strong>Electric current (I)</strong>: rate of flow of charge.</p>
<div class="formula">I = ΔQ / Δt    (A = C s⁻¹)</div>
<p><strong>Conventional current</strong> flows from + to −. Electron flow is opposite (−  to +).</p>
<p><strong>Potential difference (V)</strong>: work done per unit charge moved between two points.</p>
<div class="formula">V = W / Q    (V = J C⁻¹)</div>
<div class="formula">Energy transferred: W = QV = IVt</div>
<div class="callout callout-key"><div class="callout-title">Charge carriers</div>
In metals: free electrons. In electrolytes: positive and negative ions. In semiconductors: electrons and holes.</div>` },
    { icon:"🔢", title:"Mean Drift Velocity",
      body:`<p>Current is related to the drift of charge carriers:</p>
<div class="formula">I = nAve</div>
<p>n = number density of charge carriers (m⁻³)<br>
A = cross-sectional area (m²)<br>
v = mean drift velocity (m s⁻¹)<br>
e = charge on carrier (C)</p>
<div class="callout callout-tip"><div class="callout-title">Drift velocity is very slow</div>
Typical drift velocity in a copper wire ≈ 0.1 mm s⁻¹. But electrical signals travel near the speed of light because the electric field propagates almost instantly along the wire.</div>` },
    { icon:"🔋", title:"Sources of EMF",
      body:`<p><strong>EMF (electromotive force, ε)</strong>: energy provided per unit charge by a source (battery, generator).</p>
<div class="formula">EMF ε = W / Q    (V = J C⁻¹)</div>
<div class="callout callout-warn"><div class="callout-title">EMF vs pd</div>
EMF is the energy given per unit charge BY the source.<br>
Potential difference is the energy transferred per unit charge FROM the circuit.<br>
EMF > terminal pd because of internal resistance energy loss.</div>` }
  ],
  quiz:[
    { q:"A current of 3 A flows for 5 minutes. How much charge passes?", opts:["15 C","60 C","900 C","1800 C"], ans:2, exp:"Q = It = 3 × (5×60) = 3 × 300 = 900 C." },
    { q:"What is the potential difference if 60 J of energy is transferred by 12 C of charge?", opts:["0.2 V","5 V","72 V","720 V"], ans:1, exp:"V = W/Q = 60/12 = 5 V." },
    { q:"In the equation I = nAve, what does n represent?", opts:["Number of electrons in the wire","Number density of charge carriers per m³","Net charge on the wire","Number of coulombs per second"], ans:1, exp:"n = number density of charge carriers (number per unit volume, m⁻³)." },
    { q:"A copper wire is replaced by a thinner wire of the same material and length carrying the same current. What happens to the drift velocity?", opts:["Decreases","Stays the same","Increases","Becomes zero"], ans:2, exp:"I = nAve. Same I and n (same material), smaller A → v must increase to maintain the same current." }
  ]
},
{
  id:9, title:"Kirchhoff's Laws",
  sections:[
    { icon:"🔀", title:"Kirchhoff's Current Law (KCL)",
      body:`<p><strong>Kirchhoff's First Law</strong>: At any junction in a circuit, the sum of currents entering = sum of currents leaving.</p>
<div class="formula">ΣI_in = ΣI_out    (conservation of charge)</div>
<p>This is a consequence of <strong>conservation of charge</strong> — charge cannot be created or destroyed at a junction.</p>` },
    { icon:"🔋", title:"Kirchhoff's Voltage Law (KVL)",
      body:`<p><strong>Kirchhoff's Second Law</strong>: Around any closed loop in a circuit, the sum of EMFs = sum of potential differences.</p>
<div class="formula">Σε = ΣIR    (conservation of energy)</div>
<p>This is a consequence of <strong>conservation of energy</strong> — energy gained from sources = energy dissipated in resistors around any complete loop.</p>
<div class="callout callout-tip"><div class="callout-title">Series circuits</div>
• Same current throughout<br>
• Total pd = sum of individual pds: V = V₁ + V₂ + ...<br>
• Total resistance: R_total = R₁ + R₂ + ...</div>
<div class="callout callout-tip"><div class="callout-title">Parallel circuits</div>
• Same pd across each branch<br>
• Total current = sum of branch currents: I = I₁ + I₂ + ...<br>
• Total resistance: 1/R_total = 1/R₁ + 1/R₂ + ...</div>` },
    { icon:"⚡", title:"Power in Circuits",
      body:`<div class="formula">P = IV = I²R = V²/R</div>
<p>All three forms are equivalent (using V = IR). Use the most convenient form depending on what you know.</p>
<div class="callout callout-key"><div class="callout-title">Energy dissipated</div>
W = Pt = IVt = I²Rt = V²t/R</div>` }
  ],
  quiz:[
    { q:"Three resistors of 2Ω, 3Ω and 6Ω are connected in parallel. What is the total resistance?", opts:["11 Ω","1 Ω","0.5 Ω","3.67 Ω"], ans:1, exp:"1/R = 1/2 + 1/3 + 1/6 = 3/6 + 2/6 + 1/6 = 6/6 = 1. R = 1 Ω." },
    { q:"A 12 V battery is connected to two resistors (4Ω and 8Ω) in series. What is the current?", opts:["0.5 A","1 A","1.5 A","3 A"], ans:1, exp:"R_total = 4 + 8 = 12Ω. I = V/R = 12/12 = 1 A." },
    { q:"A 6 Ω resistor carries a current of 2 A. What power is dissipated?", opts:["3 W","12 W","24 W","72 W"], ans:2, exp:"P = I²R = 2² × 6 = 4 × 6 = 24 W." },
    { q:"What law states that the sum of currents at a junction is zero?", opts:["Kirchhoff's Voltage Law","Ohm's Law","Kirchhoff's Current Law","Faraday's Law"], ans:2, exp:"Kirchhoff's First Law (Current Law): sum of currents in = sum of currents out at any junction. Based on conservation of charge." }
  ]
},
{
  id:10, title:"Resistance & Resistivity",
  sections:[
    { icon:"🔢", title:"Ohm's Law & Resistance",
      body:`<p><strong>Ohm's Law</strong>: for a metallic conductor at constant temperature, current is proportional to potential difference.</p>
<div class="formula">V = IR    (R = resistance in ohms, Ω = V A⁻¹)</div>
<p><strong>Ohmic conductors</strong>: V ∝ I (straight line through origin on V-I graph). Example: metal resistor at constant temperature.</p>
<p><strong>Non-ohmic components</strong>:</p>
<ul><li><strong>Filament lamp</strong>: resistance increases as temperature increases (I-V curve bends)</li>
<li><strong>Diode</strong>: conducts only in one direction (forward bias); very high resistance in reverse</li>
<li><strong>Thermistor (NTC)</strong>: resistance decreases as temperature increases</li>
<li><strong>LDR</strong>: resistance decreases as light intensity increases</li></ul>` },
    { icon:"🔬", title:"Resistivity",
      body:`<p><strong>Resistivity (ρ)</strong>: a material property — measures how much a material resists current flow.</p>
<div class="formula">R = ρL / A    (ρ in Ω m; L = length m; A = cross-sectional area m²)</div>
<div class="callout callout-key"><div class="callout-title">Factors affecting resistance</div>
• ↑ length → ↑ resistance (more collisions)<br>
• ↑ cross-section → ↓ resistance (more paths for current)<br>
• ↑ temperature → ↑ resistance in metals (more lattice vibrations → more collisions)<br>
• ↑ temperature → ↓ resistance in semiconductors (more charge carriers released)</div>
<table><tr><th>Material</th><th>Resistivity (Ω m)</th></tr>
<tr><td>Copper</td><td>1.7 × 10⁻⁸</td></tr>
<tr><td>Silicon</td><td>~10³</td></tr>
<tr><td>Glass</td><td>~10¹²</td></tr></table>` }
  ],
  quiz:[
    { q:"A wire of resistivity 1.7×10⁻⁸ Ω m, length 2 m, and diameter 0.5 mm. What is its resistance? (A = π(0.25×10⁻³)²)", opts:["0.17 Ω","0.35 Ω","0.87 Ω","3.5 Ω"], ans:1, exp:"A = π×(2.5×10⁻⁴)² = 1.96×10⁻⁷ m². R = ρL/A = (1.7×10⁻⁸×2)/(1.96×10⁻⁷) ≈ 0.17/0.196 ≈ 0.35 Ω." },
    { q:"As temperature increases, what happens to the resistance of a metal?", opts:["Decreases","Stays the same","Increases","First decreases then increases"], ans:2, exp:"In metals, higher temperature → more lattice vibrations → more collisions with electrons → higher resistance." },
    { q:"What does the gradient of a V-I graph represent for an ohmic conductor?", opts:["Power","Current","Resistance","Conductance"], ans:2, exp:"For an ohmic conductor (V = IR), V-I graph is a straight line. Gradient = V/I = resistance." },
    { q:"An LDR is placed in a dark room. What happens to its resistance?", opts:["Decreases to zero","Increases to a high value","Stays constant","Becomes negative"], ans:1, exp:"LDR (light-dependent resistor): in darkness, few charge carriers, so resistance is HIGH. In bright light, resistance is LOW." }
  ]
},
{
  id:11, title:"Practical Circuits",
  sections:[
    { icon:"🔋", title:"Internal Resistance",
      body:`<p>Real batteries have <strong>internal resistance (r)</strong> — resistance within the battery itself. This causes a voltage drop when current flows.</p>
<div class="formula">ε = V_terminal + Ir = I(R + r)</div>
<div class="formula">V_terminal = ε − Ir</div>
<p>ε = EMF, V = terminal pd, I = current, R = external resistance, r = internal resistance</p>
<div class="callout callout-key"><div class="callout-title">V-I graph for a battery</div>
Plot V_terminal (y-axis) vs I (x-axis):<br>
y-intercept = ε (EMF, when I=0)<br>
gradient = −r (negative = internal resistance)<br>
x-intercept = short-circuit current = ε/r</div>` },
    { icon:"🔀", title:"Potential Dividers",
      body:`<p>A potential divider uses two (or more) resistors in series to divide up the supply voltage.</p>
<div class="formula">V_out = V_in × R₂ / (R₁ + R₂)</div>
<p>Applications: sensors (with thermistors or LDRs), volume controls, signal processing.</p>
<div class="callout callout-tip"><div class="callout-title">Sensor circuits</div>
Replace R₁ or R₂ with a thermistor or LDR. As temperature/light changes, resistance changes → V_out changes. Use comparator to trigger a switch at a certain V_out.</div>
<div class="callout callout-warn"><div class="callout-title">Effect of load resistance</div>
Connecting a load across R₂ reduces the effective resistance of R₂ → V_out decreases. For accurate division, load resistance >> R₂.</div>` },
    { icon:"📊", title:"Measuring EMF & Internal Resistance",
      body:`<p>Method: connect battery to variable resistor (rheostat) + ammeter + voltmeter across battery terminals.</p>
<ol><li>Vary R, record I and V for each value</li>
<li>Plot V vs I — straight line</li>
<li>y-intercept = EMF (ε)</li>
<li>Magnitude of gradient = internal resistance (r)</li></ol>
<div class="callout callout-key"><div class="callout-title">Why terminal pd < EMF</div>
Current flowing through internal resistance causes a "lost volts" = Ir. Terminal pd = ε − Ir.</div>` }
  ],
  quiz:[
    { q:"A battery of EMF 9 V and internal resistance 1 Ω drives a current of 3 A. What is the terminal pd?", opts:["3 V","6 V","9 V","12 V"], ans:1, exp:"V = ε − Ir = 9 − (3×1) = 9 − 3 = 6 V." },
    { q:"In a potential divider with R₁=3kΩ and R₂=1kΩ across 12V, what is V_out across R₂?", opts:["3 V","4 V","9 V","12 V"], ans:0, exp:"V_out = 12 × 1/(3+1) = 12 × 0.25 = 3 V." },
    { q:"On a V-I graph for a battery, what does the y-intercept represent?", opts:["Internal resistance","Short circuit current","EMF","Terminal pd at maximum current"], ans:2, exp:"When I = 0 (no current flowing), V = ε − 0 = ε. The y-intercept of the V-I graph = EMF." },
    { q:"What happens to the terminal pd of a battery as more current is drawn?", opts:["Increases","Stays the same","Decreases","First increases then decreases"], ans:2, exp:"Terminal pd = ε − Ir. As I increases, Ir (lost volts) increases → terminal pd decreases." }
  ]
},
{
  id:12, title:"Waves",
  sections:[
    { icon:"🌊", title:"Wave Properties",
      body:`<p>A <strong>progressive wave</strong> transfers energy from one place to another without transferring matter.</p>
<h4>Key quantities:</h4>
<table><tr><th>Quantity</th><th>Symbol</th><th>Unit</th><th>Definition</th></tr>
<tr><td>Amplitude</td><td>A</td><td>m</td><td>Max displacement from equilibrium</td></tr>
<tr><td>Period</td><td>T</td><td>s</td><td>Time for one complete oscillation</td></tr>
<tr><td>Frequency</td><td>f</td><td>Hz</td><td>Number of oscillations per second</td></tr>
<tr><td>Wavelength</td><td>λ</td><td>m</td><td>Distance between adjacent points in phase</td></tr>
<tr><td>Wave speed</td><td>v</td><td>m s⁻¹</td><td>Speed of energy transfer</td></tr></table>
<div class="formula">v = fλ    (wave equation)</div>
<div class="formula">f = 1/T</div>` },
    { icon:"🔀", title:"Transverse & Longitudinal Waves",
      body:`<p><strong>Transverse waves</strong>: oscillations perpendicular to direction of energy transfer. Examples: light, water waves, EM waves, S-waves.</p>
<p><strong>Longitudinal waves</strong>: oscillations parallel to direction of energy transfer (compressions and rarefactions). Examples: sound, P-waves.</p>
<div class="callout callout-key"><div class="callout-title">Polarisation</div>
Only transverse waves can be polarised (oscillations confined to one plane). This proves light is transverse.<br>
Polaroid filters only transmit light oscillating in one plane. Two crossed Polaroids block all light.</div>` },
    { icon:"📡", title:"Electromagnetic Spectrum",
      body:`<p>All EM waves travel at c = 3.0 × 10⁸ m s⁻¹ in vacuum.</p>
<table><tr><th>Type</th><th>Wavelength</th><th>Frequency</th></tr>
<tr><td>Radio</td><td>>0.1 m</td><td><3×10⁹ Hz</td></tr>
<tr><td>Microwave</td><td>1 mm – 0.1 m</td><td>3×10⁹ – 3×10¹¹ Hz</td></tr>
<tr><td>Infrared</td><td>700 nm – 1 mm</td><td>3×10¹¹ – 4×10¹⁴ Hz</td></tr>
<tr><td>Visible</td><td>400–700 nm</td><td>4–7.5×10¹⁴ Hz</td></tr>
<tr><td>UV</td><td>10–400 nm</td><td>7.5×10¹⁴ – 3×10¹⁶ Hz</td></tr>
<tr><td>X-ray</td><td>0.01–10 nm</td><td>3×10¹⁶ – 3×10¹⁹ Hz</td></tr>
<tr><td>Gamma</td><td><0.01 nm</td><td>>3×10¹⁹ Hz</td></tr></table>` }
  ],
  quiz:[
    { q:"A wave has frequency 500 Hz and wavelength 0.68 m. What is its speed?", opts:["340 m s⁻¹","735 m s⁻¹","500 m s⁻¹","0.00136 m s⁻¹"], ans:0, exp:"v = fλ = 500 × 0.68 = 340 m s⁻¹ (speed of sound in air)." },
    { q:"Which type of wave cannot be polarised?", opts:["Light","Microwaves","Sound","Radio waves"], ans:2, exp:"Polarisation is only possible for transverse waves. Sound is longitudinal → cannot be polarised." },
    { q:"What is the frequency of a wave with period 0.02 s?", opts:["0.02 Hz","2 Hz","50 Hz","500 Hz"], ans:2, exp:"f = 1/T = 1/0.02 = 50 Hz." },
    { q:"Which EM waves have the longest wavelength?", opts:["Gamma rays","X-rays","Visible light","Radio waves"], ans:3, exp:"The EM spectrum ordered by increasing wavelength: γ, X-ray, UV, visible, IR, microwave, radio. Radio waves have the longest wavelength." }
  ]
},
{
  id:13, title:"Superposition of Waves",
  sections:[
    { icon:"🌊", title:"Principle of Superposition",
      body:`<p><strong>Principle of superposition</strong>: when two or more waves meet at a point, the resultant displacement is the algebraic sum of individual displacements.</p>
<ul><li><strong>Constructive interference</strong>: waves in phase (or path difference = nλ) → amplitude increases</li>
<li><strong>Destructive interference</strong>: waves in antiphase (or path difference = (n+½)λ) → amplitude decreases/cancels</li></ul>
<div class="callout callout-key"><div class="callout-title">Coherence</div>
For a stable interference pattern, sources must be <strong>coherent</strong>: same frequency, constant phase difference.<br>
Laser light is coherent. White light from a bulb is not.</div>` },
    { icon:"🔬", title:"Young's Double Slit",
      body:`<p>Two coherent sources produce a stable interference pattern of bright and dark fringes.</p>
<div class="formula">λ = ax / D</div>
<p>a = slit separation (m), x = fringe spacing (m), D = distance to screen (m)</p>
<div class="callout callout-tip"><div class="callout-title">Increasing fringe spacing</div>
↑ λ (use longer wavelength) → wider fringes<br>
↓ a (narrower slits) → wider fringes<br>
↑ D (move screen further) → wider fringes</div>
<div class="callout callout-warn"><div class="callout-title">Single slit diffraction</div>
Each slit causes diffraction. If slit width ≈ λ, diffraction is significant → central maximum modulates the double-slit pattern.</div>` },
    { icon:"🌈", title:"Diffraction Gratings",
      body:`<p>A diffraction grating has many slits, producing very sharp, widely spaced maxima.</p>
<div class="formula">d sinθ = nλ</div>
<p>d = grating spacing = 1/N (where N = slits per metre), n = order of maximum (0, ±1, ±2...), θ = angle to nth order maximum</p>
<div class="callout callout-key"><div class="callout-title">Maximum orders</div>
Maximum order when sinθ = 1: n_max = d/λ. Higher orders may not exist if d sinθ > 1.</div>
<p>Used to: measure wavelength of light, analyse spectra (spectroscopy).</p>` }
  ],
  quiz:[
    { q:"Two waves of amplitude 4 cm arrive at a point in phase. What is the resultant amplitude?", opts:["0 cm","4 cm","8 cm","16 cm"], ans:2, exp:"Constructive interference: resultant = sum of amplitudes = 4 + 4 = 8 cm." },
    { q:"In Young's double slit experiment, fringe spacing x = 2mm, D = 0.8m, a = 0.2mm. What is λ?", opts:["200 nm","500 nm","800 nm","1000 nm"], ans:1, exp:"λ = ax/D = (0.2×10⁻³ × 2×10⁻³) / 0.8 = 4×10⁻⁷/0.8 = 5×10⁻⁷ m = 500 nm." },
    { q:"A diffraction grating has 500 lines/mm. What is the grating spacing d?", opts:["0.5 mm","2 μm","5×10⁻⁷ m","2×10⁻⁶ m"], ans:3, exp:"d = 1/N = 1/(500×10³) = 2×10⁻⁶ m = 2 μm." },
    { q:"What condition is required for two sources to produce a stable interference pattern?", opts:["Same amplitude","Same intensity","Coherent (same frequency, constant phase difference)","Same wavelength only"], ans:2, exp:"Coherent sources have the same frequency and a constant (not necessarily zero) phase difference. This produces a stable, observable interference pattern." }
  ]
},
{
  id:14, title:"Stationary Waves",
  sections:[
    { icon:"🎵", title:"Formation of Stationary Waves",
      body:`<p>A <strong>stationary (standing) wave</strong> is formed when two identical progressive waves travel in opposite directions and superpose.</p>
<h4>Features:</h4>
<ul><li><strong>Nodes</strong>: points of zero displacement (destructive interference always). Separated by λ/2.</li>
<li><strong>Antinodes</strong>: points of maximum displacement (constructive interference always). Midway between nodes.</li>
<li>All points between two adjacent nodes oscillate in phase with each other.</li>
<li>Points either side of a node are in antiphase.</li></ul>
<div class="callout callout-key"><div class="callout-title">Comparison with progressive waves</div>
Progressive wave: energy travels. Stationary wave: energy stored (no net energy transfer).<br>
Progressive: all points have same amplitude. Stationary: amplitude varies (zero at nodes, max at antinodes).</div>` },
    { icon:"🎸", title:"Harmonics on Strings & Pipes",
      body:`<p>For a <strong>string fixed at both ends</strong> (or open pipe open at both ends):</p>
<div class="formula">Fundamental (1st harmonic): L = λ/2 → f₁ = v/2L</div>
<div class="formula">nth harmonic: fₙ = nf₁    (n = 1, 2, 3...)</div>
<p>For a <strong>pipe closed at one end</strong>:</p>
<div class="formula">Fundamental: L = λ/4 → f₁ = v/4L</div>
<div class="formula">Only odd harmonics: fₙ = nf₁    (n = 1, 3, 5...)</div>
<div class="callout callout-tip"><div class="callout-title">Boundary conditions</div>
Fixed end / closed end → NODE (zero displacement).<br>
Free end / open end → ANTINODE (maximum displacement).</div>` },
    { icon:"🔬", title:"Measuring Speed of Sound with Stationary Waves",
      body:`<p>Using a resonance tube (closed at one end) and a tuning fork:</p>
<ol><li>Hold tuning fork of known frequency f over open end</li>
<li>Adjust length L until resonance (loud sound)</li>
<li>First resonance: L = λ/4 (fundamental) → λ = 4L</li>
<li>Speed of sound: v = fλ = 4fL</li></ol>
<div class="callout callout-warn"><div class="callout-title">End correction</div>
The antinode is slightly beyond the open end of the tube. Add end correction e ≈ 0.3d (d = tube diameter) to measured length.</div>` }
  ],
  quiz:[
    { q:"What is found at a node of a stationary wave?", opts:["Maximum displacement","Zero displacement always","Maximum energy","Maximum amplitude"], ans:1, exp:"Nodes are fixed points of zero displacement — destructive interference occurs there at all times." },
    { q:"A string of length 0.5 m vibrates in its fundamental mode. What is the wavelength of the stationary wave?", opts:["0.25 m","0.5 m","1 m","2 m"], ans:2, exp:"For a string fixed at both ends, fundamental: L = λ/2. λ = 2L = 2×0.5 = 1 m." },
    { q:"What is the key difference between a stationary and a progressive wave?", opts:["Stationary waves have greater amplitude","Stationary waves transfer energy; progressive waves don't","Progressive waves transfer energy; stationary waves store energy between nodes","Progressive waves have nodes and antinodes"], ans:2, exp:"Progressive waves transfer energy in the direction of travel. Stationary waves store energy — there is no net energy transfer along the wave." },
    { q:"A closed pipe (one end open) resonates in its fundamental mode at 85 Hz. What is the 3rd harmonic frequency?", opts:["170 Hz","255 Hz","340 Hz","425 Hz"], ans:1, exp:"Closed pipe: only odd harmonics. 1st = 85 Hz; 3rd harmonic = 3×85 = 255 Hz." }
  ]
},
{
  id:15, title:"Atomic Structure & Practical Skills",
  sections:[
    { icon:"⚛️", title:"Atomic Structure (Nuclear Model)",
      body:`<p>The nuclear model: a tiny, dense, positively charged nucleus (protons + neutrons) surrounded by orbiting electrons.</p>
<div class="callout callout-key"><div class="callout-title">Evidence from Rutherford Scattering</div>
α-particles fired at gold foil:<br>
• Most passed straight through → atom mostly empty space<br>
• Some deflected by small angles → nucleus positively charged<br>
• Few bounced almost straight back → nucleus very small and very dense<br>
This disproved the Thomson "plum pudding" model.</div>
<p><strong>Nucleon number (A)</strong>: protons + neutrons. <strong>Proton number (Z)</strong>: protons only.<br>
<strong>Isotopes</strong>: same Z, different A (different number of neutrons).</p>` },
    { icon:"📏", title:"Practical Skills & Uncertainties",
      body:`<p>Experimental measurements always have uncertainty. Good practice:</p>
<h4>Types of error:</h4>
<ul><li><strong>Random error</strong>: unpredictable variation around the true value. Reduced by repeating measurements and averaging.</li>
<li><strong>Systematic error</strong>: consistent offset in one direction. Cannot be reduced by repeating. Examples: zero error, calibration error.</li></ul>
<h4>Uncertainty:</h4>
<div class="formula">Absolute uncertainty: Δx (same units as measurement)</div>
<div class="formula">Fractional uncertainty: Δx/x</div>
<div class="formula">Percentage uncertainty: (Δx/x) × 100%</div>
<h4>Combining uncertainties:</h4>
<ul><li>Add/subtract: add absolute uncertainties</li>
<li>Multiply/divide: add percentage uncertainties</li>
<li>Power n: multiply percentage uncertainty by n</li></ul>` },
    { icon:"📊", title:"Graphs & Analysis",
      body:`<p>When drawing graphs in physics:</p>
<ul><li>Label axes with quantity and unit (e.g. "velocity / m s⁻¹")</li>
<li>Use most of the graph paper</li>
<li>Draw best-fit line (straight or smooth curve) — not dot-to-dot</li>
<li>Calculate gradient using large triangle (on the line, not data points)</li>
<li>Include error bars if uncertainties are known</li></ul>
<div class="callout callout-key"><div class="callout-title">Linearisation</div>
If y = kxⁿ, take logs: log y = n log x + log k → straight line.<br>
Gradient = n, y-intercept = log k.<br>
This technique converts curves into straight-line graphs.</div>
<div class="callout callout-tip"><div class="callout-title">Significant figures</div>
Give final answers to the same number of significant figures as the least precise data. Intermediate calculations: keep extra figures to avoid rounding errors.</div>` }
  ],
  quiz:[
    { q:"What did Rutherford's α-particle scattering experiment prove?", opts:["Atoms are mostly solid","The nucleus is large and diffuse","The nucleus is small, dense, and positively charged","Electrons are in the nucleus"], ans:2, exp:"Most α-particles passing through + rare large-angle scattering/backscattering → the nucleus is tiny, very dense, and positively charged. Most of the atom is empty space." },
    { q:"A length is measured as 5.4 cm ± 0.1 cm. What is the percentage uncertainty?", opts:["0.1%","1.85%","10%","54%"], ans:1, exp:"% uncertainty = (0.1/5.4) × 100% = 1.85%." },
    { q:"When multiplying two quantities each with 3% uncertainty, what is the percentage uncertainty of the product?", opts:["1.5%","3%","6%","9%"], ans:2, exp:"When multiplying, add percentage uncertainties: 3% + 3% = 6%." },
    { q:"Why should a best-fit line be drawn rather than connecting all data points?", opts:["To make the graph look neater","To minimise random errors by averaging the trend","Data points are always wrong","It is the same as connecting the dots"], ans:1, exp:"A best-fit line averages out random errors in individual measurements, giving a better estimate of the true relationship." },
    { q:"Which type of error can be reduced by taking repeated measurements?", opts:["Systematic error","Zero error","Random error","Calibration error"], ans:2, exp:"Random errors are unpredictable and vary in both directions. Averaging many measurements reduces their effect. Systematic errors remain even with repetition." }
  ]
}
] },
  bio:  { key:'bio',  label:'Biology',   code:'9700', emoji:'🧬', accent:'var(--bio)',  chapters: [
{
  id:1, title:"Cell Structure",
  sections:[
    { icon:"🔬", title:"Prokaryotic & Eukaryotic Cells",
      body:`<p>All living organisms are made of cells. There are two fundamental types:</p>
<table><tr><th>Feature</th><th>Prokaryotic</th><th>Eukaryotic</th></tr>
<tr><td>Nucleus</td><td>No (nucleoid region)</td><td>Yes (membrane-bound)</td></tr>
<tr><td>Size</td><td>1–10 μm</td><td>10–100 μm</td></tr>
<tr><td>DNA</td><td>Circular, no histones, in cytoplasm</td><td>Linear, with histones, in nucleus</td></tr>
<tr><td>Ribosomes</td><td>70S (smaller)</td><td>80S (larger); 70S in mitochondria/chloroplasts</td></tr>
<tr><td>Membrane-bound organelles</td><td>None</td><td>Present (mitochondria, ER, Golgi, etc.)</td></tr>
<tr><td>Cell wall</td><td>Peptidoglycan (bacteria)</td><td>Cellulose (plants), chitin (fungi), none (animals)</td></tr>
<tr><td>Examples</td><td>Bacteria, Archaea</td><td>Animals, plants, fungi, protists</td></tr></table>
<div class="callout callout-key"><div class="callout-title">Endosymbiotic Theory</div>
Mitochondria and chloroplasts were once free-living prokaryotes engulfed by eukaryotic cells. Evidence: they have 70S ribosomes, circular DNA, double membrane, and reproduce by binary fission.</div>` },
    { icon:"🏗️", title:"Ultrastructure of Eukaryotic Cells",
      body:`<p>Key organelles and their functions:</p>
<table><tr><th>Organelle</th><th>Structure</th><th>Function</th></tr>
<tr><td>Nucleus</td><td>Double membrane (nuclear envelope) with pores; contains chromatin and nucleolus</td><td>Contains DNA; controls cell activities; nucleolus makes rRNA</td></tr>
<tr><td>Mitochondria</td><td>Double membrane; inner membrane folded into cristae; matrix inside</td><td>Site of aerobic respiration (ATP production)</td></tr>
<tr><td>Chloroplast (plants)</td><td>Double membrane; internal thylakoid membranes (grana); stroma</td><td>Photosynthesis</td></tr>
<tr><td>Rough ER</td><td>Membrane system with ribosomes on surface</td><td>Synthesis and transport of proteins</td></tr>
<tr><td>Smooth ER</td><td>Membrane system, no ribosomes</td><td>Synthesis of lipids; detoxification</td></tr>
<tr><td>Golgi apparatus</td><td>Stack of flattened membranous cisternae</td><td>Modifies, packages, and sorts proteins; produces lysosomes and secretory vesicles</td></tr>
<tr><td>Ribosome</td><td>Two subunits (rRNA + protein); 80S eukaryotic</td><td>Site of protein synthesis (translation)</td></tr>
<tr><td>Lysosome</td><td>Membrane-bound vesicle containing hydrolytic enzymes</td><td>Intracellular digestion; autophagy</td></tr>
<tr><td>Vacuole (plants)</td><td>Large membrane-bound space filled with cell sap</td><td>Maintains turgor; stores pigments, ions, waste</td></tr>
<tr><td>Centrioles (animals)</td><td>Pair of microtubule cylinders</td><td>Organise spindle fibres during cell division</td></tr>
<tr><td>Cell wall (plants)</td><td>Cellulose microfibrils</td><td>Support, shape, prevents lysis</td></tr></table>` },
    { icon:"🔭", title:"Microscopy",
      body:`<p>Two main types of microscope used in biology:</p>
<table><tr><th>Feature</th><th>Light (optical)</th><th>Electron (TEM/SEM)</th></tr>
<tr><td>Radiation used</td><td>Light (visible)</td><td>Electrons</td></tr>
<tr><td>Max magnification</td><td>~×1500</td><td>~×500 000</td></tr>
<tr><td>Resolution</td><td>~200 nm</td><td>~0.1 nm (TEM)</td></tr>
<tr><td>Living specimens</td><td>Yes</td><td>No (must be fixed/stained)</td></tr>
<tr><td>Colour</td><td>Natural colour with stains</td><td>Black & white (false colour added)</td></tr></table>
<div class="formula">magnification = image size / actual size</div>
<div class="formula">actual size = image size / magnification</div>
<div class="callout callout-tip"><div class="callout-title">Resolution vs Magnification</div>
Resolution = ability to distinguish two points as separate. Magnification = how much larger the image appears. A highly magnified but blurry image has poor resolution.</div>` }
  ],
  quiz:[
    { q:"Which feature is found in prokaryotic cells but NOT eukaryotic cells?", opts:["Ribosomes","Circular DNA with no histones","Cell membrane","Cytoplasm"], ans:1, exp:"Prokaryotes have circular DNA not associated with histone proteins, located in a nucleoid region (not a membrane-bound nucleus)." },
    { q:"Which organelle is responsible for modifying and packaging proteins for secretion?", opts:["Rough ER","Mitochondria","Golgi apparatus","Lysosome"], ans:2, exp:"The Golgi apparatus receives proteins from the rough ER, modifies them (e.g. adds carbohydrate groups), packages them into vesicles for secretion or to form lysosomes." },
    { q:"An image of a cell is 30 mm wide. The actual cell is 0.03 mm wide. What is the magnification?", opts:["×100","×1000","×10 000","×300"], ans:1, exp:"Magnification = image size / actual size = 30/0.03 = 1000. So ×1000." },
    { q:"Why do mitochondria have a folded inner membrane (cristae)?", opts:["To store more DNA","To increase surface area for ATP synthesis","To contain the matrix","To allow ribosomes to attach"], ans:1, exp:"Cristae greatly increase the surface area of the inner mitochondrial membrane, allowing more ATP synthase and electron transport chain proteins → more ATP produced." },
    { q:"What is the main advantage of electron microscopy over light microscopy?", opts:["Can view living cells","Uses visible light","Greater resolution allowing ultrastructure to be seen","Cheaper and easier to use"], ans:2, exp:"Electron microscopes have far greater resolution (~0.1 nm vs ~200 nm for light) because electrons have much shorter wavelengths. This allows subcellular ultrastructure to be visualised." }
  ]
},
{
  id:2, title:"Biological Molecules",
  sections:[
    { icon:"🍬", title:"Carbohydrates",
      body:`<p>Carbohydrates contain C, H, O (ratio approximately CH₂O).</p>
<h4>Monosaccharides (simple sugars):</h4>
<ul><li>α-glucose, β-glucose, fructose, galactose, ribose (5C), deoxyribose (5C)</li>
<li>Reducing sugars: test with Benedict's solution → brick-red precipitate when heated</li></ul>
<h4>Disaccharides (two monosaccharides joined by glycosidic bond):</h4>
<table><tr><th>Disaccharide</th><th>Monomers</th><th>Bond</th></tr>
<tr><td>Maltose</td><td>α-glucose + α-glucose</td><td>α-1,4-glycosidic</td></tr>
<tr><td>Sucrose</td><td>α-glucose + fructose</td><td>α-1,2-glycosidic (non-reducing)</td></tr>
<tr><td>Lactose</td><td>β-glucose + galactose</td><td>β-1,4-glycosidic</td></tr></table>
<h4>Polysaccharides:</h4>
<table><tr><th>Polysaccharide</th><th>Monomer</th><th>Bonds</th><th>Function</th></tr>
<tr><td>Starch (amylose + amylopectin)</td><td>α-glucose</td><td>α-1,4 (+ α-1,6 in amylopectin)</td><td>Energy storage in plants</td></tr>
<tr><td>Glycogen</td><td>α-glucose</td><td>α-1,4 + α-1,6 (highly branched)</td><td>Energy storage in animals/fungi</td></tr>
<tr><td>Cellulose</td><td>β-glucose</td><td>β-1,4 (alternate units rotated)</td><td>Structural — cell walls</td></tr></table>
<div class="callout callout-key"><div class="callout-title">Why cellulose is structural</div>
β-glucose units alternate orientation → straight, unbranched chains → hydrogen bonds between parallel chains → microfibrils → great tensile strength.</div>` },
    { icon:"🧈", title:"Lipids",
      body:`<p>Lipids contain C, H, O (less O than carbohydrates). Insoluble in water, soluble in organic solvents.</p>
<h4>Triglycerides:</h4>
<p>Glycerol + 3 fatty acids joined by <strong>ester bonds</strong> (formed by condensation). Fatty acids can be:</p>
<ul><li><strong>Saturated</strong>: no C=C double bonds; straight chain; solid at room temperature (e.g. animal fats)</li>
<li><strong>Unsaturated</strong>: one or more C=C double bonds; kinked chain; liquid at room temperature (e.g. plant oils)</li></ul>
<h4>Phospholipids:</h4>
<p>Glycerol + 2 fatty acids + phosphate group. Amphipathic (hydrophilic head, hydrophobic tails) → form bilayers in water → basis of all cell membranes.</p>
<div class="callout callout-tip"><div class="callout-title">Emulsion test for lipids</div>
Add ethanol, shake, then add water → milky white emulsion if lipid present.</div>
<div class="callout callout-key"><div class="callout-title">Functions of lipids</div>
• Energy storage (more energy per gram than carbohydrates)<br>
• Thermal insulation (adipose tissue)<br>
• Cell membranes (phospholipids)<br>
• Hormones (steroids, e.g. testosterone, oestrogen)<br>
• Myelin sheath (electrical insulation of nerve fibres)<br>
• Waterproofing (waxes in plant cuticle)</div>` },
    { icon:"🔗", title:"Proteins & Amino Acids",
      body:`<p>Proteins contain C, H, O, N (and sometimes S). Made of <strong>amino acids</strong> linked by <strong>peptide bonds</strong> (condensation reactions).</p>
<p>All amino acids have: NH₂ group, COOH group, H, and variable R group attached to the same α-carbon.</p>
<h4>Levels of protein structure:</h4>
<ul><li><strong>Primary</strong>: sequence of amino acids (determined by DNA)</li>
<li><strong>Secondary</strong>: α-helix or β-pleated sheet (hydrogen bonds between peptide bonds)</li>
<li><strong>Tertiary</strong>: 3D folding — ionic bonds, disulfide bridges, hydrophobic interactions, H-bonds between R groups</li>
<li><strong>Quaternary</strong>: multiple polypeptide chains (e.g. haemoglobin: 4 chains + haem groups)</li></ul>
<div class="callout callout-warn"><div class="callout-title">Denaturation</div>
High temperature or extreme pH breaks hydrogen bonds, ionic bonds, and disulfide bridges → tertiary/quaternary structure lost → protein loses function. Primary structure is NOT broken (peptide bonds intact).</div>
<h4>Biuret test for proteins:</h4>
<p>Add NaOH then CuSO₄ → purple/violet colour if protein present (pale blue if absent).</p>` },
    { icon:"🧬", title:"Water & Its Properties",
      body:`<p>Water is the most important molecule for life. Its properties arise from hydrogen bonding between molecules.</p>
<table><tr><th>Property</th><th>Reason</th><th>Biological importance</th></tr>
<tr><td>High specific heat capacity</td><td>H-bonds absorb energy without temperature rise</td><td>Stable aquatic environments; temperature regulation in organisms</td></tr>
<tr><td>High latent heat of vaporisation</td><td>Many H-bonds must break to evaporate</td><td>Effective cooling by sweating/transpiration</td></tr>
<tr><td>Cohesion & surface tension</td><td>H-bonds between water molecules</td><td>Water column in xylem; surface film for small organisms</td></tr>
<tr><td>Good solvent (polar)</td><td>Polar molecule dissolves ionic/polar substances</td><td>Medium for metabolic reactions; transport in blood/sap</td></tr>
<tr><td>Ice less dense than water</td><td>H-bonds in ice form open lattice</td><td>Ice floats → insulates water below → aquatic life survives winter</td></tr>
<tr><td>Metabolite</td><td>—</td><td>Reactant in hydrolysis and photosynthesis; product of respiration and condensation</td></tr></table>` }
  ],
  quiz:[
    { q:"What type of bond joins monosaccharides to form a disaccharide?", opts:["Peptide bond","Glycosidic bond","Ester bond","Hydrogen bond"], ans:1, exp:"Monosaccharides are joined by glycosidic bonds formed by condensation reactions (water is released)." },
    { q:"Which polysaccharide is used for structural support in plant cell walls?", opts:["Starch","Glycogen","Cellulose","Amylose"], ans:2, exp:"Cellulose is made of β-glucose with β-1,4 glycosidic bonds. The alternating orientation creates straight chains that hydrogen-bond to adjacent chains → microfibrils with high tensile strength." },
    { q:"What level of protein structure involves the sequence of amino acids?", opts:["Primary","Secondary","Tertiary","Quaternary"], ans:0, exp:"Primary structure = the specific sequence of amino acids in the polypeptide chain, determined by the gene (DNA sequence)." },
    { q:"Why do phospholipids form a bilayer in water?", opts:["They are very large molecules","Their hydrophilic heads face water and hydrophobic tails face inward, away from water","They are negatively charged","They form covalent bonds with water"], ans:1, exp:"Phospholipids are amphipathic. In water, hydrophilic phosphate heads face outward toward water; hydrophobic fatty acid tails face inward away from water → spontaneous bilayer formation." },
    { q:"Which test is used to detect reducing sugars?", opts:["Biuret test","Emulsion test","Benedict's test","Iodine test"], ans:2, exp:"Benedict's test: heat with Benedict's solution (blue). If reducing sugar present → brick-red precipitate of Cu₂O forms." }
  ]
},
{
  id:3, title:"Enzymes",
  sections:[
    { icon:"🔑", title:"Enzyme Structure & Action",
      body:`<p>Enzymes are <strong>globular proteins</strong> that act as biological catalysts — they speed up reactions without being consumed.</p>
<p>Each enzyme has an <strong>active site</strong>: a specific 3D cleft whose shape is complementary to the substrate.</p>
<h4>Two models of enzyme action:</h4>
<ul><li><strong>Lock and key model</strong>: active site is rigid; substrate fits exactly like a key in a lock</li>
<li><strong>Induced fit model</strong> (more accurate): active site changes shape slightly when substrate binds → better fit → more effective catalysis</li></ul>
<div class="callout callout-key"><div class="callout-title">How enzymes lower activation energy</div>
Enzyme-substrate complex (ES complex) is formed. The active site strains/distorts bonds in the substrate, lowers the activation energy needed for the reaction → reaction proceeds faster at lower temperature.</div>
<div class="callout callout-tip"><div class="callout-title">Enzyme specificity</div>
Each enzyme catalyses only one reaction (or one type of reaction) because only the correct substrate fits the active site. This is due to the specific tertiary structure of the protein.</div>` },
    { icon:"📊", title:"Factors Affecting Enzyme Activity",
      body:`<h4>Temperature:</h4>
<ul><li>↑ temperature → ↑ kinetic energy → more frequent ES collisions → ↑ rate (up to optimum)</li>
<li>Above optimum: H-bonds and other bonds holding tertiary structure break → active site shape changes → enzyme denatured → rate drops to zero</li>
