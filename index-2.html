// ── STATE ─────────────────────────────────────────────────────────────────────
let currentUser = null;
let currentSubject = 'chem';
let currentChapterIdx = {};  // per subject
let doneChaps = { chem: new Set(), phys: new Set(), bio: new Set(), math: new Set() };
let quizAnswers = {};  // "subj-ci-qi" -> chosen option
let syncTimer = null;

// ── AUTH ──────────────────────────────────────────────────────────────────────
let authMode = 'login';

function switchTab(mode) {
  authMode = mode;
  document.getElementById('tabLogin').classList.toggle('active', mode==='login');
  document.getElementById('tabSignup').classList.toggle('active', mode==='signup');
  document.getElementById('authSubmit').textContent = mode==='login' ? 'Sign In' : 'Create Account';
  document.getElementById('authMsg').textContent = '';
  document.getElementById('authMsg').className = 'auth-err';
}

async function handleAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const btn = document.getElementById('authSubmit');
  const msg = document.getElementById('authMsg');
  if (!email || !password) { msg.textContent = 'Please enter email and password.'; return; }
  btn.disabled = true;
  btn.textContent = authMode==='login' ? 'Signing in...' : 'Creating account...';
  msg.textContent = '';
  try {
    let result;
    if (authMode === 'login') {
      result = await sb.auth.signInWithPassword({ email, password });
    } else {
      result = await sb.auth.signUp({ email, password });
    }
    if (result.error) throw result.error;
    if (authMode === 'signup' && result.data.user && !result.data.session) {
      msg.className = 'auth-ok';
      msg.textContent = 'Check your email to confirm your account!';
      btn.disabled = false;
      btn.textContent = 'Create Account';
      return;
    }
  } catch(e) {
    msg.textContent = e.message || 'Something went wrong.';
    btn.disabled = false;
    btn.textContent = authMode==='login' ? 'Sign In' : 'Create Account';
  }
}

async function handleLogout() {
  await sb.auth.signOut();
  currentUser = null;
  doneChaps = { chem: new Set(), phys: new Set(), bio: new Set(), math: new Set() };
  document.getElementById('app').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
}

// ── PROGRESS SYNC ─────────────────────────────────────────────────────────────
async function loadProgress() {
  if (!currentUser) return;
  const { data } = await sb.from('progress').select('subject,chapter_id,done').eq('user_id', currentUser.id);
  if (data) {
    doneChaps = { chem: new Set(), phys: new Set(), bio: new Set(), math: new Set() };
    data.forEach(row => {
      if (row.done && doneChaps[row.subject]) doneChaps[row.subject].add(row.chapter_id);
    });
  }
}

async function saveProgress(subject, chapterId, done) {
  if (!currentUser) return;
  await sb.from('progress').upsert({
    user_id: currentUser.id, subject, chapter_id: chapterId, done, updated_at: new Date().toISOString()
  }, { onConflict: 'user_id,subject,chapter_id' });
}

// ── BUILD UI ──────────────────────────────────────────────────────────────────
function buildAll() {
  Object.values(SUBJECTS).forEach(subj => {
    buildSidebar(subj.key);
    buildChapters(subj.key);
  });
  buildDrawer();
  // Set accent colors per subject
  applyAccents();
  // Show first chapter for current subject
  showChapter(currentSubject, 0);
}

function applyAccents() {
  const accents = { chem:'var(--chem)', phys:'var(--phys)', bio:'var(--bio)', math:'var(--math)' };
  Object.entries(accents).forEach(([subj, accent]) => {
    const view = document.getElementById(`view-${subj}`);
    // formula colors
    view.querySelectorAll('.formula').forEach(el => el.style.color = accent);
    view.querySelectorAll('h3').forEach(el => el.style.color = accent);
    view.querySelectorAll('.callout-key').forEach(el => {
      el.style.borderColor = accent;
      el.querySelector('.callout-title') && (el.querySelector('.callout-title').style.color = accent);
    });
    view.querySelectorAll('th').forEach(el => el.style.color = accent);
    view.querySelectorAll('.quiz-header').forEach(el => el.style.color = accent);
    view.querySelectorAll('.qopt:not(.correct):not(.wrong)').forEach(el => {
      el.addEventListener('mouseenter', () => { el.style.borderColor = accent; el.style.background = accent.replace('var(','').replace(')',''); });
    });
    // tag colors
    view.querySelectorAll('.tag').forEach(el => {
      el.style.color = accent;
      el.style.borderColor = accent;
    });
    // mark done button
    view.querySelectorAll('.mark-done.active').forEach(el => { el.style.borderColor = accent; el.style.color = accent; });
  });
}

function buildSidebar(subj) {
  const s = SUBJECTS[subj];
  const list = document.getElementById(`sidebar-${subj}`);
  list.innerHTML = '';
  let lastTag = null;
  s.chapters.forEach((ch, idx) => {
    if (ch.tag && ch.tag !== lastTag) {
      const lbl = document.createElement('div');
      lbl.className = 'sidebar-group-label';
      lbl.textContent = ch.tag === 'P1' ? 'Pure Mathematics 1' : 'Statistics 1';
      list.appendChild(lbl);
      lastTag = ch.tag;
    }
    const el = document.createElement('div');
    el.className = 'ch-item' + (doneChaps[subj].has(ch.id) ? ' done' : '');
    el.dataset.idx = idx;
    el.dataset.subj = subj;
    const numLabel = ch.tag ? `${ch.tag}·${ch.id}` : `CH${ch.id}`;
    el.innerHTML = `<span class="ch-num">${numLabel}</span><span>${ch.title}</span><span class="done-dot"></span>`;
    el.onclick = () => showChapter(subj, idx);
    list.appendChild(el);
  });
}

function buildDrawer() {
  const s = SUBJECTS[currentSubject];
  const list = document.getElementById('drawerList');
  list.innerHTML = '';
  document.getElementById('drawerHeader').textContent = s.emoji + ' ' + s.label;
  let lastTag = null;
  s.chapters.forEach((ch, idx) => {
    if (ch.tag && ch.tag !== lastTag) {
      const lbl = document.createElement('div');
      lbl.className = 'sidebar-group-label';
      lbl.textContent = ch.tag === 'P1' ? 'Pure Mathematics 1' : 'Statistics 1';
      list.appendChild(lbl);
      lastTag = ch.tag;
    }
    const el = document.createElement('div');
    el.className = 'ch-item' + (doneChaps[currentSubject].has(ch.id) ? ' done' : '');
    el.dataset.idx = idx;
    const numLabel = ch.tag ? `${ch.tag}·${ch.id}` : `CH${ch.id}`;
    el.innerHTML = `<span class="ch-num">${numLabel}</span><span>${ch.title}</span><span class="done-dot"></span>`;
    el.onclick = () => { showChapter(currentSubject, idx); closeDrawer(); };
    list.appendChild(el);
  });
}

function buildChapters(subj) {
  const s = SUBJECTS[subj];
  const wrap = document.getElementById(`chapters-${subj}`);
  wrap.innerHTML = '';
  s.chapters.forEach((ch, ci) => {
    const div = document.createElement('div');
    div.className = 'chapter-view';
    div.id = `ch-${subj}-${ci}`;
    let tagHTML = '';
    if (ch.tag) {
      const tagLabel = ch.tag === 'P1' ? 'PURE MATHS 1' : 'STATISTICS 1';
      tagHTML = `<span class="tag" style="background:rgba(255,209,102,0.1);border:1px solid rgba(255,209,102,0.25);">${tagLabel}</span>`;
    } else {
      tagHTML = `<span class="tag" style="background:rgba(255,255,255,0.05);border:1px solid var(--border);">AS LEVEL</span>`;
    }
    const secHTML = ch.sections.map((sec, si) => `
      <div class="section" id="sec-${subj}-${ci}-${si}">
        <div class="sec-head" onclick="toggleSec('${subj}',${ci},${si})">
          <span class="sec-icon">${sec.icon}</span>
          <span class="sec-title">${sec.title}</span>
          <span class="sec-arrow">▶</span>
        </div>
        <div class="sec-body" id="sb-${subj}-${ci}-${si}">${sec.body}</div>
      </div>`).join('');
    const qHTML = ch.quiz.map((q, qi) => `
      <div class="quiz-q">
        <div class="quiz-question">${qi+1}. ${q.q}</div>
        <div class="quiz-opts">${q.opts.map((o,oi) => `
          <div class="qopt" id="o-${subj}-${ci}-${qi}-${oi}" onclick="answer('${subj}',${ci},${qi},${oi})">
            <span class="opt-ltr">${String.fromCharCode(65+oi)}</span>${o}
          </div>`).join('')}
        </div>
        <div class="qfb" id="fb-${subj}-${ci}-${qi}"></div>
      </div>`).join('');
    const isDone = doneChaps[subj].has(ch.id);
    div.innerHTML = `
      <div class="ch-header">
        <div class="ch-num-big">${String(ch.id).padStart(2,'0')}</div>
        <div class="ch-title-wrap">
          <h1>${ch.title}</h1>
          <div class="ch-subtitle">Cambridge ${s.code} · AS Level ${s.label}</div>
          ${tagHTML}
        </div>
      </div>
      ${secHTML}
      <div class="quiz-wrap">
        <div class="quiz-header">⚡ Quick Quiz — ${ch.quiz.length} Questions</div>
        ${qHTML}
        <div class="quiz-score" id="qs-${subj}-${ci}"><span class="score-big" id="sn-${subj}-${ci}"></span>Quiz complete</div>
      </div>
      <button class="mark-done ${isDone?'active':''}" id="db-${subj}-${ci}" onclick="toggleDone('${subj}',${ci})">
        ${isDone ? '✓ Marked as done' : '○ Mark as done'}
      </button>`;
    wrap.appendChild(div);
  });
}

function toggleSec(subj, ci, si) {
  const s = document.getElementById(`sec-${subj}-${ci}-${si}`);
  const b = document.getElementById(`sb-${subj}-${ci}-${si}`);
  s.classList.toggle('open'); b.classList.toggle('open');
}

function answer(subj, ci, qi, oi) {
  const k = `${subj}-${ci}-${qi}`;
  if (quizAnswers[k] !== undefined) return;
  quizAnswers[k] = oi;
  const ch = SUBJECTS[subj].chapters[ci];
  const correct = ch.quiz[qi].ans;
  ch.quiz[qi].opts.forEach((_,i) => {
    const el = document.getElementById(`o-${subj}-${ci}-${qi}-${i}`);
    if (!el) return;
    el.classList.add('revealed');
    if (i === correct) el.classList.add('correct');
    else if (i === oi) el.classList.add('wrong');
  });
  const fb = document.getElementById(`fb-${subj}-${ci}-${qi}`);
  fb.textContent = (oi === correct ? '✓ ' : '✗ ') + ch.quiz[qi].exp;
  fb.className = 'qfb show ' + (oi === correct ? 'ok' : 'no');
  const allDone = ch.quiz.every((_,i) => quizAnswers[`${subj}-${ci}-${i}`] !== undefined);
  if (allDone) {
    const score = ch.quiz.filter((_,i) => quizAnswers[`${subj}-${ci}-${i}`] === ch.quiz[i].ans).length;
    const sn = document.getElementById(`sn-${subj}-${ci}`);
    sn.textContent = `${score}/${ch.quiz.length}`;
    const accent = SUBJECTS[subj].accent;
    sn.style.color = score === ch.quiz.length ? '#00e5a0' : score >= ch.quiz.length/2 ? accent : '#ff6b35';
    document.getElementById(`qs-${subj}-${ci}`).classList.add('show');
  }
}

async function toggleDone(subj, ci) {
  const ch = SUBJECTS[subj].chapters[ci];
  const btn = document.getElementById(`db-${subj}-${ci}`);
  const accent = SUBJECTS[subj].accent;
  if (doneChaps[subj].has(ch.id)) {
    doneChaps[subj].delete(ch.id);
    btn.className = 'mark-done';
    btn.textContent = '○ Mark as done';
    btn.style.borderColor = '';
    btn.style.color = '';
  } else {
    doneChaps[subj].add(ch.id);
    btn.className = 'mark-done active';
    btn.textContent = '✓ Marked as done';
    btn.style.borderColor = accent;
    btn.style.color = accent;
  }
  // Update sidebar dot
  rebuildSidebarItem(subj, ci);
  // Sync to Supabase
  await saveProgress(subj, ch.id, doneChaps[subj].has(ch.id));
}

function rebuildSidebarItem(subj, ci) {
  document.querySelectorAll(`[data-subj="${subj}"][data-idx="${ci}"]`).forEach(el => {
    el.classList.toggle('done', doneChaps[subj].has(SUBJECTS[subj].chapters[ci].id));
  });
  buildDrawer();
}

function showChapter(subj, idx) {
  if (subj !== currentSubject) switchSubject(subj);
  currentChapterIdx[subj] = idx;
  const wrap = document.getElementById(`chapters-${subj}`);
  wrap.querySelectorAll('.chapter-view').forEach(e => e.classList.remove('active'));
  const chEl = document.getElementById(`ch-${subj}-${idx}`);
  if (chEl) chEl.classList.add('active');
  // Sidebar highlight
  document.querySelectorAll(`#sidebar-${subj} .ch-item`).forEach(e => e.classList.remove('active'));
  const sideEl = document.querySelector(`#sidebar-${subj} .ch-item[data-idx="${idx}"]`);
  if (sideEl) sideEl.classList.add('active');
  // Open first section if none open
  const firstSec = document.getElementById(`sec-${subj}-${idx}-0`);
  if (firstSec && !firstSec.classList.contains('open')) toggleSec(subj, idx, 0);
  // Scroll to top
  const content = document.getElementById(`content-${subj}`);
  if (content) content.scrollTop = 0;
  // Apply accent colors to newly built content
  applyAccents();
}

function switchSubject(subj) {
  currentSubject = subj;
  document.querySelectorAll('.subject-view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${subj}`).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.nav-tab[data-subject="${subj}"]`).classList.add('active');
  // Update progress bar listener
  const content = document.getElementById(`content-${subj}`);
  content.onscroll = function() {
    const p = this.scrollTop / (this.scrollHeight - this.clientHeight);
    document.getElementById('scrollBar').style.width = (p * 100) + '%';
    document.getElementById('scrollBar').style.background = SUBJECTS[subj].accent;
  };
  buildDrawer();
  if (currentChapterIdx[subj] === undefined) {
    showChapter(subj, 0);
  }
}

function filterSidebar(v) {
  const subj = currentSubject;
  document.querySelectorAll(`#sidebar-${subj} .ch-item, #drawerList .ch-item`).forEach(el => {
    const ch = SUBJECTS[subj].chapters[parseInt(el.dataset.idx)];
    if (!ch) return;
    el.style.display = ch.title.toLowerCase().includes(v.toLowerCase()) ? '' : 'none';
  });
}

function openDrawer() {
  buildDrawer();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function showApp(user) {
  currentUser = user;
  document.getElementById('navUser').textContent = currentUser.email;
  await loadProgress();
  buildAll();
  switchSubject('chem');
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function showAuth() {
  currentUser = null;
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

async function init() {
  // Safety timeout — if nothing happens in 5s, show auth screen
  const timeout = setTimeout(() => {
    if (document.getElementById('loadingScreen').style.display !== 'none') {
      showAuth();
    }
  }, 5000);

  // Check for existing session immediately
  try {
    const { data: { session } } = await sb.auth.getSession();
    clearTimeout(timeout);
    if (session?.user) {
      await showApp(session.user);
    } else {
      showAuth();
    }
  } catch(e) {
    clearTimeout(timeout);
    showAuth();
  }

  // Listen for future auth changes (login, logout)
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user && !currentUser) {
      await showApp(session.user);
    } else if (event === 'SIGNED_OUT') {
      doneChaps = { chem: new Set(), phys: new Set(), bio: new Set(), math: new Set() };
      showAuth();
    }
  });

  // Enter key support on auth
  ['authEmail','authPassword'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth(); });
  });
}

window.initReady = true;
if (window.sdkReady) init();
</script>
