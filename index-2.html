<li>Optimum ≈ 37°C for human enzymes; thermophilic bacteria have optima up to 80°C+</li></ul>
<h4>pH:</h4>
<ul><li>Each enzyme has an optimum pH</li>
<li>Above/below optimum: H⁺ or OH⁻ ions disrupt ionic bonds and H-bonds → active site shape changes → denaturation</li>
<li>Pepsin optimum ≈ pH 2 (stomach); amylase ≈ pH 7; arginase ≈ pH 9.5</li></ul>
<h4>Substrate concentration:</h4>
<ul><li>↑ [S] → ↑ rate (more substrate finds free active sites)</li>
<li>At high [S]: all active sites occupied (saturation) → rate levels off (Vmax)</li></ul>
<h4>Enzyme concentration:</h4>
<ul><li>↑ [E] → ↑ rate (more active sites available) if [S] is not limiting</li></ul>` },
    { icon:"🚫", title:"Enzyme Inhibition",
      body:`<table><tr><th>Feature</th><th>Competitive inhibition</th><th>Non-competitive inhibition</th></tr>
<tr><td>Binds to</td><td>Active site</td><td>Allosteric site (elsewhere on enzyme)</td></tr>
<tr><td>Similarity to substrate</td><td>Similar shape to substrate</td><td>Different shape; not similar to substrate</td></tr>
<tr><td>Effect on active site</td><td>Blocks active site directly</td><td>Changes shape of active site (allosteric effect)</td></tr>
<tr><td>Effect of ↑ [S]</td><td>Rate increases (substrate outcompetes inhibitor)</td><td>No effect — rate stays reduced</td></tr>
<tr><td>Reversibility</td><td>Usually reversible</td><td>Can be reversible or irreversible</td></tr>
<tr><td>Vmax</td><td>Unchanged (if [S] high enough)</td><td>Reduced</td></tr>
<tr><td>Examples</td><td>Malonate inhibits succinate dehydrogenase</td><td>Heavy metal ions (Pb²⁺, Hg²⁺); cyanide inhibits cytochrome oxidase</td></tr></table>
<div class="callout callout-key"><div class="callout-title">End-product inhibition</div>
The final product of a metabolic pathway acts as a non-competitive inhibitor of an enzyme early in the pathway. This is a feedback control mechanism preventing overproduction.</div>` }
  ],
  quiz:[
    { q:"How does the induced fit model differ from the lock and key model?", opts:["The substrate changes shape in both models","In induced fit, the active site changes shape when the substrate binds","Lock and key is more accurate than induced fit","In lock and key, the active site is flexible"], ans:1, exp:"Induced fit: the active site is not a rigid shape but changes conformation slightly when the substrate binds, creating a better-fitting ES complex. Lock and key assumes a rigid, pre-formed active site." },
    { q:"An enzyme works at pH 2. In which part of the digestive system is it likely to function?", opts:["Mouth","Small intestine","Stomach","Large intestine"], ans:2, exp:"pH 2 is highly acidic — this is the pH of the stomach. Pepsin (a protease) functions optimally at ~pH 2." },
    { q:"At enzyme saturation, what limits the reaction rate?", opts:["Substrate concentration","Product concentration","Enzyme (active site) concentration","Temperature"], ans:2, exp:"At saturation, all active sites are occupied. Rate cannot increase further regardless of substrate concentration — the enzyme concentration (number of active sites) is the limiting factor." },
    { q:"How does increasing substrate concentration affect rate with a competitive inhibitor present?", opts:["Rate decreases further","Rate is completely blocked","Rate increases as substrate outcompetes the inhibitor","Rate is unaffected"], ans:2, exp:"Competitive inhibitor and substrate compete for the active site. Increasing [S] increases the probability that substrate (not inhibitor) occupies the active site → rate increases back toward Vmax." },
    { q:"What happens to enzyme activity above the optimum temperature?", opts:["Activity increases indefinitely","Activity decreases due to denaturation of the active site","Activity stays constant","The enzyme becomes a better catalyst"], ans:1, exp:"Above the optimum, thermal energy breaks hydrogen bonds and other weak interactions maintaining tertiary structure → active site shape is altered → enzyme denatured → activity falls to zero." }
  ]
},
{
  id:4, title:"Cell Membranes & Transport",
  sections:[
    { icon:"🏗️", title:"Fluid Mosaic Model",
      body:`<p>The <strong>fluid mosaic model</strong> (Singer & Nicolson, 1972) describes the cell surface membrane:</p>
<ul><li><strong>Phospholipid bilayer</strong>: hydrophilic heads face outward; hydrophobic tails face inward. The bilayer is fluid — phospholipids can move laterally.</li>
<li><strong>Intrinsic (integral) proteins</strong>: span the whole bilayer. Act as channels (allow specific ions/molecules through), carriers, or receptors.</li>
<li><strong>Extrinsic (peripheral) proteins</strong>: on one surface. Involved in cell signalling, cell recognition.</li>
<li><strong>Cholesterol</strong>: interspersed among phospholipids; regulates fluidity (prevents it being too fluid at high temperatures or too rigid at low temperatures).</li>
<li><strong>Glycoproteins & glycolipids</strong>: carbohydrate chains attached; involved in cell signalling, recognition, and immune responses.</li></ul>
<div class="callout callout-key"><div class="callout-title">Why is it "fluid mosaic"?</div>
Fluid: phospholipids can move laterally at room temperature (not fixed).<br>
Mosaic: proteins embedded throughout, like tiles in a mosaic.</div>` },
    { icon:"🚪", title:"Passive Transport",
      body:`<h4>Diffusion:</h4>
<p>Net movement of molecules from high to low concentration (down the concentration gradient). No energy (ATP) required. Continues until equilibrium.</p>
<p>Rate increased by: ↑ concentration gradient, ↑ surface area, ↑ temperature, ↓ diffusion distance, smaller/more lipid-soluble molecule.</p>
<div class="formula">Fick's Law: rate of diffusion ∝ (surface area × concentration difference) / thickness</div>
<h4>Facilitated diffusion:</h4>
<p>Diffusion of ions and polar molecules through specific <strong>channel proteins</strong> (aquaporins for water) or <strong>carrier proteins</strong>. Still down concentration gradient, no ATP needed.</p>
<h4>Osmosis:</h4>
<p>Net movement of water molecules from a region of higher water potential (ψ) to lower water potential through a partially permeable membrane.</p>
<div class="formula">Water potential (ψ) = solute potential (ψs) + pressure potential (ψp)</div>
<p>Pure water: ψ = 0. Adding solute: ψs becomes negative → ψ decreases. Water moves from less negative → more negative ψ.</p>
<div class="callout callout-key"><div class="callout-title">Animal cells in different solutions</div>
Hypotonic solution (low solute): water enters → cell swells → lysis (bursts)<br>
Hypertonic solution (high solute): water leaves → cell crenates (shrinks)<br>
Isotonic: no net movement</div>
<div class="callout callout-tip"><div class="callout-title">Plant cells</div>
Hypotonic: water enters → turgor pressure increases → turgid cell<br>
Hypertonic: water leaves → cytoplasm shrinks away from cell wall → plasmolysis</div>` },
    { icon:"⚡", title:"Active Transport & Bulk Transport",
      body:`<p><strong>Active transport</strong>: movement of molecules/ions against their concentration gradient using ATP and carrier proteins (pumps).</p>
<ul><li>Requires ATP (from respiration)</li>
<li>Uses specific carrier proteins (e.g. sodium-potassium pump)</li>
<li>Na⁺-K⁺ pump: pumps 3 Na⁺ out and 2 K⁺ in per ATP → maintains electrochemical gradient in nerve cells</li></ul>
<h4>Bulk transport (endocytosis/exocytosis):</h4>
<ul><li><strong>Endocytosis</strong>: membrane engulfs large particles/molecules → forms vesicle inside cell (e.g. phagocytosis, pinocytosis)</li>
<li><strong>Exocytosis</strong>: vesicles fuse with membrane → contents released outside (e.g. secretion of hormones, neurotransmitters)</li></ul>
<table><tr><th>Transport</th><th>Energy?</th><th>With/against gradient?</th></tr>
<tr><td>Diffusion</td><td>No</td><td>With (high→low)</td></tr>
<tr><td>Facilitated diffusion</td><td>No</td><td>With (high→low)</td></tr>
<tr><td>Osmosis</td><td>No</td><td>With (high ψ→low ψ)</td></tr>
<tr><td>Active transport</td><td>Yes (ATP)</td><td>Against (low→high)</td></tr>
<tr><td>Endo/exocytosis</td><td>Yes (ATP)</td><td>Either</td></tr></table>` }
  ],
  quiz:[
    { q:"What is the role of cholesterol in the cell membrane?", opts:["Forms ion channels","Provides energy","Regulates membrane fluidity","Acts as a receptor for hormones"], ans:2, exp:"Cholesterol molecules sit between phospholipids, preventing them from packing too tightly (maintains fluidity at low temp) and preventing excessive movement (reduces fluidity at high temp)." },
    { q:"A red blood cell is placed in a very dilute solution. What happens?", opts:["It crenates","It undergoes plasmolysis","It swells and may lyse","Nothing changes"], ans:2, exp:"Very dilute = hypotonic solution (lower solute concentration than cell contents). Water potential outside > inside → water moves in by osmosis → cell swells → may lyse (burst)." },
    { q:"Facilitated diffusion differs from simple diffusion because it:", opts:["Moves substances against the concentration gradient","Requires ATP","Uses specific channel or carrier proteins","Only moves water"], ans:2, exp:"Facilitated diffusion uses specific channel or carrier proteins in the membrane to move polar molecules or ions down their concentration gradient. No ATP is needed." },
    { q:"Which process requires ATP and moves substances against their concentration gradient?", opts:["Diffusion","Osmosis","Active transport","Facilitated diffusion"], ans:2, exp:"Active transport uses ATP (energy from respiration) to move molecules/ions from low to high concentration — against the concentration gradient." },
    { q:"What is the water potential of pure water?", opts:["−1 MPa","0 MPa","+1 MPa","It depends on temperature"], ans:1, exp:"By convention, pure water has a water potential of 0 (zero). Adding any solute makes the water potential negative (below zero)." }
  ]
},
{
  id:5, title:"The Mitotic Cell Cycle",
  sections:[
    { icon:"🔄", title:"Cell Cycle Overview",
      body:`<p>The cell cycle consists of <strong>interphase</strong> followed by <strong>mitotic division</strong>.</p>
<h4>Interphase (longest phase, ~90% of cycle):</h4>
<ul><li><strong>G₁ (Gap 1)</strong>: cell grows; proteins synthesised; organelles replicate</li>
<li><strong>S (Synthesis)</strong>: DNA replication — each chromosome duplicated → two sister chromatids joined at centromere</li>
<li><strong>G₂ (Gap 2)</strong>: further growth; more proteins synthesised; cell prepares for division</li></ul>
<h4>Mitosis phases (PMAT):</h4>
<table><tr><th>Phase</th><th>Key events</th></tr>
<tr><td>Prophase</td><td>Chromosomes condense and become visible; spindle forms; nuclear envelope breaks down; centrioles move to poles</td></tr>
<tr><td>Metaphase</td><td>Chromosomes align at metaphase plate (cell equator); spindle fibres attach to centromeres</td></tr>
<tr><td>Anaphase</td><td>Sister chromatids separate; pulled to opposite poles by spindle fibres shortening</td></tr>
<tr><td>Telophase</td><td>Nuclear envelopes reform around two sets of chromosomes; chromosomes decondense; spindle breaks down</td></tr></table>
<p>Followed by <strong>cytokinesis</strong>: cytoplasm divides → two genetically identical daughter cells.</p>` },
    { icon:"🧬", title:"DNA Replication",
      body:`<p>DNA replication is <strong>semi-conservative</strong>: each new double helix contains one original strand and one new strand.</p>
<h4>Steps:</h4>
<ol><li><strong>Helicase</strong> unwinds and unzips the double helix (breaks H-bonds between base pairs)</li>
<li>Each strand acts as a <strong>template</strong></li>
<li><strong>DNA polymerase</strong> adds free nucleotides (complementary base pairing: A-T, G-C)</li>
<li>Nucleotides joined by <strong>phosphodiester bonds</strong> (condensation)</li>
<li>DNA polymerase works 5'→3' only; one strand (leading) is continuous, the other (lagging) is made in fragments</li></ol>
<div class="callout callout-key"><div class="callout-title">Evidence for semi-conservative replication</div>
Meselson-Stahl experiment (1958): grew bacteria in ¹⁵N medium, then transferred to ¹⁴N. After one generation: all DNA was hybrid (¹⁴N/¹⁵N). After two: half hybrid, half light (¹⁴N/¹⁴N). Proves semi-conservative.</div>` },
    { icon:"🚫", title:"Cancer & Uncontrolled Division",
      body:`<p>Cancer results from <strong>uncontrolled cell division</strong> due to mutations in genes controlling the cell cycle.</p>
<ul><li><strong>Proto-oncogenes</strong>: normal genes promoting cell division. When mutated → <strong>oncogenes</strong> → cell division always stimulated.</li>
<li><strong>Tumour suppressor genes</strong> (e.g. p53): normally inhibit division. When mutated → no inhibition → unchecked division.</li></ul>
<div class="callout callout-warn"><div class="callout-title">Mutagens</div>
Agents that cause mutations and increase cancer risk: ionising radiation (UV, X-rays, γ-rays), chemical carcinogens (tobacco smoke compounds), some viruses (e.g. HPV → cervical cancer).</div>
<p>Tumours can be <strong>benign</strong> (localised, not invasive) or <strong>malignant</strong> (invade neighbouring tissues; can metastasise via blood/lymph).</p>` }
  ],
  quiz:[
    { q:"During which phase of the cell cycle does DNA replication occur?", opts:["G₁","S phase","G₂","Prophase"], ans:1, exp:"DNA replication occurs during S (synthesis) phase of interphase, before the cell enters mitosis." },
    { q:"What happens during anaphase of mitosis?", opts:["Chromosomes condense","Chromosomes align at the equator","Sister chromatids separate and move to opposite poles","Nuclear envelopes reform"], ans:2, exp:"Anaphase: spindle fibres shorten, pulling sister chromatids apart at the centromere. Each chromatid (now called a chromosome) moves to opposite poles." },
    { q:"Which enzyme unzips the DNA double helix during replication?", opts:["DNA polymerase","Ligase","Helicase","Restriction enzyme"], ans:2, exp:"Helicase breaks the hydrogen bonds between complementary base pairs, unwinding and separating the two strands to create replication forks." },
    { q:"What does it mean that DNA replication is semi-conservative?", opts:["Half the DNA is destroyed","Each new molecule has one original strand and one new strand","Both strands are completely new","The entire original molecule is conserved"], ans:1, exp:"Semi-conservative: each of the two daughter DNA molecules retains one original (parental) strand and has one newly synthesised complementary strand." }
  ]
},
{
  id:6, title:"Nucleic Acids & Protein Synthesis",
  sections:[
    { icon:"🧬", title:"DNA & RNA Structure",
      body:`<p>Nucleic acids are polynucleotides — chains of <strong>nucleotides</strong> joined by phosphodiester bonds.</p>
<h4>Nucleotide structure:</h4>
<p>Phosphate group + pentose sugar + nitrogenous base (joined by condensation)</p>
<table><tr><th>Feature</th><th>DNA</th><th>RNA</th></tr>
<tr><td>Sugar</td><td>Deoxyribose</td><td>Ribose</td></tr>
<tr><td>Bases</td><td>Adenine, Thymine, Guanine, Cytosine</td><td>Adenine, Uracil, Guanine, Cytosine</td></tr>
<tr><td>Strands</td><td>Double-stranded (double helix)</td><td>Single-stranded</td></tr>
<tr><td>Base pairing</td><td>A-T (2 H-bonds); G-C (3 H-bonds)</td><td>A-U; G-C</td></tr>
<tr><td>Location</td><td>Nucleus (+ mitochondria, chloroplasts)</td><td>Nucleus, cytoplasm, ribosomes</td></tr>
<tr><td>Types</td><td>—</td><td>mRNA, tRNA, rRNA</td></tr></table>` },
    { icon:"📝", title:"Transcription & Translation",
      body:`<h4>Transcription (DNA → mRNA):</h4>
<ol><li>RNA polymerase binds to promoter region on DNA</li>
<li>Double helix unwinds; H-bonds break</li>
<li>Free RNA nucleotides bind to <strong>template strand</strong> by complementary base pairing (A→U, T→A, G→C, C→G)</li>
<li>RNA polymerase joins nucleotides by phosphodiester bonds (5'→3')</li>
<li>mRNA strand produced; DNA re-winds; mRNA leaves nucleus through nuclear pores</li></ol>
<div class="callout callout-key"><div class="callout-title">The genetic code</div>
A codon = 3 bases on mRNA coding for one amino acid. The code is:<br>
• Triplet (3 bases per codon)<br>
• Non-overlapping (each base read once)<br>
• Degenerate (most amino acids coded by more than one codon)<br>
• Universal (same in virtually all organisms)<br>
• Start codon: AUG (methionine); stop codons: UAA, UAG, UGA</div>
<h4>Translation (mRNA → protein):</h4>
<ol><li>mRNA moves to ribosome</li>
<li>tRNA with complementary anticodon brings correct amino acid to each codon</li>
<li>Ribosome moves along mRNA codon by codon</li>
<li>Peptide bonds form between adjacent amino acids</li>
<li>Stop codon reached → polypeptide released</li></ol>` },
    { icon:"🔄", title:"Gene Mutations",
      body:`<p>A <strong>gene mutation</strong> is a change in the base sequence of DNA.</p>
<table><tr><th>Type</th><th>Description</th><th>Effect</th></tr>
<tr><td>Substitution</td><td>One base replaced by another</td><td>May change one amino acid (missense), stop (nonsense), or no change (silent)</td></tr>
<tr><td>Insertion</td><td>Extra base(s) added</td><td>Frameshift — all codons downstream changed</td></tr>
<tr><td>Deletion</td><td>Base(s) removed</td><td>Frameshift — all codons downstream changed</td></tr></table>
<div class="callout callout-warn"><div class="callout-title">Frameshift mutations</div>
Insertions and deletions cause frameshifts — the reading frame shifts, changing all downstream codons. Usually has major consequences for protein structure and function. Substitutions affect only one codon.</div>` }
  ],
  quiz:[
    { q:"Which base in RNA replaces thymine found in DNA?", opts:["Adenine","Guanine","Cytosine","Uracil"], ans:3, exp:"RNA uses uracil (U) instead of thymine (T). So in RNA: A pairs with U (not T). All other bases (A, G, C) are the same in both DNA and RNA." },
    { q:"During transcription, which strand of DNA is used as a template?", opts:["Both strands simultaneously","The coding (sense) strand","The template (antisense) strand","Neither — a new DNA strand is made"], ans:2, exp:"RNA polymerase reads the template (antisense) strand 3'→5' and synthesises mRNA in the 5'→3' direction, producing a sequence complementary to the template." },
    { q:"A codon on mRNA is 5'-AUG-3'. What is the anticodon on the tRNA?", opts:["AUG","TAC","UAC","CAU"], ans:2, exp:"The tRNA anticodon is complementary and antiparallel to the mRNA codon. AUG (mRNA) → complementary anticodon = UAC (tRNA), read 3'→5'." },
    { q:"Why is an insertion mutation usually more damaging than a substitution?", opts:["Insertions always produce stop codons","Insertions are larger changes to DNA","Insertions cause a frameshift, altering all subsequent codons","Substitutions never change the amino acid sequence"], ans:2, exp:"Insertion of a base shifts the reading frame of all subsequent codons → completely different amino acid sequence downstream → protein structure usually drastically altered." }
  ]
},
{
  id:7, title:"Transport in Plants",
  sections:[
    { icon:"🌿", title:"Xylem & Phloem",
      body:`<p>Plants have two main transport tissues:</p>
<table><tr><th>Feature</th><th>Xylem</th><th>Phloem</th></tr>
<tr><td>Transports</td><td>Water and mineral ions</td><td>Sucrose and amino acids (assimilates)</td></tr>
<tr><td>Direction</td><td>Upward only (root → shoot)</td><td>Both directions (source → sink)</td></tr>
<tr><td>Cells</td><td>Vessel elements and tracheids (dead at maturity)</td><td>Sieve tube elements + companion cells (alive)</td></tr>
<tr><td>Mechanism</td><td>Transpiration pull (cohesion-tension)</td><td>Mass flow (pressure-driven)</td></tr>
<tr><td>Energy</td><td>No ATP needed (passive)</td><td>ATP needed (loading/unloading)</td></tr></table>` },
    { icon:"💧", title:"Transpiration & the Cohesion-Tension Theory",
      body:`<p><strong>Transpiration</strong>: loss of water vapour from the aerial parts of a plant (mainly through stomata).</p>
<h4>Cohesion-tension mechanism for water transport in xylem:</h4>
<ol><li>Water evaporates from mesophyll cells into leaf air spaces → exits through stomata (transpiration)</li>
<li>Creates negative pressure (tension) in leaf xylem</li>
<li><strong>Cohesion</strong>: water molecules cling together via H-bonds → continuous water column is pulled upward</li>
<li><strong>Adhesion</strong>: water adheres to xylem walls, preventing column from breaking</li>
<li>Water absorbed from soil by osmosis through root hair cells</li></ol>
<div class="callout callout-key"><div class="callout-title">Factors affecting transpiration rate</div>
↑ Temperature → ↑ rate (more evaporation)<br>
↑ Light intensity → stomata open wider → ↑ rate<br>
↑ Humidity → ↓ rate (smaller water potential gradient)<br>
↑ Wind speed → ↑ rate (removes humid air)<br>
↑ Surface area of leaves → ↑ rate</div>
<h4>Stomata and guard cells:</h4>
<p>Guard cells control stomatal opening. When turgid (full of water) → stomata open. When flaccid → stomata close. Opening controlled by: light, CO₂ concentration, ABA hormone.</p>` },
    { icon:"🍬", title:"Translocation in Phloem",
      body:`<p><strong>Translocation</strong>: movement of assimilates (mainly sucrose) through phloem from <strong>source</strong> (e.g. leaf) to <strong>sink</strong> (e.g. root, growing tissue, fruit).</p>
<h4>Mass flow hypothesis:</h4>
<ol><li><strong>Loading at source</strong>: sucrose actively loaded into phloem sieve tubes (via companion cells) → water potential decreases → water enters by osmosis → high pressure created</li>
<li><strong>Unloading at sink</strong>: sucrose removed from phloem → water potential increases → water leaves → pressure decreases</li>
<li>Pressure gradient drives mass flow of sucrose solution from source to sink</li></ol>
<div class="callout callout-warn"><div class="callout-title">Evidence for mass flow</div>
Aphid stylet experiments: aphids insert mouthparts into phloem → sap flows out under pressure (confirms mass flow). Ringing experiments: remove phloem bark → sucrose accumulates above ring.</div>` }
  ],
  quiz:[
    { q:"What is the driving force for water movement up the xylem in the cohesion-tension theory?", opts:["Root pressure alone","Active pumping by xylem cells","Transpiration creating tension, pulling water up via cohesion","Osmosis along the whole stem"], ans:2, exp:"Transpiration at the leaf creates a negative pressure (tension). Water molecules cohesively pull each other up the continuous xylem column. This is the cohesion-tension mechanism." },
    { q:"Which cells in phloem are alive and carry out metabolic activities?", opts:["Vessel elements","Tracheids","Sieve tube elements and companion cells","Xylem fibres"], ans:2, exp:"Phloem sieve tube elements and companion cells are alive. Sieve tubes lack a nucleus and many organelles but are maintained by companion cells. Xylem vessels are dead at maturity." },
    { q:"How does increased wind speed affect transpiration rate?", opts:["Decreases rate — less CO₂ available","Increases rate — removes humid air from around stomata","No effect on transpiration","Decreases rate — lowers temperature"], ans:1, exp:"Wind removes the layer of humid air from around stomata, maintaining a steep water potential gradient between leaf interior and atmosphere → increases rate of transpiration." },
    { q:"In the mass flow hypothesis, what creates the high pressure at the source end of phloem?", opts:["Active pumping of water","Sucrose loading reduces water potential → water enters by osmosis → turgor pressure increases","Transpiration","Gravity"], ans:1, exp:"Sucrose is actively loaded into phloem at the source. This lowers the water potential in phloem, so water enters by osmosis, creating high hydrostatic pressure that drives mass flow toward the sink." }
  ]
},
{
  id:8, title:"Transport in Mammals",
  sections:[
    { icon:"❤️", title:"The Heart & Cardiac Cycle",
      body:`<p>The human heart is a double pump: right side pumps deoxygenated blood to lungs (pulmonary circulation); left side pumps oxygenated blood to body (systemic circulation).</p>
<h4>Cardiac cycle:</h4>
<ul><li><strong>Atrial systole</strong>: atria contract → blood pushed into ventricles through atrioventricular valves (bicuspid/mitral on left; tricuspid on right)</li>
<li><strong>Ventricular systole</strong>: ventricles contract → blood pushed into aorta (left) and pulmonary artery (right) through semilunar valves; AV valves close (lub)</li>
<li><strong>Diastole</strong>: all chambers relax; semilunar valves close (dub); heart refills</li></ul>
<div class="callout callout-key"><div class="callout-title">Cardiac output</div>
Cardiac output = stroke volume × heart rate<br>
(dm³ min⁻¹) = (dm³ per beat) × (beats per minute)</div>
<p><strong>Myogenic</strong>: heart muscle initiates its own contractions. The <strong>SAN (sinoatrial node)</strong> in the right atrium is the pacemaker — sends electrical impulses via AVN (atrioventricular node) and bundle of His through Purkinje fibres to ventricles.</p>` },
    { icon:"🩸", title:"Blood Vessels",
      body:`<table><tr><th>Feature</th><th>Artery</th><th>Vein</th><th>Capillary</th></tr>
<tr><td>Direction</td><td>Away from heart</td><td>Toward heart</td><td>Between arteries and veins</td></tr>
<tr><td>Pressure</td><td>High</td><td>Low</td><td>Very low</td></tr>
<tr><td>Wall thickness</td><td>Thick (lots of smooth muscle, elastic fibres)</td><td>Thin</td><td>One cell thick (endothelium only)</td></tr>
<tr><td>Lumen</td><td>Narrow</td><td>Wide</td><td>Narrow (1 RBC at a time)</td></tr>
<tr><td>Valves</td><td>No (except aorta/pulmonary artery)</td><td>Yes (prevent backflow)</td><td>No</td></tr>
<tr><td>Elastin/collagen</td><td>Lots</td><td>Little</td><td>None</td></tr></table>
<p>Capillaries allow exchange: thin walls, large surface area, close to all cells. Tissue fluid forms by filtration at arteriole end; reabsorbed at venule end (Starling's forces).</p>` },
    { icon:"💉", title:"Blood & Haemoglobin",
      body:`<p>Blood consists of: plasma (water + dissolved substances), red blood cells (erythrocytes), white blood cells (leucocytes), platelets.</p>
<p><strong>Haemoglobin</strong>: quaternary protein; 4 polypeptide chains, each with a haem group containing Fe²⁺ that binds O₂.</p>
<div class="formula">Hb + 4O₂ ⇌ HbO₈ (oxyhaemoglobin)</div>
<h4>Oxygen dissociation curve:</h4>
<ul><li>Sigmoid (S-shaped) due to cooperative binding</li>
<li>At high pO₂ (lungs): Hb fully saturated (loads O₂)</li>
<li>At low pO₂ (respiring tissues): Hb releases O₂ (unloads)</li></ul>
<div class="callout callout-key"><div class="callout-title">Bohr effect</div>
↑ CO₂ → ↑ H⁺ → Hb binds H⁺ → Hb affinity for O₂ decreases → curve shifts RIGHT → more O₂ released to respiring tissues. This is the Bohr shift.</div>
<p>Fetal haemoglobin (HbF) has higher affinity for O₂ than adult Hb → its curve is to the LEFT of adult Hb → takes O₂ from mother's blood across placenta.</p>` }
  ],
  quiz:[
    { q:"What is the role of the sinoatrial node (SAN)?", opts:["It pumps blood into the aorta","It acts as the pacemaker, initiating electrical impulses for cardiac contractions","It prevents backflow of blood","It oxygenates the blood"], ans:1, exp:"The SAN in the right atrium wall acts as the heart's pacemaker — it generates rhythmic electrical impulses that spread across the atria and then (via AVN and Purkinje fibres) the ventricles, coordinating the cardiac cycle." },
    { q:"Why does the left ventricle have a thicker wall than the right ventricle?", opts:["It pumps blood a shorter distance","It receives more blood","It pumps blood to the whole body (systemic circuit) requiring more pressure than pumping to the lungs","It contains more valves"], ans:2, exp:"The left ventricle pumps blood around the entire systemic circulation (high resistance, long distance). The right ventricle only pumps to the nearby lungs (lower pressure needed). Greater pressure → thicker, more muscular wall." },
    { q:"What is the Bohr effect?", opts:["Fetal Hb has higher affinity for O₂","High CO₂ reduces Hb affinity for O₂, shifting the dissociation curve right","O₂ loading in the lungs","CO₂ is transported as carbaminohaemoglobin"], ans:1, exp:"The Bohr effect: in respiring tissues, high CO₂ lowers pH → H⁺ ions bind to haemoglobin → conformational change → lower affinity for O₂ → more O₂ released where it's needed." },
    { q:"Why do veins have valves but arteries do not?", opts:["Blood pressure in veins is high","Veins carry oxygenated blood","Blood pressure in veins is low — valves prevent backflow","Arteries are too narrow for valves"], ans:2, exp:"Veins carry blood at low pressure back to the heart. Without valves, blood would flow backward. Arteries have high pressure from ventricular systole that keeps blood moving forward without valves." }
  ]
},
{
  id:9, title:"Gas Exchange",
  sections:[
    { icon:"🫁", title:"Gas Exchange Surfaces",
      body:`<p>Efficient gas exchange surfaces share these features:</p>
<ul><li><strong>Large surface area</strong>: maximises diffusion rate</li>
<li><strong>Thin</strong>: short diffusion distance</li>
<li><strong>Moist</strong>: gases dissolve before crossing membrane</li>
<li><strong>Good blood supply</strong>: maintains steep concentration gradient</li>
<li><strong>Ventilated</strong>: fresh air continually supplied</li></ul>
<h4>Fick's Law:</h4>
<div class="formula">rate of diffusion ∝ (surface area × concentration difference) / thickness of membrane</div>` },
    { icon:"🫁", title:"Gas Exchange in Mammals",
      body:`<p>The <strong>alveoli</strong> in the lungs are the gas exchange surface in mammals.</p>
<p>Structure: ~300 million alveoli → huge surface area (~70 m²). Each alveolus is 1 cell thick (simple squamous epithelium) surrounded by capillaries (also 1 cell thick). Moist lining with surfactant (reduces surface tension preventing collapse).</p>
<h4>Ventilation (breathing):</h4>
<ul><li><strong>Inspiration</strong>: intercostal muscles and diaphragm contract → thorax volume increases → pressure decreases → air flows in</li>
<li><strong>Expiration</strong>: muscles relax → thorax volume decreases → pressure increases → air flows out</li></ul>
<div class="callout callout-tip"><div class="callout-title">Countercurrent in fish gills</div>
Fish gills: water flows over lamellae opposite to blood flow. This maintains a concentration gradient along the whole gill surface → more O₂ absorbed than if both flowed in the same direction.</div>` },
    { icon:"🌱", title:"Gas Exchange in Plants",
      body:`<p>In plants, gas exchange occurs mainly through <strong>stomata</strong> in leaves.</p>
<p>Spongy mesophyll cells have large air spaces (increases surface area for diffusion).</p>
<p>During the day: photosynthesis > respiration → CO₂ absorbed; O₂ released.<br>
At night: only respiration → O₂ absorbed; CO₂ released.</p>
<h4>Stomatal opening:</h4>
<p>Guard cells become turgid in light (K⁺ ions pumped in → water follows by osmosis → guard cells swell → stoma opens). Close at night or when water-stressed.</p>
<div class="callout callout-key"><div class="callout-title">Xerophyte adaptations</div>
Plants in dry environments reduce water loss: thick waxy cuticle, sunken stomata, rolled leaves, hairy epidermis, reduced leaf surface area (e.g. cacti spines), CAM photosynthesis (open stomata at night only).</div>` }
  ],
  quiz:[
    { q:"Which feature of alveoli makes them efficient gas exchange surfaces?", opts:["Thick walls","Large surface area, thin walls, and rich blood supply","Presence of cilia","Located outside the thorax"], ans:1, exp:"Alveoli are efficient because: enormous total surface area (~70 m²), walls only 1 cell thick (short diffusion distance), moist lining, and extensive capillary network maintaining concentration gradient." },
    { q:"What happens to thorax volume and pressure during inspiration?", opts:["Volume decreases, pressure increases","Volume increases, pressure increases","Volume increases, pressure decreases","Volume decreases, pressure decreases"], ans:2, exp:"Diaphragm flattens + external intercostal muscles contract → ribs move up and out → thorax volume increases → pressure falls below atmospheric → air enters lungs." },
    { q:"Why is countercurrent flow in fish gills more efficient than parallel flow?", opts:["Water flows faster","It maintains a concentration gradient along the entire length of the gill","Fish gills are larger","It uses less energy"], ans:1, exp:"In countercurrent, blood and water always have a concentration difference along the whole gill — blood leaving has lower O₂ than water entering, so diffusion continues throughout. In parallel flow, concentrations equalise halfway — less total O₂ absorbed." },
    { q:"How do guard cells open stomata in response to light?", opts:["Guard cells photosynthesise, producing O₂ which forces them open","K⁺ ions are actively pumped into guard cells, reducing water potential, water enters, cells become turgid, stoma opens","Guard cells produce more CO₂, causing swelling","Temperature rises open the stomata by expansion"], ans:1, exp:"In light, K⁺ ions (potassium) are actively pumped into guard cells → water potential decreases → water enters by osmosis → guard cells become turgid → their asymmetric shape causes the stoma to open." }
  ]
},
{
  id:10, title:"Infectious Disease",
  sections:[
    { icon:"🦠", title:"Cholera & Tuberculosis (TB)",
      body:`<h3>Cholera</h3>
<p><strong>Pathogen:</strong> <em>Vibrio cholerae</em> (bacterium)</p>
<h4>How it spreads (transmission):</h4>
<ul><li>Contaminated water or food — drinking water containing faeces from infected individuals</li>
<li>Faecal-oral route: bacteria in faeces → water supply → consumed by new host</li>
<li>Poor sanitation, lack of clean water, overcrowding, flooding</li>
<li>NOT spread person-to-person directly</li></ul>
<h4>How it causes disease:</h4>
<ul><li>Bacteria colonise small intestine, producing <strong>choleragen toxin</strong></li>
<li>Toxin causes chloride ions (Cl⁻) to be pumped into gut lumen</li>
<li>Water follows by osmosis → massive watery diarrhoea ("rice water" stools)</li>
<li>Severe dehydration, ion imbalance → death if untreated</li></ul>
<h4>Treatment & control:</h4>
<ul><li><strong>Oral rehydration therapy (ORT)</strong>: water + glucose + salt solution — glucose stimulates Na⁺ cotransport → water reabsorption. Simple but life-saving.</li>
<li>IV fluids for severe cases</li>
<li>Antibiotics (e.g. doxycycline) shorten illness duration</li>
<li>Control: safe water supply, proper sewage treatment, hand washing, oral cholera vaccines</li></ul>
<div class="callout callout-key"><div class="callout-title">Why ORT works</div>
Cholera toxin blocks Cl⁻ reabsorption but not the Na⁺/glucose cotransporter. ORT solution with glucose + Na⁺ uses this intact transporter to drive water reabsorption from the gut back into the blood.</div>
<h3>Tuberculosis (TB)</h3>
<p><strong>Pathogen:</strong> <em>Mycobacterium tuberculosis</em> (bacterium)</p>
<h4>How it spreads:</h4>
<ul><li><strong>Droplet infection</strong>: inhaling tiny respiratory droplets expelled by coughing, sneezing, or talking by an infected person</li>
<li>Requires prolonged close contact — not highly infectious in brief encounters</li>
<li>Risk factors: overcrowding, poor ventilation, malnutrition, HIV co-infection (weakened immunity), homelessness</li></ul>
<h4>How it causes disease:</h4>
<ul><li>Bacteria inhaled → taken up by macrophages in alveoli → survive inside macrophages (resist digestion)</li>
<li>Immune system walls off bacteria in granulomas (<strong>tubercles</strong>) → latent TB (no symptoms)</li>
<li>If immunity weakened: bacteria multiply → destroys lung tissue → active TB</li>
<li>Symptoms: persistent cough (can include blood), night sweats, fever, weight loss, fatigue</li></ul>
<h4>Treatment & control:</h4>
<ul><li><strong>DOTS (Directly Observed Therapy, Short-course)</strong>: 6-month multi-drug regimen (rifampicin + isoniazid + pyrazinamide + ethambutol)</li>
<li>Multiple drugs prevent resistance emerging</li>
<li><strong>BCG vaccine</strong>: protects children against severe TB (not 100% effective in adults)</li>
<li>Contact tracing, isolating infectious patients, improving housing and nutrition, testing high-risk groups</li></ul>
<div class="callout callout-warn"><div class="callout-title">MDR-TB</div>
Multi-drug resistant TB (MDR-TB) has emerged from incomplete treatment courses and misuse of antibiotics. Extremely difficult to treat, requiring 18–24 months of second-line drugs.</div>` },
    { icon:"🦟", title:"Malaria & HIV/AIDS",
      body:`<h3>Malaria</h3>
<p><strong>Pathogen:</strong> <em>Plasmodium</em> spp. (protist — <em>P. falciparum</em> is most deadly)</p>
<h4>How it spreads:</h4>
<ul><li><strong>Vector transmission</strong>: female <em>Anopheles</em> mosquito bites infected human → picks up <em>Plasmodium</em> gametocytes → sexual reproduction in mosquito → infective sporozoites in salivary glands → transmitted to new human host during next blood meal</li>
<li>Cannot spread person-to-person directly (except blood transfusion, shared needles, mother-to-child)</li>
<li>Anopheles breeds in stagnant water; endemic in tropical/subtropical regions</li></ul>
<h4>Life cycle & how it causes disease:</h4>
<ol><li>Sporozoites injected into blood → travel to liver → multiply asexually (schizogony) → liver cells burst, releasing merozoites</li>
<li>Merozoites infect red blood cells → multiply → RBCs burst synchronously → fever spikes every 48–72 hrs</li>
<li>Bursting RBCs release toxins → high fever, chills, sweating, anaemia (RBC destruction), organ damage</li>
<li>Some merozoites develop into gametocytes → taken up by mosquito → cycle continues</li></ol>
<h4>Treatment & control:</h4>
<ul><li><strong>Drugs</strong>: artemisinin-based combination therapy (ACT) — most effective. Chloroquine (widespread resistance now). Primaquine (kills liver stage).</li>
<li><strong>Vector control</strong>: insecticide-treated bed nets (ITNs), indoor residual spraying (IRS) with insecticides, draining/covering stagnant water, larvicides</li>
<li><strong>Personal protection</strong>: repellents, protective clothing, prophylactic drugs for travellers</li>
<li><strong>Vaccines</strong>: RTS,S/AS01 (Mosquirix) — first approved malaria vaccine; limited but growing efficacy</li></ul>
<div class="callout callout-key"><div class="callout-title">Why malaria is hard to eradicate</div>
Plasmodium has a complex two-host life cycle, develops drug resistance rapidly, and the mosquito vector is widespread. No fully effective vaccine yet exists.</div>
<h3>HIV/AIDS</h3>
<p><strong>Pathogen:</strong> Human Immunodeficiency Virus (HIV) — a retrovirus with an RNA genome</p>
<h4>How it spreads:</h4>
<ul><li><strong>Unprotected sexual intercourse</strong> (most common route globally)</li>
<li><strong>Blood-to-blood contact</strong>: sharing hypodermic needles (IV drug use), contaminated blood transfusions, needle-stick injuries</li>
<li><strong>Mother-to-child</strong>: during pregnancy (across placenta), childbirth, or breastfeeding</li>
<li>NOT spread by: casual contact, saliva, air, water, mosquitoes, shared utensils</li></ul>
<h4>How HIV causes disease:</h4>
<ol><li>HIV glycoproteins (gp120) bind specifically to <strong>CD4 receptors</strong> on T-helper cells (and macrophages)</li>
<li>Virus enters cell; reverse transcriptase converts RNA genome → DNA</li>
<li>Viral DNA integrates into host chromosome (provirus) — can remain latent for years</li>
<li>Activated virus hijacks cell to make new virions → T-helper cell destroyed</li>
<li>CD4⁺ cell count falls over years → immune system collapses → <strong>AIDS</strong> (CD4 count < 200 cells/μL)</li>
<li>AIDS: susceptible to opportunistic infections (TB, Pneumocystis pneumonia, Kaposi's sarcoma, toxoplasmosis)</li></ol>
<h4>Treatment & control:</h4>
<ul><li><strong>Antiretroviral therapy (ART / HAART)</strong>: combination of 3+ drugs targeting different stages of viral replication (reverse transcriptase inhibitors, protease inhibitors, integrase inhibitors). Controls viral load to undetectable → U=U (undetectable = untransmittable). Not a cure — must be taken lifelong.</li>
<li><strong>Prevention</strong>: condoms, PrEP (pre-exposure prophylaxis — daily antiretroviral for high-risk individuals), needle exchange programmes, testing and partner notification, preventing mother-to-child transmission (PMTCT) with antiretrovirals</li>
<li><strong>No vaccine</strong> yet — HIV mutates rapidly and the high genetic diversity makes vaccine development extremely difficult</li></ul>
<div class="callout callout-warn"><div class="callout-title">HIV & TB co-infection</div>
HIV and TB are a deadly combination. HIV weakens immunity → latent TB reactivates. TB is the leading cause of death in people living with HIV. Both must be treated simultaneously.</div>` },
    { icon:"💊", title:"Antibiotics & Resistance",
      body:`<p>Antibiotics kill or inhibit bacteria. They do NOT affect viruses (viruses lack cell walls, ribosomes etc. that most antibiotics target).</p>
<h4>Mechanisms of antibiotic action:</h4>
<ul><li>Inhibit cell wall synthesis (penicillin — blocks peptidoglycan cross-linking)</li>
<li>Inhibit protein synthesis (streptomycin — binds 30S ribosome subunit)</li>
<li>Inhibit DNA replication (quinolones)</li>
<li>Disrupt cell membrane</li></ul>
<div class="callout callout-warn"><div class="callout-title">Antibiotic resistance</div>
Bacteria reproduce rapidly. Random mutations can confer resistance. Antibiotics select for resistant strains (natural selection). Misuse of antibiotics (not completing courses, using for viral infections) accelerates resistance spread. MRSA = methicillin-resistant Staphylococcus aureus.</div>` }
  ],
  quiz:[
    { q:"How is cholera transmitted?", opts:["Droplet infection from coughing","Bites from infected mosquitoes","Drinking water or eating food contaminated with Vibrio cholerae faeces","Direct skin-to-skin contact"], ans:2, exp:"Cholera spreads via the faecal-oral route — contaminated water or food containing Vibrio cholerae from infected individuals' faeces. It is NOT spread by droplets or mosquitoes." },
    { q:"Why does oral rehydration therapy (ORT) work against cholera even though the toxin is still present?", opts:["ORT kills the bacteria directly","Glucose in ORT activates the Na⁺/glucose cotransporter, driving water reabsorption even though Cl⁻ channels are blocked","ORT neutralises the choleragen toxin","ORT replaces lost red blood cells"], ans:1, exp:"Choleragen blocks Cl⁻ reabsorption but leaves the Na⁺/glucose cotransporter intact. ORT solution with glucose + Na⁺ uses this transporter to drive water back into the blood, counteracting dehydration." },
    { q:"How is tuberculosis (TB) spread?", opts:["Contaminated water","Vector (mosquito bite)","Droplet infection — inhaling respiratory droplets from an infected person","Blood transfusion only"], ans:2, exp:"TB is spread by inhaling tiny aerosol droplets containing Mycobacterium tuberculosis expelled when an infected person coughs, sneezes, or speaks. Prolonged close contact is usually required." },
    { q:"Which organism is the vector for malaria?", opts:["Plasmodium","Female Anopheles mosquito","Aedes mosquito","Tsetse fly"], ans:1, exp:"Plasmodium is the pathogen (protist) that causes malaria. The vector (transmission agent) is the female Anopheles mosquito, which carries and transmits Plasmodium when it takes a blood meal." },
    { q:"How does HIV cause immunodeficiency?", opts:["It destroys all white blood cells","It infects and destroys CD4⁺ T-helper cells, impairing immune responses","It produces toxins that block antibody production","It replaces red blood cells"], ans:1, exp:"HIV specifically targets CD4⁺ T-helper cells. As CD4⁺ count falls over years, the immune system loses the ability to coordinate responses → AIDS, leaving the individual vulnerable to opportunistic infections." },
    { q:"Why does failing to complete a course of antibiotics contribute to antibiotic resistance?", opts:["More bacteria are killed if you take all the pills","Stopping early means some bacteria (possibly slightly resistant) survive and reproduce — these are selected for","The antibiotic becomes ineffective if the course is incomplete","Bacteria learn to avoid antibiotics"], ans:1, exp:"Stopping early when you feel better means the slightly more resistant bacteria (which take longer to kill) survive. They reproduce and pass on resistance genes. Natural selection favours resistant strains when antibiotic pressure is inconsistent." },
    { q:"Why is there currently no effective vaccine against HIV?", opts:["HIV is too large to target","HIV mutates rapidly and has high genetic diversity, making it very difficult to develop a universal vaccine","HIV hides in mosquitoes","Vaccines only work against bacteria"], ans:1, exp:"HIV mutates at an exceptionally high rate (reverse transcriptase has no proofreading) and exists as many subtypes/strains globally. A vaccine must target antigens that are conserved across strains — HIV's rapid mutation makes this extremely challenging." }
  ]
},
{
  id:11, title:"Immunity",
  sections:[
    { icon:"🛡️", title:"Non-specific & Specific Immunity",
      body:`<p>The immune system has two layers of defence:</p>
<h4>Non-specific (innate) immunity — rapid, no memory:</h4>
<ul><li>Physical barriers: skin, mucus, cilia</li>
<li>Chemical barriers: lysozyme (in tears/saliva), stomach acid, interferon</li>
<li><strong>Phagocytosis</strong>: neutrophils and macrophages engulf and digest pathogens via lysosomes</li>
<li>Inflammation: histamine released → vasodilation → more phagocytes to site</li></ul>
<h4>Specific (adaptive) immunity — slower, highly specific, has memory:</h4>
<ul><li>Recognises specific <strong>antigens</strong> (foreign molecules, usually surface proteins)</li>
<li>Two types: <strong>humoral</strong> (B-cells, antibodies) and <strong>cell-mediated</strong> (T-cells)</li></ul>` },
    { icon:"🦠", title:"Humoral Immunity & Antibodies",
      body:`<p>B-lymphocytes produce antibodies (immunoglobulins) against specific antigens.</p>
<h4>Humoral immune response:</h4>
<ol><li>Antigen enters body</li>
<li>Antigen presenting cells (APCs, e.g. macrophages) present antigen fragments to T-helper cells</li>
<li>T-helper cells activate B-cells with matching antigen receptor</li>
<li>B-cells undergo <strong>clonal expansion</strong> (proliferate by mitosis)</li>
<li>Differentiate into <strong>plasma cells</strong> (secrete large amounts of antibodies) and <strong>memory B-cells</strong></li></ol>
<div class="callout callout-key"><div class="callout-title">Antibody structure</div>
Y-shaped glycoprotein. Two heavy chains + two light chains joined by disulfide bridges. Two identical <strong>antigen-binding sites</strong> (variable regions) — highly specific. Fc region (constant) determines function.</div>
<h4>How antibodies work:</h4>
<ul><li><strong>Agglutination</strong>: antibodies clump pathogens together → easier for phagocytes</li>
<li><strong>Opsonisation</strong>: coat pathogen → enhance phagocytosis</li>
<li><strong>Neutralisation</strong>: block pathogen from binding host cells</li>
<li><strong>Complement activation</strong>: trigger complement cascade → pathogen lysis</li></ul>` },
    { icon:"💉", title:"Vaccination & Immunological Memory",
      body:`<p>Memory B and T cells persist long-term after first exposure. On second exposure to same antigen:</p>
<ul><li>Faster, stronger response (secondary immune response)</li>
<li>Higher antibody levels produced more quickly</li>
<li>Enough to prevent disease symptoms</li></ul>
<h4>Vaccination:</h4>
<p>Introduces antigen in a safe form to generate memory cells without causing disease. Types of vaccine:</p>
<table><tr><th>Type</th><th>Examples</th></tr>
<tr><td>Live attenuated</td><td>MMR, yellow fever</td></tr>
<tr><td>Killed pathogen</td><td>Flu (some), cholera</td></tr>
<tr><td>Toxoid</td><td>Tetanus, diphtheria</td></tr>
<tr><td>Subunit (protein antigen)</td><td>Hepatitis B, HPV</td></tr>
<tr><td>mRNA</td><td>COVID-19 (Pfizer, Moderna)</td></tr></table>
<div class="callout callout-key"><div class="callout-title">Herd immunity</div>
When a high enough proportion of a population is immune, the pathogen cannot spread effectively — even non-immune individuals are protected. Threshold varies by pathogen (measles ~95%; polio ~80–85%).</div>
<div class="callout callout-tip"><div class="callout-title">Monoclonal antibodies</div>
Identical antibodies from a single B-cell clone. Used in: pregnancy tests, ELISA diagnostic tests, cancer therapy (e.g. trastuzumab for HER2+ breast cancer), COVID-19 lateral flow tests.</div>` }
  ],
  quiz:[
    { q:"What is the role of memory cells in immunity?", opts:["They phagocytose pathogens directly","They produce antibodies during the primary response","They enable a faster, stronger secondary immune response upon re-exposure to the same antigen","They kill virus-infected cells directly"], ans:2, exp:"Memory B and T cells are long-lived lymphocytes formed during the primary immune response. If the same antigen re-enters the body, memory cells rapidly proliferate and differentiate → much faster, larger secondary response → symptoms often prevented." },
    { q:"How does a vaccine protect against disease?", opts:["It kills all pathogens permanently","It contains antibiotics that destroy the pathogen","It introduces antigens safely, stimulating memory cell formation without causing disease","It increases non-specific immunity"], ans:2, exp:"Vaccines contain antigens (live attenuated, killed, or fragments of the pathogen) in a safe form. The immune system responds normally, producing memory cells. Future exposure triggers a rapid secondary response before disease develops." },
    { q:"Which cells produce antibodies?", opts:["T-killer cells","Macrophages","Plasma cells (differentiated B-lymphocytes)","Neutrophils"], ans:2, exp:"Plasma cells are fully differentiated B-lymphocytes that secrete large quantities of specific antibodies. Each plasma cell produces ~2000 antibody molecules per second." },
    { q:"What is herd immunity?", opts:["When every individual in a population is vaccinated","When enough people are immune that a pathogen cannot spread effectively in the population","When antibodies are transferred between individuals","When all memory cells are shared across a population"], ans:1, exp:"Herd immunity occurs when a sufficient proportion of a population has immunity (through vaccination or natural infection) that disease spread is broken — even non-immune individuals are indirectly protected because the pathogen rarely encounters susceptible hosts." },
    { q:"What is the role of antigen-presenting cells (APCs) in the immune response?", opts:["They produce antibodies","They directly kill pathogens","They engulf pathogens and display fragments on MHC molecules to activate T-helper cells","They form memory cells"], ans:2, exp:"APCs (e.g. macrophages, dendritic cells) phagocytose pathogens, digest them, and display antigen fragments on MHC-II molecules. T-helper cells recognise these complexes, becoming activated and then stimulating B-cells and T-killer cells." }
  ]
}
]  },
  math: { key:'math', label:'Mathematics',code:'9709',emoji:'🧮', accent:'var(--math)', chapters: [
{id:1,title:"Quadratics",tag:"P1",sections:[
{icon:"📐",title:"Solving Quadratic Equations",body:`<p>A quadratic has the form <strong>ax² + bx + c = 0</strong>.</p><h4>Three methods:</h4><ul><li><strong>Factorisation</strong>: find two numbers that multiply to ac and add to b, split the middle term, factorise by grouping.</li><li><strong>Completing the square</strong>: rewrite as a(x+p)² + q</li><li><strong>Quadratic formula</strong>:</li></ul><div class="formula">x = (−b ± √(b² − 4ac)) / 2a</div><div class="callout callout-key"><div class="callout-title">The Discriminant Δ = b² − 4ac</div>Δ > 0 → two distinct real roots<br>Δ = 0 → one repeated real root (tangent to x-axis)<br>Δ &lt; 0 → no real roots</div>`},
{icon:"🎯",title:"Completing the Square & Quadratic Inequalities",body:`<p>Completing the square gives <strong>a(x+p)² + q</strong>. The vertex is at (−p, q).</p><ul><li>a > 0: minimum at vertex</li><li>a &lt; 0: maximum at vertex</li></ul><div class="callout callout-tip"><div class="callout-title">Example</div>x² + 6x + 5 = (x+3)² − 9 + 5 = (x+3)² − 4. Vertex: (−3, −4). Min value = −4.</div><h4>Quadratic inequalities:</h4><p>Sketch the parabola first. For ax² + bx + c > 0 (a > 0): solution is x &lt; α or x > β (outside roots). For &lt; 0: α &lt; x &lt; β (between roots).</p>`},
{icon:"📊",title:"Simultaneous Equations (linear & quadratic)",body:`<ol><li>Express y from linear equation</li><li>Substitute into quadratic</li><li>Solve resulting quadratic; back-substitute</li></ol><div class="callout callout-warn"><div class="callout-title">Number of intersections</div>Use discriminant of resulting quadratic:<br>Δ > 0 → two intersections (secant)<br>Δ = 0 → one intersection (tangent)<br>Δ &lt; 0 → no intersection</div>`}
],quiz:[
{q:"Find the discriminant of 2x² − 5x + 3 = 0.",opts:["1","7","−24","25"],ans:0,exp:"Δ = (−5)² − 4(2)(3) = 25 − 24 = 1. Two distinct real roots."},
{q:"Solve x² + 6x + 9 = 0.",opts:["x = 3","x = −3 (repeated)","x = 3 or −3","No real roots"],ans:1,exp:"x² + 6x + 9 = (x+3)². So x = −3 (repeated root). Δ = 36−36 = 0."},
{q:"The equation kx² + 4x + 1 = 0 has no real roots. Which is correct?",opts:["k < 4","k > 4","k = 4","k > 0"],ans:1,exp:"Δ < 0: 16 − 4k < 0 → k > 4."},
{q:"Find the minimum value of x² − 8x + 20.",opts:["4","20","−4","36"],ans:0,exp:"x²−8x+20 = (x−4)² − 16 + 20 = (x−4)² + 4. Minimum = 4 when x = 4."}
]},
{id:2,title:"Functions",tag:"P1",sections:[
{icon:"🔀",title:"Domain, Range & Types of Functions",body:`<p><strong>Domain</strong>: set of allowed inputs. <strong>Range</strong>: set of resulting outputs.</p><div class="callout callout-key"><div class="callout-title">One-to-one vs Many-to-one</div>One-to-one: each x gives unique y → has an inverse.<br>Many-to-one: multiple x give same y (e.g. y=x²) → no inverse unless domain restricted.</div><p><strong>Vertical line test</strong>: crosses graph once → is a function.<br><strong>Horizontal line test</strong>: crosses once → one-to-one.</p>`},
{icon:"🔄",title:"Composite & Inverse Functions",body:`<div class="formula">fg(x) = f(g(x))    (apply g first, then f)</div><h4>Finding inverse f⁻¹(x):</h4><ol><li>Write y = f(x)</li><li>Rearrange to make x the subject</li><li>Replace x with f⁻¹(y), swap letters</li></ol><p>Domain of f⁻¹ = range of f. Graph of f⁻¹ is reflection of f in y = x.</p>`},
{icon:"📈",title:"Graph Transformations",body:`<table><tr><th>Transformation</th><th>Effect</th></tr><tr><td>f(x) + a</td><td>Shift up a (translation in y)</td></tr><tr><td>f(x + a)</td><td>Shift LEFT a (translation in x)</td></tr><tr><td>af(x)</td><td>Stretch vertically, scale factor a</td></tr><tr><td>f(ax)</td><td>Stretch horizontally, scale factor 1/a</td></tr><tr><td>−f(x)</td><td>Reflect in x-axis</td></tr><tr><td>f(−x)</td><td>Reflect in y-axis</td></tr></table><div class="callout callout-warn"><div class="callout-title">Inside vs Outside</div>Inside bracket → affects x (horizontal, counter-intuitive sign).<br>Outside bracket → affects y (vertical, intuitive).</div>`}
],quiz:[
{q:"Given f(x) = 2x+1 and g(x) = x², find fg(3).",opts:["13","19","49","7"],ans:1,exp:"fg(3) = f(g(3)) = f(9) = 2(9)+1 = 19."},
{q:"Find the inverse of f(x) = 3x − 2.",opts:["(x+2)/3","(x−2)/3","3x+2","1/(3x−2)"],ans:0,exp:"y=3x−2 → x=(y+2)/3. So f⁻¹(x) = (x+2)/3."},
{q:"How does y = f(x−3) relate to y = f(x)?",opts:["Shift left 3","Shift right 3","Shift up 3","Shift down 3"],ans:1,exp:"f(x−a) shifts RIGHT by a. So y=f(x−3) is 3 units to the right."},
{q:"For f(x) = √(x−4), what is the domain?",opts:["x > 4","x ≥ 4","x ≥ 0","All reals"],ans:1,exp:"Need x−4 ≥ 0 → x ≥ 4."}
]},
{id:3,title:"Coordinate Geometry",tag:"P1",sections:[
{icon:"📏",title:"Lines, Distance & Midpoint",body:`<div class="formula">Gradient m = (y₂−y₁)/(x₂−x₁)</div><div class="formula">Line equation: y − y₁ = m(x − x₁)</div><p>Parallel: m₁ = m₂. Perpendicular: m₁m₂ = −1.</p><div class="formula">Distance = √((x₂−x₁)²+(y₂−y₁)²)</div><div class="formula">Midpoint = ((x₁+x₂)/2, (y₁+y₂)/2)</div>`},
{icon:"⭕",title:"Circles",body:`<div class="formula">(x−a)² + (y−b)² = r²    centre (a,b), radius r</div><div class="callout callout-key"><div class="callout-title">Circle theorems (useful)</div>• Angle in semicircle = 90°<br>• Tangent ⊥ radius at point of contact<br>• Perpendicular from centre bisects chord</div><h4>Tangent at a point:</h4><ol><li>Gradient of radius (centre → point)</li><li>Tangent gradient = −1/radius gradient</li><li>Use point-slope form</li></ol>`}
],quiz:[
{q:"Perpendicular gradient to y = 3x + 1?",opts:["3","−3","1/3","−1/3"],ans:3,exp:"Perpendicular: −1/m = −1/3."},
{q:"Distance between (1,2) and (4,6)?",opts:["5","7","√7","25"],ans:0,exp:"√((4−1)²+(6−2)²) = √(9+16) = √25 = 5."},
{q:"Centre of (x−3)²+(y+2)²=25?",opts:["(3,2)","(−3,2)","(3,−2)","(−3,−2)"],ans:2,exp:"Standard form (x−a)²+(y−b)²=r². a=3, b=−2. Centre=(3,−2)."},
{q:"Midpoint of AB is (4,1). A=(2,−3). Find B.",opts:["(6,5)","(3,−1)","(2,5)","(6,−5)"],ans:0,exp:"(2+x)/2=4→x=6; (−3+y)/2=1→y=5. B=(6,5)."}
]},
{id:4,title:"Circular Measure",tag:"P1",sections:[
{icon:"🔵",title:"Radians & Conversion",body:`<div class="formula">π radians = 180°</div><div class="formula">Degrees → radians: × π/180</div><div class="formula">Radians → degrees: × 180/π</div><table><tr><th>Degrees</th><th>Radians</th></tr><tr><td>30°</td><td>π/6</td></tr><tr><td>45°</td><td>π/4</td></tr><tr><td>60°</td><td>π/3</td></tr><tr><td>90°</td><td>π/2</td></tr><tr><td>180°</td><td>π</td></tr><tr><td>360°</td><td>2π</td></tr></table>`},
{icon:"🍕",title:"Arc Length, Sector & Segment Area",body:`<p>For radius r, central angle θ (in <strong>radians</strong>):</p><div class="formula">Arc length: s = rθ</div><div class="formula">Sector area: A = ½r²θ</div><div class="formula">Segment area = ½r²(θ − sinθ)</div><div class="callout callout-warn"><div class="callout-title">Radians only!</div>Formulae s=rθ and A=½r²θ ONLY work with θ in radians.</div>`}
],quiz:[
{q:"Convert 120° to radians.",opts:["π/3","2π/3","π/2","4π/3"],ans:1,exp:"120 × π/180 = 2π/3."},
{q:"Sector with r=6, θ=π/3. Arc length?",opts:["2π","4π","6π","π"],ans:0,exp:"s = rθ = 6 × π/3 = 2π cm."},
{q:"Sector with r=4, θ=0.5 rad. Area?",opts:["1","2","4","8"],ans:2,exp:"A = ½r²θ = ½ × 16 × 0.5 = 4 cm²."},
{q:"A segment has r=5, θ=1.2 rad. Area = ½r²(θ−sinθ). Which value is correct?",opts:["½(25)(1.2−sin1.2)","½(25)(1.2)","25(1.2−sin1.2)","½(5)(1.2)"],ans:0,exp:"Segment area = ½r²(θ−sinθ) = ½(25)(1.2−sin1.2). Always subtract sinθ from θ."}
]},
{id:5,title:"Trigonometry",tag:"P1",sections:[
{icon:"📐",title:"Trig Ratios & CAST Diagram",body:`<div class="formula">sin θ = opp/hyp    cos θ = adj/hyp    tan θ = opp/adj = sinθ/cosθ</div><table><tr><th>θ</th><th>sin</th><th>cos</th><th>tan</th></tr><tr><td>0°</td><td>0</td><td>1</td><td>0</td></tr><tr><td>30°</td><td>½</td><td>√3/2</td><td>1/√3</td></tr><tr><td>45°</td><td>1/√2</td><td>1/√2</td><td>1</td></tr><tr><td>60°</td><td>√3/2</td><td>½</td><td>√3</td></tr><tr><td>90°</td><td>1</td><td>0</td><td>—</td></tr></table><div class="callout callout-key"><div class="callout-title">CAST</div>Q1 (0–90°): All positive<br>Q2 (90–180°): Sin positive<br>Q3 (180–270°): Tan positive<br>Q4 (270–360°): Cos positive</div>`},
{icon:"🔗",title:"Trig Identities & Solving Equations",body:`<div class="formula">sin²θ + cos²θ = 1</div><div class="formula">tanθ = sinθ/cosθ</div><div class="formula">1 + tan²θ = sec²θ</div><h4>Solving trig equations (e.g. sinθ = k):</h4><ol><li>Find principal value: θ₁ = sin⁻¹(k)</li><li>Second solution: θ₂ = 180° − θ₁ (for sin); 360° − θ₁ (for cos); 180° + θ₁ (for tan)</li><li>Add multiples of period for all solutions in range</li></ol>`},
{icon:"📈",title:"Trig Graphs & Transformations",body:`<p>y = a sin(bx + c) + d: amplitude = |a|, period = 360°/b, shift = −c/b, vertical shift = d.</p><table><tr><th>Function</th><th>Period</th><th>Range</th></tr><tr><td>sin x</td><td>360°</td><td>[−1, 1]</td></tr><tr><td>cos x</td><td>360°</td><td>[−1, 1]</td></tr><tr><td>tan x</td><td>180°</td><td>(−∞, ∞)</td></tr></table>`}
],quiz:[
{q:"Solve sinθ = 0.5 for 0° ≤ θ ≤ 360°.",opts:["30° only","30° and 150°","150° and 210°","30° and 330°"],ans:1,exp:"sin⁻¹(0.5)=30°. Sin positive in Q1 and Q2. Second: 180°−30°=150°."},
{q:"Simplify (1−cos²θ)/sinθ.",opts:["sinθ","cosθ","tanθ","1"],ans:0,exp:"1−cos²θ = sin²θ. So sin²θ/sinθ = sinθ."},
{q:"Period of y = sin(2x)?",opts:["360°","180°","720°","90°"],ans:1,exp:"Period = 360°/2 = 180°."},
{q:"Given sinθ = 3/5 in Q1, find cosθ.",opts:["4/5","3/4","5/4","5/3"],ans:0,exp:"cos²θ = 1−9/25 = 16/25. cosθ = 4/5 (positive in Q1)."}
]},
{id:6,title:"Series",tag:"P1",sections:[
{icon:"📊",title:"Arithmetic Progressions (AP)",body:`<div class="formula">nth term: aₙ = a + (n−1)d</div><div class="formula">Sum: Sₙ = n/2 × (2a + (n−1)d) = n/2 × (a + l)</div><p>a = first term, d = common difference, l = last term.</p>`},
{icon:"📈",title:"Geometric Progressions (GP)",body:`<div class="formula">nth term: aₙ = arⁿ⁻¹</div><div class="formula">Sum of n terms: Sₙ = a(1−rⁿ)/(1−r)</div><div class="formula">Sum to infinity (|r| &lt; 1): S∞ = a/(1−r)</div><div class="callout callout-key"><div class="callout-title">Convergence</div>GP converges (S∞ exists) only when |r| &lt; 1.</div>`},
{icon:"🔢",title:"Binomial Expansion",body:`<div class="formula">(1+x)ⁿ = 1 + nx + n(n−1)/2! x² + n(n−1)(n−2)/3! x³ + ...</div><div class="formula">ⁿCᵣ = n! / (r!(n−r)!)</div><div class="formula">(a+b)ⁿ = Σ ⁿCᵣ aⁿ⁻ʳ bʳ    (r=0 to n)</div>`}
],quiz:[
{q:"AP with a=3, d=5. Find the 10th term.",opts:["48","50","53","45"],ans:0,exp:"a₁₀ = 3 + 9×5 = 48."},
{q:"GP with a=8, r=½. Sum to infinity?",opts:["8","16","4","32"],ans:1,exp:"S∞ = 8/(1−0.5) = 16. |r|=0.5 < 1 ✓"},
{q:"Coefficient of x² in (1+2x)⁴?",opts:["6","12","24","4"],ans:2,exp:"⁴C₂ × (2x)² = 6 × 4x² = 24x². Coefficient = 24."},
{q:"AP sum Sₙ = 2n²+3n. Find the 5th term.",opts:["19","21","23","25"],ans:1,exp:"a₅ = S₅ − S₄ = (50+15) − (32+12) = 65 − 44 = 21."}
]},
{id:7,title:"Differentiation",tag:"P1",sections:[
{icon:"📉",title:"Rules of Differentiation",body:`<div class="formula">d/dx(xⁿ) = nxⁿ⁻¹</div><div class="formula">d/dx(sinx) = cosx    d/dx(cosx) = −sinx</div><div class="formula">Chain rule: dy/dx = (dy/du)(du/dx)</div><p>Example: y=(2x+1)⁵. Let u=2x+1: dy/dx = 5u⁴ × 2 = 10(2x+1)⁴</p>`},
{icon:"📈",title:"Stationary Points & Applications",body:`<h4>Stationary points (dy/dx = 0):</h4><ul><li>d²y/dx² > 0 → minimum</li><li>d²y/dx² &lt; 0 → maximum</li><li>d²y/dx² = 0 → check sign change of dy/dx</li></ul><div class="formula">Tangent gradient at x=a: m = dy/dx|ₓ₌ₐ</div><div class="formula">Normal gradient = −1/m</div><p>Function increasing where dy/dx > 0; decreasing where dy/dx &lt; 0.</p>`}
],quiz:[
{q:"Differentiate y = 4x³ − 3x² + 7x − 2.",opts:["12x²−6x+7","4x²−3x+7","12x²−6x","12x³−6x²+7"],ans:0,exp:"dy/dx = 12x² − 6x + 7."},
{q:"Find dy/dx for y = (3x+1)⁴.",opts:["4(3x+1)³","12(3x+1)³","4(3x+1)³×3x","(3x+1)⁴"],ans:1,exp:"Chain rule: 4(3x+1)³ × 3 = 12(3x+1)³."},
{q:"y = x³−6x²+9x. At x=1, d²y/dx² = ?",opts:["−6","6","0","3"],ans:0,exp:"dy/dx=3x²−12x+9. d²y/dx²=6x−12. At x=1: 6−12=−6 → maximum."},
{q:"Gradient of y = x²+3x at x=2?",opts:["4","7","10","5"],ans:1,exp:"dy/dx = 2x+3. At x=2: 4+3=7."}
]},
{id:8,title:"Further Differentiation",tag:"P1",sections:[
{icon:"🔗",title:"Product, Quotient & Implicit Differentiation",body:`<div class="formula">Product rule (y=uv): dy/dx = u(dv/dx) + v(du/dx)</div><div class="formula">Quotient rule (y=u/v): dy/dx = [v(du/dx) − u(dv/dx)] / v²</div><div class="callout callout-tip"><div class="callout-title">Implicit differentiation</div>Differentiate both sides w.r.t. x. For terms in y, multiply by dy/dx.<br>Example: d/dx(y²) = 2y·dy/dx</div>`},
{icon:"📐",title:"Connected Rates of Change",body:`<div class="formula">dy/dt = (dy/dx) × (dx/dt)</div><p>Example: y=x², dx/dt=3 cm/s. At x=4: dy/dt = 2(4)×3 = 24 cm²/s.</p><div class="callout callout-key"><div class="callout-title">Common formulae</div>Sphere: V=4πr³/3 → dV/dr=4πr²<br>Cylinder (r const): V=πr²h → dV/dt=πr²(dh/dt)<br>Circle: A=πr² → dA/dr=2πr</div>`}
],quiz:[
{q:"Differentiate y = x²sinx.",opts:["2xsinx","2xsinx + x²cosx","x²cosx","2xcosx"],ans:1,exp:"Product rule: u=x², v=sinx. dy/dx = x²cosx + sinx·2x = 2xsinx + x²cosx."},
{q:"Sphere r increases at 0.5 cm/s. Rate of V increase at r=3?",opts:["9π","18π","54π","6π"],ans:1,exp:"dV/dt = 4πr² × 0.5 = 2πr². At r=3: 2π(9) = 18π cm³/s."},
{q:"Differentiate y = (x²+1)/(x−1).",opts:["(x²−2x−1)/(x−1)²","2x/(x−1)","(2x(x−1)−(x²+1))/(x−1)²","(x²+1)/(x−1)²"],ans:2,exp:"Quotient rule: [2x(x−1)−(x²+1)(1)]/(x−1)² = (2x²−2x−x²−1)/(x−1)² = (x²−2x−1)/(x−1)²."}
]},
{id:9,title:"Integration",tag:"P1",sections:[
{icon:"∫",title:"Indefinite Integration",body:`<div class="formula">∫xⁿ dx = xⁿ⁺¹/(n+1) + C    (n ≠ −1)</div><div class="formula">∫(ax+b)ⁿ dx = (ax+b)ⁿ⁺¹/[a(n+1)] + C</div><div class="formula">∫sinx dx = −cosx + C    ∫cosx dx = sinx + C</div><div class="callout callout-warn"><div class="callout-title">Always include C</div>Indefinite integrals must include the constant C. Find C using a given point on the curve.</div>`},
{icon:"📊",title:"Definite Integration & Area",body:`<div class="formula">∫[a to b] f(x) dx = F(b) − F(a)</div><div class="formula">Area under curve (above x-axis) = ∫[a to b] y dx</div><div class="formula">Area between curves = ∫[a to b] (y_top − y_bottom) dx</div><div class="callout callout-warn"><div class="callout-title">Negative area</div>If curve dips below x-axis, integral is negative. Split at x-intercepts and take modulus of each part to get total area.</div><div class="formula">Trapezium rule: ∫≈ h/2 × [y₀ + 2(y₁+...+yₙ₋₁) + yₙ]    h=(b−a)/n</div>`}
],quiz:[
{q:"Find ∫(3x²+4x−1) dx.",opts:["x³+2x²−x+C","6x+4+C","3x³+4x²−x+C","x³+2x+C"],ans:0,exp:"∫3x² = x³; ∫4x = 2x²; ∫−1 = −x. Result: x³+2x²−x+C."},
{q:"Evaluate ∫[1 to 3] (2x+1) dx.",opts:["10","12","8","14"],ans:0,exp:"F(x)=x²+x. F(3)=12, F(1)=2. 12−2=10."},
{q:"dy/dx = 4x−3, passes through (2,5). Find y.",opts:["y=2x²−3x+3","y=2x²−3x+C","y=4x²−3","y=2x²−3x−1"],ans:0,exp:"y=2x²−3x+C. At (2,5): 5=8−6+C → C=3. y=2x²−3x+3."},
{q:"Area between y=x² and y=x?",opts:["1/6","1/3","1/2","1/12"],ans:0,exp:"Intersect at x=0,1. ∫[0 to 1](x−x²)dx = [x²/2−x³/3] = 1/2−1/3 = 1/6."}
]},
{id:10,title:"Representation of Data",tag:"S1",sections:[
{icon:"📊",title:"Data Types & Diagrams",body:`<p><strong>Discrete</strong>: specific values (e.g. number of goals). <strong>Continuous</strong>: any value in a range (e.g. height).</p><table><tr><th>Diagram</th><th>Best for</th></tr><tr><td>Stem-and-leaf</td><td>Small datasets; preserves raw data; easy median/quartile finding</td></tr><tr><td>Box-and-whisker</td><td>Showing spread and skewness; comparing distributions</td></tr><tr><td>Histogram</td><td>Continuous grouped data; area ∝ frequency</td></tr><tr><td>Cumulative frequency curve</td><td>Finding median, quartiles, percentiles</td></tr></table><div class="formula">Frequency density = frequency / class width</div><div class="callout callout-key"><div class="callout-title">Outliers</div>Value more than 1.5 × IQR below Q1 or above Q3 (where IQR = Q3−Q1).</div>`},
{icon:"📏",title:"Skewness & Comparing Distributions",body:`<div class="callout callout-tip"><div class="callout-title">Skewness from box plots</div>Positive skew: median closer to Q1; longer upper whisker<br>Negative skew: median closer to Q3; longer lower whisker<br>Symmetric: median centred between Q1 and Q3</div><p>When comparing distributions always comment on: average (mean or median) AND spread (range, IQR or SD), AND skewness if relevant.</p>`}
],quiz:[
{q:"Histogram bar: frequency density=4, class width=5. Frequency?",opts:["0.8","9","20","1.25"],ans:2,exp:"Frequency = frequency density × class width = 4×5 = 20."},
{q:"Best diagram for continuous grouped data?",opts:["Bar chart","Pie chart","Histogram","Scatter diagram"],ans:2,exp:"Histograms are used for continuous grouped data — bars are adjacent, area represents frequency (y-axis = frequency density)."},
{q:"Q1=15, Q3=27. Upper outlier boundary?",opts:["27","39","45","30"],ans:2,exp:"IQR=12. Upper boundary = Q3+1.5×IQR = 27+18 = 45. Values above 45 are outliers."},
{q:"A distribution is positively skewed. Which is true?",opts:["Mean < Median < Mode","Mode < Median < Mean","Median = Mean = Mode","Mean < Mode < Median"],ans:1,exp:"Positive skew: long tail to the right. Mode < Median < Mean. The mean is pulled toward the high outliers."}
]},
{id:11,title:"Measures of Central Tendency",tag:"S1",sections:[
{icon:"📏",title:"Mean, Median & Mode",body:`<div class="formula">Mean x̄ = Σx/n    (ungrouped)</div><div class="formula">Mean x̄ = Σfx/Σf    (frequency table or grouped; use midpoints)</div><p><strong>Median</strong>: middle value. Position = (n+1)/2 for ungrouped data. Use cumulative frequency for grouped.</p><p><strong>Mode</strong>: most frequent value. Modal class = class with highest frequency density.</p><div class="callout callout-key"><div class="callout-title">Choosing the right average</div>Mean: uses all data, affected by outliers.<br>Median: not affected by outliers — best for skewed data.<br>Mode: only option for categorical data.</div>`}
],quiz:[
{q:"Mean of: 3, 7, 5, 2, 8?",opts:["5","6","5.5","4"],ans:0,exp:"(3+7+5+2+8)/5 = 25/5 = 5."},
{q:"For n=50, the median is at which position?",opts:["25th","25.5th","26th","50th"],ans:1,exp:"(n+1)/2 = 51/2 = 25.5. Median = average of 25th and 26th values."},
{q:"Why prefer median over mean for income data?",opts:["Easier to calculate","Uses more data","Not affected by extreme high incomes","Always equals the mode"],ans:2,exp:"Income data is right-skewed — a few very high earners are outliers. The median is resistant to outliers and represents the 'typical' income better."},
{q:"A frequency table has values 1,2,3 with frequencies 4,6,2. Find the mean.",opts:["2","1.83","2.17","1.5"],ans:1,exp:"Σfx = 1×4+2×6+3×2 = 4+12+6=22. Σf=12. Mean=22/12≈1.83."}
]},
{id:12,title:"Measures of Variation",tag:"S1",sections:[
{icon:"📏",title:"Variance & Standard Deviation",body:`<p><strong>Range</strong>: max−min. <strong>IQR</strong>: Q3−Q1 (robust to outliers).</p><div class="formula">Variance σ² = Σ(x−x̄)²/n = Σx²/n − x̄²</div><div class="formula">For frequency data: σ² = Σfx²/Σf − x̄²</div><div class="formula">Standard deviation σ = √(variance)    (same units as data)</div><div class="callout callout-key"><div class="callout-title">Coding</div>If y = (x−a)/b:<br>ȳ = (x̄−a)/b<br>σ_y = σ_x/|b|<br>This simplifies calculations with large/awkward numbers.</div>`}
],quiz:[
{q:"If Var(X)=9 and Y=2X+3, find Var(Y).",opts:["9","18","36","21"],ans:2,exp:"Var(aX+b) = a²Var(X) = 4×9 = 36. Adding a constant doesn't change variance."},
{q:"Most resistant measure of spread to outliers?",opts:["Range","Variance","SD","IQR"],ans:3,exp:"IQR uses only the middle 50% of data. Outliers at the extremes don't affect it."},
{q:"Data: 2,4,4,6,6,8. Find Σx²/n−x̄².",opts:["3","3.67","4","9"],ans:1,exp:"x̄=5. Σx²=(4+16+16+36+36+64)=172. 172/6−25=28.67−25=3.67."},
{q:"x is coded as y=(x−50)/5. σ_y=2. Find σ_x.",opts:["2","10","0.4","7"],ans:1,exp:"σ_x = σ_y × |b| = 2×5 = 10."}
]},
{id:13,title:"Probability",tag:"S1",sections:[
{icon:"🎲",title:"Basic Rules",body:`<div class="formula">P(A) = favourable outcomes / total outcomes</div><div class="formula">P(A') = 1 − P(A)</div><div class="formula">P(A∪B) = P(A) + P(B) − P(A∩B)</div><div class="callout callout-key"><div class="callout-title">Mutually exclusive vs Independent</div>Mutually exclusive: P(A∩B)=0 (cannot both happen).<br>Independent: P(A∩B)=P(A)×P(B) (one doesn't affect the other).</div>`},
{icon:"🔀",title:"Conditional Probability & Tree Diagrams",body:`<div class="formula">P(A|B) = P(A∩B) / P(B)</div><div class="formula">P(A∩B) = P(A)×P(B|A) = P(B)×P(A|B)</div><p>Independent events: P(A|B) = P(A). Tree diagrams: multiply along branches, add across branches for an event.</p>`}
],quiz:[
{q:"P(A)=0.4, P(B)=0.3, P(A∩B)=0.1. Find P(A∪B).",opts:["0.6","0.7","0.5","0.8"],ans:0,exp:"P(A∪B) = 0.4+0.3−0.1 = 0.6."},
{q:"Bag: 3 red, 5 blue. Two drawn without replacement. P(both red)?",opts:["9/64","3/28","6/64","9/56"],ans:1,exp:"P(1st red)=3/8. P(2nd red|1st red)=2/7. P(both)=3/8×2/7=6/56=3/28."},
{q:"A, B independent. P(A)=0.5, P(B)=0.4. P(A∩B)?",opts:["0.9","0.1","0.2","0.7"],ans:2,exp:"P(A∩B)=P(A)×P(B)=0.5×0.4=0.2."},
{q:"P(A|B)=0.6, P(B)=0.5. Find P(A∩B).",opts:["0.3","0.6","0.1","1.1"],ans:0,exp:"P(A∩B)=P(A|B)×P(B)=0.6×0.5=0.3."}
]},
{id:14,title:"Permutations & Combinations",tag:"S1",sections:[
{icon:"🔢",title:"Counting Methods",body:`<div class="formula">n! = n×(n−1)×...×2×1    (0!=1)</div><div class="formula">Permutations (order matters): ⁿPᵣ = n!/(n−r)!</div><div class="formula">Combinations (order doesn't matter): ⁿCᵣ = n!/(r!(n−r)!)</div><div class="callout callout-key"><div class="callout-title">Permutation vs Combination</div>Permutation: arrangements (queue, code, race positions) — AB ≠ BA.<br>Combination: selections (committee, group, team) — AB = BA.<br>ⁿCᵣ = ⁿPᵣ/r!</div><h4>Restrictions:</h4><ul><li>Items together: treat as one block × internal arrangements</li><li>Items not together: total − (arrangements with them together)</li><li>Identical items: divide by factorials of repeated items</li></ul>`}
],quiz:[
{q:"5 people arranged in a line. How many ways?",opts:["25","120","60","20"],ans:1,exp:"5! = 120."},
{q:"Committee of 3 from 8 people?",opts:["24","56","336","512"],ans:1,exp:"⁸C₃ = 8!/(3!5!) = 56."},
{q:"4-letter codes from ABCDE, no repeats?",opts:["20","120","60","5"],ans:1,exp:"⁵P₄ = 5!/1! = 120."},

{icon:"📊",title:"Discrete Random Variables",body:`<p>For discrete random variable X:</p><div class="formula">ΣP(X=x) = 1</div><div class="formula">E(X) = μ = Σx·P(X=x)</div><div class="formula">Var(X) = E(X²) − [E(X)]² = Σx²P(X=x) − μ²</div><div class="formula">E(aX+b) = aE(X)+b</div><div class="formula">Var(aX+b) = a²Var(X)</div><div class="callout callout-key"><div class="callout-title">Uniform distribution X ∈ {1,...,n}</div>E(X) = (n+1)/2<br>Var(X) = (n²−1)/12</div>`}
],quiz:[
{q:"P(X=1)=0.2, P(X=2)=0.3, P(X=3)=0.5. Find E(X).",opts:["2","2.3","1.5","2.5"],ans:1,exp:"E(X)=1(0.2)+2(0.3)+3(0.5)=0.2+0.6+1.5=2.3."},

],quiz:[
